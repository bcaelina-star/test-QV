 <!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>V.A.L.E.U.R© — Votre Portrait</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
:root{
  --bg:#0A0E1A;--bg2:#111827;--bg3:#1A2235;--bg4:#0D1220;
  --txt:#F0EAE1;--txt2:rgba(240,234,225,.72);--txt3:rgba(240,234,225,.45);--txt4:rgba(240,234,225,.20);
  --gold:#C9A84C;--gold2:rgba(201,168,76,.15);--gold3:rgba(201,168,76,.05);
  --rouge:#B5312A;--orange:#C4581F;--jaune:#B8930A;
  --vert:#2D7A4F;--bleu:#1D5F8A;--indigo:#5C3280;--violet:#7A3594;
  --chroma:linear-gradient(90deg,#B5312A 0%,#C4581F 16.6%,#B8930A 33.2%,#2D7A4F 49.8%,#1D5F8A 66.4%,#5C3280 83%,#7A3594 100%);
  --fs:'Cormorant Garamond',Georgia,serif;--fb:'DM Sans',system-ui,sans-serif;
  --r:12px;--r-sm:6px;--line:rgba(240,234,225,.06);--max:860px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);font-family:var(--fb);font-weight:300;color:var(--txt);-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
a{color:var(--gold);text-decoration:none}
.chroma-bar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--chroma);z-index:1000}
nav{position:fixed;top:3px;left:0;right:0;z-index:900;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(10,14,26,.94);backdrop-filter:blur(24px);border-bottom:1px solid var(--line)}
.nav-logo{font-family:var(--fs);font-size:14px;font-weight:600;color:var(--gold);letter-spacing:4px;text-transform:uppercase}
.nav-back{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);transition:color .2s}
.nav-back:hover{color:var(--gold)}
#page-loader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;transition:opacity .7s}
#page-loader.out{opacity:0;pointer-events:none}
.ld-logo{font-family:var(--fs);font-size:2rem;letter-spacing:.35em;color:var(--gold);font-weight:400}
.ld-spin{width:26px;height:26px;border:1.5px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .9s linear infinite}
.container{max-width:var(--max);margin:0 auto;padding:clamp(72px,10vh,100px) 20px 60px}
.logo-watermark{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:56px;opacity:0;animation:fadeUp .8s ease forwards .2s}
.logo-watermark img{width:72px;height:72px;opacity:.18;filter:brightness(2) sepia(1) saturate(.5) hue-rotate(10deg)}
.logo-watermark .logo-label{font-family:var(--fs);font-size:11px;letter-spacing:6px;text-transform:uppercase;color:var(--gold);opacity:.6}
.thoughts-section{margin-bottom:48px;opacity:0;animation:fadeUp .9s ease forwards .4s}
.thought-primary{font-family:var(--fs);font-style:italic;font-size:clamp(22px,4vw,38px);font-weight:300;line-height:1.35;color:var(--txt);border-left:3px solid var(--gold);padding:20px 28px;background:linear-gradient(135deg,var(--bg2),var(--bg3));border-radius:0 var(--r) var(--r) 0;margin-bottom:14px;position:relative}
.thought-primary::before{content:'"';font-family:var(--fs);font-size:110px;line-height:0;position:absolute;left:18px;top:50%;color:var(--gold);opacity:.07;pointer-events:none}
.thought-secondary,.thought-tertiary{font-family:var(--fs);font-style:italic;font-size:clamp(16px,2.2vw,20px);color:var(--txt2);padding:12px 28px;border-left:2px solid rgba(201,168,76,.3);margin-bottom:10px;background:var(--bg2);border-radius:0 var(--r-sm) var(--r-sm) 0}
.badge-config{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:40px;opacity:0;animation:fadeUp .8s ease forwards .6s}
.badge-mask{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:40px;font-size:13px;font-weight:500;color:#fff;letter-spacing:.5px}
.badge-plus{font-size:20px;color:var(--gold);font-weight:300}
.badge-label,.badge-faux-self{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);padding:6px 12px;border:1px solid var(--gold2);border-radius:40px}
.badge-secondary{font-size:12px;color:var(--txt3);padding:6px 12px;border:1px solid var(--line);border-radius:40px}
.scores-section{margin-bottom:48px;opacity:0;animation:fadeUp .8s ease forwards .7s}
.scores-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.score-col{display:flex;flex-direction:column;align-items:center;gap:6px}
.score-bar-wrap{width:100%;height:80px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;display:flex;align-items:flex-end}
.score-bar-fill{width:100%;height:0%;border-radius:4px;transition:height 1.2s cubic-bezier(.16,1,.3,1)}
.score-emoji{font-size:15px}
.score-pct{font-size:11px;font-weight:500;color:var(--txt3)}
.spa-section{display:flex;align-items:center;gap:24px;margin-bottom:48px;padding:24px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--line);opacity:0;animation:fadeUp .8s ease forwards .8s}
.spa-arc{position:relative;width:100px;height:100px;flex-shrink:0}
.spa-arc svg{width:100%;height:100%;transform:rotate(-90deg)}
.spa-number{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--fs);font-size:28px;font-weight:300;color:var(--txt)}
.spa-info{flex:1}
.spa-title{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.spa-desc{font-size:14px;line-height:1.7;color:var(--txt2)}
.neuro-intro{margin-bottom:40px;padding:20px 24px;background:linear-gradient(135deg,var(--bg3),var(--bg2));border-radius:var(--r);border-left:3px solid var(--gold);opacity:0;animation:fadeUp .8s ease forwards .85s}
.neuro-intro p{font-size:14px;line-height:1.8;color:var(--txt2);font-style:italic}
.neuro-intro strong{color:var(--txt);font-style:normal}
.progression-list{display:flex;flex-direction:column;gap:10px;margin-bottom:32px}
.prog-item{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--bg2);border-radius:var(--r-sm);border:1px solid var(--line);transition:border-color .2s}
.prog-item.prog-dominant{border-color:var(--gold);background:var(--bg3)}
.prog-rank{font-size:11px;color:var(--txt4);font-weight:600;width:18px;text-align:center;flex-shrink:0}
.prog-emoji{font-size:20px;flex-shrink:0}
.prog-bar-wrap{flex:1;min-width:0}
.prog-label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:6px}
.prog-name{font-size:13px;font-weight:500;color:var(--txt)}
.prog-badge{font-size:10px;letter-spacing:1px;padding:3px 10px;border-radius:20px;font-weight:600;text-transform:uppercase}
.prog-badge-elevé{background:rgba(201,168,76,.15);color:var(--gold)}
.prog-badge-significatif{background:rgba(93,50,128,.2);color:#9B7FC7}
.prog-badge-modéré{background:rgba(45,122,79,.15);color:#5CB87A}
.prog-badge-résiduel{background:rgba(255,255,255,.05);color:var(--txt4)}
.prog-track{height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;width:0%;border-radius:2px;transition:width 1.4s cubic-bezier(.16,1,.3,1)}
.prog-desc{font-size:11px;color:var(--txt4);margin-top:4px}
.portrait-body{opacity:0;animation:fadeUp .9s ease forwards 1s}
.portrait-headline{font-family:var(--fs);font-size:clamp(26px,4.5vw,42px);font-weight:400;line-height:1.15;color:var(--txt);margin-bottom:12px}
.portrait-tagline{font-family:var(--fs);font-style:italic;font-size:clamp(16px,2.2vw,21px);color:var(--gold);margin-bottom:28px;line-height:1.4}
.portrait-desc{font-size:15px;line-height:1.9;color:var(--txt2);margin-bottom:28px}
.section-label{font-size:10px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--gold);opacity:.7;margin:32px 0 16px}
.section-divider{height:1px;background:var(--line);margin:32px 0}
.cycle-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:28px}
.cycle-step{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r-sm);padding:16px}
.step-n{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--gold2);color:var(--gold);font-size:12px;font-weight:600;margin-bottom:8px}
.cycle-step p{font-size:13px;line-height:1.65;color:var(--txt2)}
.behaviors-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}
.behavior-item{background:var(--bg3);border:1px solid var(--line);border-radius:40px;padding:9px 18px;font-size:13px;line-height:1.5;color:var(--txt2)}
.origin-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
@media(max-width:480px){.origin-grid{grid-template-columns:1fr}}
.origin-card{padding:16px;border-radius:var(--r-sm);border-left:3px solid;background:var(--bg2)}
.origin-name{font-size:13px;font-weight:500;color:var(--txt);margin-bottom:4px}
.origin-peur{font-size:12px;color:var(--txt3);font-style:italic}
.secondary-block{background:var(--bg3);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px 18px;font-size:14px;line-height:1.7;color:var(--txt2);font-style:italic;margin-bottom:20px}
.force-section{margin:40px 0}
.force-block{background:linear-gradient(135deg,#1A1505,#0F1A10);border:1px solid rgba(201,168,76,.25);border-radius:var(--r);padding:28px 32px}
.force-title{font-family:var(--fs);font-size:22px;color:var(--gold);margin-bottom:10px}
.force-text{font-size:15px;line-height:1.8;color:var(--txt2)}
.card-section{margin:56px 0;text-align:center}
.card-eyebrow{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
#share-canvas{display:block;margin:0 auto;max-width:min(100%,380px);aspect-ratio:1/1;border-radius:8px;box-shadow:0 24px 80px rgba(0,0,0,.6),0 0 0 1px rgba(201,168,76,.1)}
.card-buttons{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.btn{padding:11px 28px;font-family:var(--fb);font-size:12px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;border-radius:40px;cursor:pointer;transition:all .2s;border:none}
.btn-primary{background:var(--gold);color:#0A0E1A}
.btn-ghost{background:transparent;border:1px solid rgba(201,168,76,.5);color:var(--gold)}
.btn:hover{opacity:.85;transform:translateY(-1px)}
.cta-section{text-align:center;margin:48px 0 32px;padding-top:32px;border-top:1px solid var(--line)}
.cta-section p{font-size:14px;color:var(--txt3);margin-bottom:16px}
.btn-doctolib{display:inline-block;padding:14px 36px;background:var(--gold);color:#0A0E1A;font-family:var(--fb);font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;border-radius:40px;cursor:pointer;text-decoration:none;transition:opacity .2s,transform .2s}
.btn-doctolib:hover{opacity:.9;transform:translateY(-1px)}
#portrait-wrap{min-height:200px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){nav{padding:0 16px}.container{padding:68px 16px 60px}.scores-grid{gap:4px}.spa-section{flex-direction:column;text-align:center}.spa-arc{width:80px;height:80px}}
@media print{.chroma-bar,nav,.card-section,.cta-section,#page-loader{display:none!important}body{background:#fff;color:#1A1814}.portrait-headline,.portrait-tagline{color:#1A1814}.portrait-desc,.behavior-item,.cycle-step p{color:#333}.force-block{border-color:#B8930A;background:#FFFBF0}}
</style>
</head>
<body>
<div class="chroma-bar"></div>
<div id="page-loader">
  <div class="ld-logo">V·A·L·E·U·R©</div>
  <div class="ld-spin"></div>
</div>
<nav>
  <span class="nav-logo">V.A.L.E.U.R©</span>
  <a href="https://questionnaire.psyh.fr" class="nav-back">← Recommencer</a>
</nav>
<div class="container">
  <div id="portrait-wrap"></div>
</div>
<img id="logo-valeur-img" src="https://raw.githubusercontent.com/celinebourbon-ux/Livrets-VALEUR-Collection/main/LOGO_VALEUR_MASQUE_.png" style="display:none" crossorigin="anonymous" alt="">
<script>
// ── MASK META ──────────────────────────────────────────────────────────
const MASK_META = {
  rouge:  {name:'Masque Rouge',  emoji:'🔴', peur:'la peur de la maladie et de la mort',           color:'#B5312A'},
  orange: {name:'Masque Orange', emoji:'🟠', peur:'la peur de ressentir',                           color:'#C4581F'},
  jaune:  {name:'Masque Jaune',  emoji:'🟡', peur:"la peur de l'incertitude",                       color:'#B8930A'},
  vert:   {name:'Masque Vert',   emoji:'🟢', peur:"la peur de l'abandon",                           color:'#2D7A4F'},
  bleu:   {name:'Masque Bleu',   emoji:'🔵', peur:"la peur de perdre le contrôle",                  color:'#1D5F8A'},
  indigo: {name:'Masque Indigo', emoji:'🟣', peur:"la peur de l'échec et du jugement",              color:'#5C3280'},
  violet: {name:'Masque Violet', emoji:'🟪', peur:"la peur de ne pas exister, d'être rien",         color:'#7A3594'},
};
const MASKS = ['rouge','orange','jaune','vert','bleu','indigo','violet'];

// ── PLAYLIST ───────────────────────────────────────────────────────────
const PLAYLIST = {
  rouge:{bridge:"Votre système nerveux a appris que surveiller était le seul moyen d'être en sécurité. Cette vigilance s'est automatisée — elle s'active même quand il n'y a rien à craindre.",thoughts:["Et si ce symptôme cachait quelque chose de grave ?","Je dois vérifier — si ça se trouve, c'est sérieux.","Et si je faisais un malaise sans signe avant-coureur ?","Le médecin a dit que ça allait, mais peut-être qu'il a raté quelque chose…"]},
  orange:{bridge:"Votre système nerveux a appris qu'éloigner les émotions était le seul moyen de rester fonctionnel·le. Une protection réelle — mais elle coupe aussi de la joie, de l'intimité, du sentiment d'être pleinement là.",thoughts:["Ce n'est pas si important. Autant ne pas y penser.","Je ne sais pas vraiment ce que je ressens.","Mieux vaut rester occupé — quand je m'arrête, c'est inconfortable.","Les émotions, ça ne mène à rien de concret."]},
  jaune:{bridge:"Votre système nerveux a appris qu'anticiper était le seul moyen d'éviter d'être pris au dépourvu. Votre cerveau planifie, vérifie, recalcule — mais la certitude absolue n'existe pas.",thoughts:["Et si ça se passait mal ? Il faut que j'anticipe.","Et si je me trompais dans ma décision ?","Je ne peux pas décider tant que je ne suis pas sûr(e).","Si l'imprévu arrive, tout peut partir en vrille."]},
  vert:{bridge:"Votre système nerveux a appris à surveiller en permanence les humeurs, les silences, les tonalités des autres — pour éviter la rupture. Ce radar fonctionne même avec des personnes bienveillantes.",thoughts:["Qu'est-ce qu'ils pensent de moi ?","J'ai sûrement dit quelque chose qui a mal passé.","Et s'ils finissaient par se lasser de moi ?","Mieux vaut m'adapter — si je prends trop de place, ils vont partir."]},
  bleu:{bridge:"Votre système nerveux a appris que lâcher prise exposait à l'échec ou à l'effondrement. Ce réflexe de contrôle s'active même là où vous pourriez vous permettre de vous reposer.",thoughts:["Si je ne contrôle pas ça, ça va partir en vrille.","Les autres ne font jamais comme il faut.","Je dois vérifier, reprendre, corriger — sinon ça rate.","Je ne peux pas me permettre de ne pas être indispensable."]},
  indigo:{bridge:"Votre système nerveux a appris que l'exigence envers vous-même vous protégerait de l'échec et du regard critique. Elle vous pousse — mais elle vous épuise davantage qu'elle ne vous protège.",thoughts:["Ce n'est pas assez bien. Je dois retravailler ça.","On va finir par voir que je ne mérite pas ma place.","C'était la chance — pas ma compétence réelle.","Je ne peux pas commencer tant que je ne suis pas prêt(e)."]},
  violet:{bridge:"Vous avez appris très tôt qu'être vraiment soi comportait un risque. Alors vous avez construit, soigneusement, une version de vous-même qui serait acceptée. Brillante dans ses adaptations. Et profondément seule, car jamais vraiment vue.",thoughts:["Est-ce que les gens m'aimeraient vraiment s'ils savaient qui je suis au fond ?","Je me sens différent·e — mais je ne sais pas comment le dire.","Je joue des rôles tellement bien que je ne sais plus qui je suis vraiment.","Qu'est-ce qui reste si j'arrête de m'adapter ?"]}
};

// ── FORCES LIBÉRÉES ────────────────────────────────────────────────────
const FORCES_LIBEREES = {
  rouge:  {titre:'Une Présence Incarnée et Paisible',           texte:"L'énergie consommée par la vigilance se transforme en capacité à habiter pleinement votre corps et le moment présent. La confiance en la vie remplace la peur de la survie. Vous vous sentez « chez vous » partout, ancré·e et serein·e."},
  orange: {titre:'Une Intelligence Émotionnelle Vivante',       texte:"L'émotion n'est plus un ennemi à fuir, mais une source d'information riche. La créativité se débride. La capacité à naviguer dans les émotions avec grâce devient votre force. La vie redevient une expérience pleine."},
  jaune:  {titre:'Une Confiance Inébranlable et une Action Juste',texte:"Libéré·e du besoin de tout anticiper, vous découvrez une confiance moteur. Plus besoin de garanties pour avancer. Vous faites face à l'imprévu — et cela devient une ressource plutôt qu'une menace."},
  vert:   {titre:"Une Capacité d'Aimer Authentique",            texte:"L'amour n'est plus une monnaie d'échange. Il se donne librement, ancré en vous. L'empathie devient un don, non un fardeau. C'est la fin de la fusion et le début de la relation vraie — où vous existez pleinement."},
  bleu:   {titre:'Une Autorité Naturelle et une Communication Inspirée',texte:"Vous cessez de contrôler les autres pour exister. Votre parole devient juste et créatrice. Vous exprimez vos besoins avec calme et puissance — non pour dominer, mais pour contribuer. Un leadership authentique."},
  indigo: {titre:'Une Vision Claire et une Intuition Affûtée', texte:"Libéré·e du perfectionnisme, votre mental devient un outil de discernement. Vous avez confiance en votre vision intérieure et osez la suivre. La peur de l'erreur se transforme en sagesse profonde."},
  violet: {titre:'Une Paix Profonde et une Connexion au Sens', texte:"Vous lâchez prise sur une identité figée. Vous ne cherchez plus désespérément un sens à votre vie — vous l'incarnez. Vous pouvez changer, évoluer, sans craindre de vous perdre."}
};

// ── DYADES (21 entrées) ────────────────────────────────────────────────
const DYADES_DATA = {
  jaune_rouge:{name:"L'Anxiété Amplifiée",tagline:"Chaque sensation exige une certitude que votre corps ne peut pas fournir",desc:"Votre cerveau a appris, probablement très tôt, que le danger pouvait venir de l'intérieur. Le masque Rouge maintient une surveillance corporelle constante – comme un détecteur de fumée réglé trop sensiblement. Le masque Jaune, lui, ne supporte pas l'ambiguïté. Quand une sensation physique apparaît, ces deux systèmes s'activent ensemble : le premier crie « danger », le second exige « sois certain que ce n'est rien ». Or, la certitude absolue n'existe pas en matière de santé. Cette quête impossible relance l'alarme à chaque tentative de réassurance.",cycle:["Une sensation corporelle émerge – Rouge l'interprète comme une menace possible, Jaune exige une explication certaine.","Vous cherchez une réponse définitive (internet, médecin, analyse des symptômes) – l'incertitude résiduelle relance la vigilance.","La réassurance obtenue soulage temporairement, mais ne désactive pas le circuit amygdalien conditionné – le prochain signal, même mineur, repart de zéro.","Chaque cycle renforce la connexion entre sensation et menace, rendant la prochaine alerte plus rapide et plus intense."],behaviors:["Chaque sensation déclenche une boucle de vérification – votre Jaune exige une réponse que votre Rouge ne peut jamais totalement accepter.","La réassurance médicale tient un temps, puis une nouvelle sensation réactive le circuit. L'absence de pathologie avérée n'éteint pas l'alarme.","Vous anticipez les maladies futures – Jaune projette les risques, Rouge les ressent déjà dans le corps.","La recherche d'informations apaise quelques heures, puis crée de nouvelles questions."]},
  orange_vert:{name:"La Distance Paradoxale",tagline:"Besoin de l'autre – et fermeture quand il s'approche vraiment",desc:"Deux forces opposées cohabitent. Le masque Vert a un besoin profond de connexion et de sécurité relationnelle. Le masque Orange a appris à couper l'accès aux émotions parce que les ressentir était trop douloureux. Quand la relation devient suffisamment proche pour que les émotions émergent, Orange les désactive automatiquement. L'autre voit quelqu'un qui se ferme – précisément ce que le masque Vert cherche à éviter depuis le début.",cycle:["Votre besoin de proximité s'active (Vert) – vous cherchez le contact, la présence.","L'intimité fait monter l'émotion – Orange la coupe avant qu'elle ne puisse être ressentie ou exprimée.","L'autre perçoit un retrait, une absence – il s'éloigne ou s'interroge, confirmant la peur d'abandon.","Vert redouble d'approche pour réparer le lien, ce qui réactive Orange – la boucle s'auto-entretient."],behaviors:["Vous avez besoin de l'autre intensément, et au moment où il s'approche vraiment, quelque chose en vous se verrouille.","Vous n'exprimez pas directement vos besoins affectifs – vous attendez que l'autre devine.","Votre entourage ne comprend pas cette alternance entre demande de proximité et retrait.","La solitude ressentie au sein même de la relation est un indicateur fiable de cette configuration."]},
  bleu_jaune:{name:"L'Hypercontrôle",tagline:"Si je prépare tout, rien ne peut m'échapper – ni me surprendre",desc:"Deux besoins de maîtrise se rencontrent et s'amplifient. Le masque Bleu a besoin de contrôler les situations et les personnes pour ne pas se sentir impuissant. Le masque Jaune ne supporte pas l'incertitude et veut tout prévoir. Ensemble, ils créent un système où rien ne doit dévier du plan. La délégation est impossible car elle introduit une variable incontrôlable.",cycle:["Une situation échappe partiellement à votre contrôle – Bleu et Jaune s'activent simultanément.","Vous planifiez, vérifiez, imposez une méthode – pour reprendre la maîtrise sur ce qui a dévié.","L'autre résiste ou improvise – l'incertitude et l'impuissance reviennent, plus menaçantes.","Le contrôle se resserre encore, jusqu'à l'épuisement ou la rupture relationnelle."],behaviors:["Vous vérifiez le travail que vous avez délégué – la délégation partielle crée plus d'anxiété que si vous aviez tout fait vous-même.","Vous planifiez avec un niveau de détail que votre entourage vit comme une contrainte, et que vous vivez comme une nécessité.","Une chose faite différemment de votre méthode vous met mal à l'aise, même si le résultat est équivalent.","La rigidité perçue par les autres n'est pas de l'autoritarisme – c'est la logique de deux systèmes qui exigent la maîtrise totale."]},
  jaune_vert:{name:"La Surveillance Relationnelle",tagline:"Votre esprit analyse chaque signal pour vérifier que le lien tient",desc:"Votre masque Vert a besoin de sécurité dans le lien – il craint le rejet et l'abandon. Votre masque Jaune ne supporte pas l'incertitude ou l'ambiguïté. Ensemble, ils créent une vigilance relationnelle permanente. Un message un peu court, un ton légèrement différent, une réponse qui tarde : tout devient une donnée à analyser.",cycle:["Un signal relationnel ambigu apparaît – Vert l'interprète comme distance possible.","Jaune exige de savoir avec certitude ce que cela signifie – vous relisez, analysez, cherchez des indices.","L'incertitude ne se résorbe pas (les relations ne fonctionnent pas comme une équation) – Vert amplifie la peur.","L'autre ressent cette attention constante comme une pression, ce qui peut créer la distance que vous craigniez."],behaviors:["Un message plus bref que d'habitude devient un problème à résoudre – les deux masques s'activent ensemble.","Vous relisez des conversations entières pour vérifier qu'il n'y a pas de signe de distance.","Vous demandez régulièrement des confirmations (« tout va bien ? ») – l'apaisement est temporaire.","Votre entourage peut interpréter cette surveillance comme de la méfiance, renforçant la distance que vous cherchez à éviter."]},
  orange_rouge:{name:"Le Corps sans Voix",tagline:"Le corps parle, mais vous n'avez pas accès à ce qu'il essaie de dire",desc:"Votre masque Rouge maintient une vigilance corporelle intense. Votre masque Orange vous déconnecte de l'accès aux émotions et sensations. L'anxiété emprunte la voie corporelle parce que la voie émotionnelle est verrouillée. Votre corps exprime ce que votre esprit ne peut pas métaboliser.",cycle:["Une sensation corporelle anxieuse monte – Rouge déclenche l'alerte.","Orange coupe l'accès émotionnel à cette anxiété – vous ne pouvez ni la nommer ni la ressentir pleinement.","L'anxiété s'exprime par le corps, plus fort, faute d'autre canal de sortie – tensions, palpitations, douleurs.","La surveillance corporelle s'intensifie (Rouge), alimentant de nouveaux symptômes, sans que la source émotionnelle ne soit jamais atteinte."],behaviors:["Vous présentez des symptômes physiques variés, mais aucun bilan médical ne trouve de cause satisfaisante.","Vous gérez l'inquiétude avec des stratégies d'évitement inconscientes qui soulagent sans traiter la racine émotionnelle.","L'épuisement arrive sans signal d'alarme clair – vous ne savez pas dire quand vous êtes fatigué·e avant de l'être profondément.","Vous avez du mal à répondre à la question « qu'est-ce que vous ressentez ? » – par absence d'accès au ressenti lui-même."]},
  bleu_indigo:{name:"L'Exigence Totale",tagline:"Rien n'est jamais assez bien – pour vous, ni pour les autres",desc:"Le masque Indigo impose des standards élevés parce qu'il craint le jugement et l'échec. Le masque Bleu a besoin de maîtriser les situations et d'être reconnu comme celui qui tient. Ensemble, ils créent un perfectionnisme qui ne s'applique pas seulement à vous-même, mais aussi à ce que vous attendez des autres.",cycle:["Un résultat n'atteint pas vos standards – Indigo juge, Bleu reprend le contrôle.","Vous rectifiez, vérifiez, imposez votre méthode – vous ne pouvez pas laisser passer.","Les autres sont rarement à la hauteur, et vous non plus – le standard monte à chaque réussite.","L'exigence s'étend à toutes les sphères, sans jamais atteindre un seuil où « assez » serait atteint."],behaviors:["Vous reprenez systématiquement le travail délégué – parce que le résultat doit correspondre à un standard interne.","Vous avez du mal à recevoir un compliment sans le relativiser immédiatement.","Votre entourage vit votre exigence comme une pression constante.","Ce qui était excellent hier devient le minimum attendu demain – le seuil de satisfaction se déplace sans cesse."]},
  indigo_vert:{name:"L'Auto-Effacement",tagline:"Votre valeur est réelle, mais deux peurs la maintiennent sous silence",desc:"Votre masque Vert minimise pour préserver la relation – ne pas prendre trop de place, ne pas menacer l'autre. Votre masque Indigo minimise parce qu'être vu·e est risqué – le jugement, l'échec potentiel. Ces deux peurs convergent vers un même comportement d'effacement.",cycle:["Une compétence ou une réussite devient visible – Vert craint qu'elle crée de la distance relationnelle.","Indigo la minimise immédiatement – « c'était de la chance », « c'est grâce à l'équipe ».","Vous restez en retrait, confirmant aux deux masques que l'exposition est risquée.","Vos talents restent sous-employés, et la question « qui suis-je vraiment ? » reste sans réponse."],behaviors:["Vous recevez un compliment et vous le réattribuez immédiatement – les deux masques travaillent dans le même sens.","Vous avez du mal à prendre la parole, même sur des sujets que vous maîtrisez.","Votre entourage méconnaît l'étendue de vos compétences réelles.","Vous avez des projets inachevés ou jamais commencés – non par manque de capacité, mais par évitement de l'exposition."]},
  indigo_jaune:{name:"Le Blocage par Anticipation",tagline:"Commencer suppose d'accepter de ne pas être parfait – c'est impossible",desc:"Votre masque Jaune ne supporte pas l'incertitude du résultat – commencer sans garantie est une menace. Votre masque Indigo exige que le résultat soit parfait – commencer imparfaitement est un échec annoncé. Ensemble, ils créent une paralysie décisionnelle et une procrastination qui n'ont rien à voir avec de la paresse.",cycle:["Un projet ou une décision se profile – Jaune exige de connaître tous les paramètres avant de s'engager.","Indigo ajoute l'exigence de perfection – les conditions idéales n'existent pas.","Le projet est reporté – ce report est enregistré comme preuve que vous n'étiez pas prêt·e.","À la prochaine occasion, l'anxiété est plus forte, et la paralysie plus rapide."],behaviors:["Vous attendez « le bon moment », « les bonnes conditions » – ces moments n'arrivent jamais.","Vous sur-préparez jusqu'à l'épuisement – la préparation devient un moyen de repousser le moment d'être évalué·e.","Des projets importants dorment dans vos tiroirs depuis des mois – par impossibilité de commencer imparfaitement.","Quand vous livrez enfin, vous vous critiquez immédiatement – la satisfaction ne dure jamais."]},
  jaune_violet:{name:"La Stabilité à Tout Prix",tagline:"Changer, c'est risquer de disparaître – alors rien ne bouge",desc:"Votre masque Violet ne sait pas qui il est sans ses repères connus. Votre masque Jaune ne supporte pas l'incertitude que le changement implique. Ensemble, ils créent une résistance tenace à la nouveauté. Votre monde se rétrécit progressivement, non par choix, mais par nécessité de protection.",cycle:["Un changement approche – Violet perçoit une menace pour l'identité connue.","Jaune exige de tout prévoir – ce qui est impossible face à un changement véritable.","Les deux masques créent une résistance rigide – vous restez dans ce que vous connaissez.","La vie rétrécit, et chaque dérogation aux habitudes déclenche une anxiété disproportionnée."],behaviors:["Un changement de routine génère une anxiété intense que vous ne vous expliquez pas.","Vous maintenez des habitudes qui vous pèsent – y renoncer créerait un vide inconnu.","Vous refusez des opportunités par peur du bouleversement qu'elles impliquent.","Votre entourage vous perçoit comme rigide – c'est la logique des protections, pas votre caractère."]},
  bleu_rouge:{name:"Le Corps sous Contrôle",tagline:"Votre corps est devenu un projet – et il n'a pas le droit de défaillir",desc:"Votre masque Rouge surveille le corps en permanence. Votre masque Bleu transforme toute alerte en plan d'action. Le corps n'est plus un lieu d'expérience, mais un système à optimiser. Plus vous contrôlez, plus le corps manifeste des signaux de stress.",cycle:["Une sensation corporelle attire votre attention – Rouge l'interprète comme alerte.","Bleu transforme l'alerte en plan – protocoles, optimisation, discipline.","Le corps résiste naturellement à la maîtrise totale (fatigue, signaux de limite).","Cette résistance est interprétée comme une nouvelle défaillance à corriger – le contrôle se renforce."],behaviors:["Votre corps est géré comme un projet : régimes, protocoles, objectifs chiffrés.","Vous avez du mal à vous reposer vraiment – il y a toujours quelque chose à optimiser.","Les limitations physiques normales sont vécues comme des échecs personnels.","La tension chronique est souvent le premier signe visible pour votre entourage."]},
  rouge_vert:{name:"Le Corps comme Lien",tagline:"Ce que vous ressentez physiquement, vous avez besoin de le traverser avec l'autre",desc:"Votre masque Rouge génère une anxiété corporelle. Votre masque Vert a besoin de connexion pour se sentir en sécurité. Progressivement, votre corps est devenu un moyen de lien : la présence de l'autre apaise les symptômes, l'absence les amplifie.",cycle:["Un symptôme surgit – Rouge génère une anxiété corporelle.","La solitude amplifie l'anxiété – Vert a besoin d'une présence pour la traverser.","La réassurance de l'autre soulage momentanément – mais crée une dépendance progressive.","La prochaine inquiétude, seule, est plus difficile à supporter – le besoin de présence augmente."],behaviors:["La solitude amplifie vos inquiétudes physiques ; la présence de l'autre les réduit nettement.","Vous avez du mal à vous rendre seul·e à une consultation médicale.","Vous partagez vos inquiétudes corporelles de façon détaillée – le partage maintient le lien.","Les tensions relationnelles se répercutent directement sur votre corps."]},
  indigo_rouge:{name:"Le Corps sous Exigence",tagline:"Votre corps doit être parfait – et il ne l'est jamais assez",desc:"Votre masque Rouge est vigilant sur tout signal corporel. Votre masque Indigo impose des standards impossibles. Les deux ensemble transforment le corps en objet de performance. La fatigue n'est pas un signal de repos, c'est une insuffisance.",cycle:["Un signal de limite apparaît (fatigue, douleur) – Rouge l'enregistre, Indigo le juge.","Des standards corporels sont appliqués – nutrition, exercice, sommeil – de façon rigide.","Le corps s'épuise sous l'exigence – il produit de nouveaux signaux.","Ces signaux sont interprétés comme preuve d'insuffisance – le cycle recommence."],behaviors:["Un jour de fatigue est vécu comme un manque de discipline.","Vos routines physiques sont très structurées et difficiles à assouplir.","Vous avez du mal à simplement être fatigué·e sans chercher la cause et la solution.","La poursuite du corps parfait produit les symptômes qu'elle prétendait prévenir."]},
  rouge_violet:{name:"L'Identité par la Santé",tagline:"Votre vigilance santé est devenue votre manière d'exister",desc:"Votre masque Rouge maintient une surveillance corporelle constante. Votre masque Violet cherche une identité stable. La santé peut devenir un repère identitaire. Aller mieux signifierait perdre ce repère.",cycle:["Une préoccupation de santé survient – Rouge s'en saisit.","Elle comble un vide identitaire – Violet trouve un rôle stable.","L'identité se construit autour de la vigilance santé – guérir deviendrait une perte de soi.","Les symptômes persistent, car ils remplissent une fonction que rien ne remplace."],behaviors:["Votre santé occupe une place centrale dans vos conversations et vos pensées.","L'idée de cesser de surveiller peut créer une anxiété inattendue – « qui serais-je sans ça ? »","Vous avez construit des relations autour du rôle de patient·e informé·e.","Les bénéfices de ce rôle ne sont pas des calculs – c'est un système qui cherche à exister."]},
  jaune_orange:{name:"Planifier sans Habiter",tagline:"Votre vie est parfaitement organisée – et vous ne la ressentez pas",desc:"Votre masque Jaune structure, planifie, anticipe. Votre masque Orange coupe l'accès aux émotions. Ensemble, ils créent une vie parfaitement organisée et émotionnellement vide. L'épuisement s'installe sans signal émotionnel d'alarme – ce qui rend le crash d'autant plus soudain.",cycle:["Une situation imprévue survient – Jaune la cadre, la planifie, la contrôle.","Orange empêche de ressentir l'anxiété – et toute autre émotion.","La planification ne procure aucune satisfaction – l'émotion non traversée cherche une autre sortie (irritabilité, fatigue).","Plus de contrôle, moins de ressenti – la vie devient mécanique."],behaviors:["Vous planifiez tout – et vous ne ressentez pas vraiment ce que vous vivez.","Même pendant les moments de repos, vous êtes dans l'anticipation.","L'irritabilité ou la fatigue inexpliquée peuvent être les seuls signaux d'une émotion bloquée.","Le crash arrive sans avertissement, parce que les systèmes d'alerte normaux sont court-circuités."]},
  bleu_orange:{name:"La Réussite sans Joie",tagline:"Vous réussissez objectivement – et vous ne le ressentez pas",desc:"Votre masque Bleu a besoin de réussir, de maîtriser, d'être reconnu. Votre masque Orange empêche l'accès à la satisfaction émotionnelle. Les succès arrivent – et ne procurent rien. Pas de fierté, pas de joie, pas de sentiment d'accomplissement.",cycle:["Une réussite arrive – Bleu l'enregistre, Orange empêche de la ressentir.","Le vide persiste – Bleu cherche la prochaine maîtrise pour le combler.","La prochaine réussite produit le même vide.","Le besoin de reconnaissance augmente, sans jamais trouver de satisfaction."],behaviors:["Vous réussissez – et vous passez immédiatement à la suite, sans vous arrêter.","Vous avez besoin de reconnaissance externe de façon compulsive.","Vos relations sont efficaces mais peu profondes.","Le burnout peut survenir précisément après un succès – quand tout devrait aller bien."]},
  indigo_orange:{name:"Performer sans Ressentir",tagline:"Vous excellez – mais vous ne savez pas si vous êtes satisfait",desc:"Votre masque Indigo exige la perfection. Votre masque Orange déconnecte l'émotion. Ensemble, ils créent une performance sans retour sensoriel : vous travaillez, vous livrez, vous recommencez – sans jamais savoir si ce que vous faites vous plaît.",cycle:["Un travail est terminé – Indigo l'évalue immédiatement.","Orange empêche de ressentir la fierté ou la satisfaction.","Le standard monte – puisque rien ne satisfait, il faut faire plus.","L'épuisement s'installe sans signal émotionnel – jusqu'à un arrêt brutal."],behaviors:["Vous travaillez énormément – sans savoir si vous êtes satisfait·e.","Votre auto-critique est détachée, comme une checklist impersonnelle.","La procrastination peut vous surprendre – elle traduit une démotivation profonde.","Le crash est soudain, sans les signaux d'alerte habituels."]},
  orange_violet:{name:"L'Absence à Soi",tagline:"Vous ne savez pas ce que vous ressentez, ni qui vous êtes",desc:"Votre masque Orange vous prive de l'accès à vos ressentis. Votre masque Violet vous prive d'une identité stable. Double absence : le monde intérieur est flou, silencieux. Certaines personnes décrivent une impression de vivre « à côté de leur vie ».",cycle:["Un moment de calme arrive – Violet cherche qui vous êtes, sans réponse claire.","Orange empêche l'accès émotionnel – la question identitaire ne peut être ressentie.","Vous fonctionnez en pilote automatique – les décisions sont dictées par l'extérieur.","Le vide existentiel s'approfondit silencieusement."],behaviors:["Vous vivez certains moments avec une impression de distance, comme si vous vous observiez.","Vous avez du mal à dire ce que vous voulez, aimez, ou désirez – par manque d'accès à ces informations.","Les décisions importantes sont souvent dictées par les attentes extérieures.","Ce n'est pas permanent – le simple fait de le nommer commence à faire bouger les choses."]},
  bleu_vert:{name:"Tenir pour ne pas Perdre",tagline:"Vous avez peur de perdre l'autre, alors vous le contrôlez pour le garder",desc:"Votre masque Vert a peur d'être abandonné. Votre masque Bleu contrôle pour se sentir en sécurité. Ensemble, ils créent un cycle où le besoin de l'autre se transforme en surveillance et en contrôle. L'amour y est réel, mais l'expression en est déformée par la peur.",cycle:["La peur d'être quitté·e s'active – Vert cherche à sécuriser le lien.","Bleu transforme cette peur en comportements de contrôle – vérifications, exigences.","L'autre ressent la pression et s'éloigne – confirmant la menace d'abandon.","Le contrôle se resserre – créant l'éloignement qu'il cherchait à éviter."],behaviors:["Vous vérifiez où est l'autre, avec qui, ce qu'il fait – c'est une tentative de vous rassurer.","Vous oscillez entre demande intense de proximité et retrait – l'autre ne comprend pas ces alternances.","Vous justifiez votre surveillance comme de la sollicitude.","Votre partenaire finit par s'épuiser, et la relation se fragilise."]},
  vert_violet:{name:"La Fusion Identitaire",tagline:"Vous devenez ce que l'autre attend – au point de ne plus savoir qui vous êtes",desc:"Votre masque Vert a besoin d'être accepté, alors il s'adapte. Votre masque Violet cherche une identité, alors il la trouve dans le reflet des autres. Ensemble, ils créent une dissolution progressive de soi dans la relation.",cycle:["Une relation importante se développe – Vert s'adapte pour ne pas être rejeté.","Violet trouve dans cette adaptation une identité – le reflet de l'autre devient un repère.","Vous disparaissez progressivement – vos goûts, vos valeurs, vos désirs s'effacent.","La peur de la séparation devient existentielle – quitter l'autre serait perdre la seule identité disponible."],behaviors:["Vous adoptez naturellement les goûts et valeurs des personnes qui comptent.","Vous avez du mal à répondre à la question « qu'est-ce que tu aimes, toi, indépendamment des autres ? »","L'idée d'une séparation déclenche une angoisse disproportionnée.","Votre grande capacité d'adaptation a un coût : vous vous perdez dans vos relations importantes."]},
  bleu_violet:{name:"Le Pouvoir comme Identité",tagline:"Votre rôle est devenu votre seule façon d'exister",desc:"Votre masque Bleu a besoin de contrôler, de diriger, d'être celui ou celle qui gère. Votre masque Violet cherche une identité. Le rôle – le poste, la fonction, la place – devient la réponse. Dès qu'il est menacé, c'est tout votre sens de vous-même qui vacille.",cycle:["Le rôle est remis en question ou menacé – Violet perçoit une menace identitaire.","Bleu s'accroche au contrôle – c'est la seule identité disponible.","Plus le rôle est menacé, plus le contrôle devient rigide – tensions, conflits.","L'identité réelle, sous le rôle, reste inexplorée."],behaviors:["Votre rôle professionnel ou familial est la colonne vertébrale de votre identité.","L'idée de ne plus occuper ce rôle génère une anxiété profonde.","Votre valeur personnelle est indexée sur ce que vous gérez et décidez.","Vous avez construit une vie efficace autour du contrôle – et vous sentez confusément qu'il manque quelque chose."]},
  indigo_violet:{name:"L'Imposteur Existentiel",tagline:"Vous ne savez pas qui doit être parfait, mais vous exigez la perfection",desc:"Votre masque Indigo impose des standards élevés – peur de l'échec, peur du jugement. Votre masque Violet cherche une identité stable, mais ne la trouve pas. Les standards de perfection s'appliquent dans le vide : vous ne savez pas qui doit être parfait, seulement qu'il faut l'être.",cycle:["Un projet ou une situation se présente – Indigo active les standards.","Violet ne fournit pas d'identité stable pour les porter – les standards flottent, arbitraires.","L'imposture semble totale – vous jouez un rôle, imparfaitement.","Chaque nouvelle situation relance la même question sans réponse."],behaviors:["Vous changez souvent de direction – vous cherchez où vous serez enfin « assez » et « vous-même ».","Le sentiment d'imposture ne se limite pas au travail, il est existentiel.","Vos standards varient – parfois impossibles, parfois absents.","Ce n'est pas une question de compétence, c'est une configuration de protection qui crée cette double absence."]}
};

// ── TRIADES (16 entrées) ───────────────────────────────────────────────
const TRIADES_DATA = {
  jaune_orange_rouge:{name:"Le Corps en Alerte Permanente",tagline:"Votre corps est en état d'alerte, votre esprit cherche des certitudes, vos émotions sont inaccessibles",desc:"Trois systèmes de protection s'activent simultanément, créant une configuration d'anxiété diffuse et chronique. Le masque Rouge maintient le corps en vigilance constante. Le masque Jaune exige une certitude que le corps ne peut pas fournir. Le masque Orange coupe l'accès aux émotions – l'anxiété reste piégée dans le corps, qui devient le seul canal d'expression.",manifestations:["Ruminations sur la santé et le futur qui tournent en boucle, sans aboutir.","Vigilance corporelle intense couplée à une planification excessive des consultations.","Incapacité à ressentir l'anxiété comme une émotion – elle est vécue exclusivement par le corps.","Fatigue chronique difficile à expliquer – l'énergie est consommée par les trois systèmes en permanence."]},
  bleu_indigo_jaune:{name:"L'Exigence sans Seuil",tagline:"Trois systèmes qui exigent la perfection, la certitude et le contrôle – sans jamais s'arrêter",desc:"Le masque Jaune ne supporte pas l'incertitude. Le masque Bleu a besoin de maîtriser. Le masque Indigo exige des standards élevés. Ensemble, ces trois systèmes créent un fonctionnement où rien n'est jamais assez. La fatigue s'accumule, mais le système ne permet pas de s'arrêter.",manifestations:["Standards rigides appliqués à vous-même et aux autres, dans plusieurs domaines.","Réactions vives face à ce qui dévie du plan ou de la méthode prévue.","Fatigue chronique liée à l'impossibilité de relâcher l'exigence.","Relations professionnelles et personnelles marquées par une tension liée au perfectionnisme et au contrôle."]},
  indigo_orange_vert:{name:"L'Épuisement Invisible",tagline:"Vous vous effacez, vous ne ressentez plus, et vous exigez la perfection – le tout en silence",desc:"Trois effacements simultanés. Le masque Vert vous fait disparaître dans les relations. Le masque Indigo vous efface parce qu'être visible, c'est être évaluable. Le masque Orange coupe l'accès à ce que vous ressentez, rendant la souffrance invisible même à vos propres yeux.",manifestations:["Sur-adaptation relationnelle permanente – vous disparaissez dans les besoins des autres.","Auto-dépréciation silencieuse, jamais exprimée, souvent inconsciente.","Retrait émotionnel progressif que vous interprétez comme de la sérénité – jusqu'à l'effondrement.","Sentiment de vide masqué par une disponibilité constante aux autres."]},

  indigo_orange_violet:{name:"L'Identité en Suspens",tagline:"Qui suis-je, que dois-je ressentir, et est-ce que ça suffit ?",desc:"Trois absences se conjuguent. Votre masque Violet ne sait pas qui il est. Votre masque Orange ne sait pas ce qu'il ressent. Votre masque Indigo exige que ce « je » flou soit parfait. Le résultat est un épuisement existentiel profond.",manifestations:["Vous avez du mal à répondre à la question « qui suis-je ? » et « qu'est-ce que je ressens ? »","Vos exigences envers vous-même varient selon les jours, les contextes, les personnes.","Vous fonctionnez en pilote automatique – vous faites ce qu'il faut, sans savoir pourquoi.","La question « à quoi ça sert ? » peut surgir brutalement, souvent après une réussite."]},

// ── ALGORITHME DÉTECTION ───────────────────────────────────────────────
const TIEBREAK_ORDER = ['jaune','rouge','indigo','vert','bleu','orange','violet'];

// ── DETECT PROFILE ─────────────────────────────────────────────────────
const TIEBREAK_ORDER = ['jaune','rouge','indigo','vert','bleu','orange','violet'];

function detectProfile(pct) {
  const sorted = Object.entries(pct)
    .filter(([k]) => MASKS.includes(k))
    .sort((a, b) => b[1] - a[1] || TIEBREAK_ORDER.indexOf(a[0]) - TIEBREAK_ORDER.indexOf(b[0]));

  const masks = sorted.map(x => x[0]);
  const scores = sorted.map(x => x[1]);

  const S1 = scores[0] || 0;
  const S2 = scores[1] || 0;
  const S3 = scores[2] || 0;
  const S4 = scores[3] || 0;
  const S5 = scores[4] || 0;

  const res = {
    type: 'mono',
    subtype: 'residuel',
    primary: masks[0] || null,
    secondary: masks[1] || null,
    tertiary: masks[2] || null,
    scores: pct,
    sorted
  };

  if (S1 < 50) {
    return { ...res, type: 'adaptatif', subtype: S1 < 30 ? 'equilibre' : 'vigilant' };
  }

  const maxMin = Math.max(...scores) - Math.min(...scores);
  const active60 = scores.filter(v => v >= 60).length;

  if (active60 >= 5 && maxMin <= 20) {
    return { ...res, type: 'pan', subtype: 'masques', primary: masks[0], secondary: masks[1], tertiary: masks[2] };
  }

  if (S1 >= 60 && S2 >= 55 && S3 >= 55 && (S1 - S2) <= 15 && (S2 - S4) > 10) {
    return { ...res, type: 'triade', subtype: 'ouverte', primary: masks[0], secondary: masks[1], tertiary: masks[2] };
  }

  if (S1 >= 55 && S2 >= 55 && S3 >= 55 && (S1 - S2) <= 10) {
    return { ...res, type: 'triade', subtype: 'serree', primary: masks[0], secondary: masks[1], tertiary: masks[2] };
  }

  if (S1 >= 65 && S2 >= 65 && S3 < 55 && (S1 - S2) <= 10) {
    return { ...res, type: 'dyade', subtype: 'forte', primary: masks[0], secondary: masks[1] };
  }

  if (S1 >= 65 && S2 >= 65 && S3 >= 55 && S3 <= 64 && (S1 - S2) <= 10) {
    return { ...res, type: 'dyade', subtype: 'forte_tertiaire', primary: masks[0], secondary: masks[1], tertiary: masks[2] };
  }

  if (S1 >= 55 && S2 >= 55 && S3 < 50 && (S1 - S2) <= 10) {
    return { ...res, type: 'dyade', subtype: 'moderee', primary: masks[0], secondary: masks[1] };
  }

  if (S1 >= 75 && S2 >= 60 && (S1 - S2) >= 11 && (S1 - S2) <= 20) {
    return { ...res, type: 'mono', subtype: 'dominant_secondaire_notable', primary: masks[0], secondary: masks[1] };
  }

  if (S1 >= 75 && S2 < 55 && (S1 - S2) > 20) {
    return { ...res, type: 'mono', subtype: 'dominant_pur', primary: masks[0] };
  }

  if (S1 >= 60 && S1 <= 74 && S2 < 50 && (S1 - S2) > 15) {
    return { ...res, type: 'mono', subtype: 'fort', primary: masks[0] };
  }

  if (S1 >= 50 && S1 <= 59) {
    return { ...res, type: 'mono', subtype: 'modere', primary: masks[0] };
  }

  return res;
}
function computeSPA(sc) {
  const t = MASKS.reduce((s,m)=>s+(sc[m]||0),0);
  return Math.max(0,Math.min(100,Math.round(100-t/7)));
}

function getLevel(pct) {
  if (pct>=85) return 'Dominant';
  if (pct>=70) return 'Élevé';
  if (pct>=50) return 'Significatif';
  if (pct>=30) return 'Modéré';
  return 'Résiduel';
}

function getDyade(a,b) {
  if (!a||!b) return null;
  return DYADES_DATA[[a,b].sort().join('_')]||null;
}
function getTriade(masks) {
  return TRIADES_DATA[[...masks].sort().join('_')]||null;
}

// ── SAVE TO NEON ───────────────────────────────────────────────────────
async function saveToNeon(pct, prof, email, prenom) {
  try {
    await fetch('https://valeur-backend-api.vercel.app/api/save-profile', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:email||null,prenom:prenom||null,scores:pct,dominant:prof.masks[0],secondary:prof.secondary||prof.masks[1]||null,profil_type:prof.type,profil_subtype:prof.subtype||null,spa:computeSPA(pct),created_at:new Date().toISOString()})
    });
  } catch(e) { console.log('Save failed silently:',e); }
}

// ── BUILD THOUGHTS ─────────────────────────────────────────────────────
function buildThoughts(prof) {
  const dom=prof.masks[0];
  if (prof.type==='triade') {
    return `<div class="thought-primary">${PLAYLIST[prof.masks[0]]?.thoughts[0]||''}</div>
            <div class="thought-secondary">${PLAYLIST[prof.masks[1]]?.thoughts[0]||''}</div>
            <div class="thought-tertiary">${PLAYLIST[prof.masks[2]]?.thoughts[0]||''}</div>`;
  } else if (prof.type==='dyade') {
    const t2 = prof.secondary ? (PLAYLIST[prof.secondary]?.thoughts[0]||'') : '';
    return `<div class="thought-primary">${PLAYLIST[dom]?.thoughts[0]||''}</div>
            ${t2?`<div class="thought-secondary">${t2}</div>`:''}`;
  } else if (dom==='violet' && !prof.secondary) {
    return `<div class="thought-primary">${VIOLET_MONO.miroir}</div>`;
  }
  return `<div class="thought-primary">${PLAYLIST[dom]?.thoughts[0]||''}</div>`;
}

// ── BUILD BADGE ────────────────────────────────────────────────────────
function buildBadge(prof) {
  const dom=prof.masks[0], sec=prof.secondary||null;
  const meta=MASK_META[dom];
  if (prof.type==='pan') {
    const top3=prof.masks.slice(0,3);
    return `<div class="badge-config badge-pan">${top3.map(m=>`<span class="badge-mask" style="background:${MASK_META[m].color}">${MASK_META[m].emoji} ${MASK_META[m].name}</span>`).join('')}<span class="badge-label">Pan-masques</span></div>`;
  } else if (prof.type==='triade') {
    return `<div class="badge-config badge-triade">${prof.masks.map(m=>`<span class="badge-mask" style="background:${MASK_META[m].color}">${MASK_META[m].emoji} ${MASK_META[m].name}</span>`).join('')}</div>`;
  } else if (prof.type==='dyade') {
    const secM=MASK_META[sec];
    return `<div class="badge-config badge-dyade"><span class="badge-mask" style="background:${meta.color}">${meta.emoji} ${meta.name}</span><span class="badge-plus">+</span><span class="badge-mask" style="background:${secM.color}">${secM.emoji} ${secM.name}</span></div>`;
  } else if (dom==='violet' && !sec) {
    return `<div class="badge-config badge-violet-special"><span class="badge-mask" style="background:${meta.color}">${meta.emoji} ${meta.name}</span><span class="badge-faux-self">Faux self</span></div>`;
  }
  return `<div class="badge-config badge-mono"><span class="badge-mask" style="background:${meta.color}">${meta.emoji} ${meta.name}</span>${sec?`<span class="badge-secondary">+ ${MASK_META[sec]?.emoji} ${MASK_META[sec]?.name}</span>`:''}</div>`;
}

// ── BUILD BARS ─────────────────────────────────────────────────────────
function buildBars(pct) {
  return `<div class="scores-section"><div class="section-label">Votre empreinte par masque</div><div class="scores-grid">${MASKS.map(m=>`<div class="score-col"><div class="score-bar-wrap"><div class="score-bar-fill" style="background:${MASK_META[m].color}" data-target="${pct[m]||0}"></div></div><div class="score-emoji">${MASK_META[m].emoji}</div><div class="score-pct">${pct[m]||0}%</div></div>`).join('')}</div></div>`;
}

// ── BUILD SPA ──────────────────────────────────────────────────────────
function buildSPA(spa) {
  const r=44, circ=2*Math.PI*r, offset=circ*(1-spa/100);
  return `<div class="spa-section"><div class="spa-arc"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="${r}" fill="none" stroke="rgba(240,234,225,.06)" stroke-width="8"/><circle cx="50" cy="50" r="${r}" fill="none" stroke="${spa>=60?'#C9A84C':spa>=40?'#5C3280':'#B5312A'}" stroke-width="8" stroke-linecap="round" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}" style="transition:stroke-dashoffset 1.4s ease"/></svg><div class="spa-number">${spa}%</div></div><div class="spa-info"><div class="spa-title">Score de Présence Authentique</div><div class="spa-desc">Les moments où vous agissez depuis ce que vous êtes vraiment, sans que la peur décide à votre place.</div></div></div>`;
}

// ── BUILD NEURO INTRO ──────────────────────────────────────────────────
function buildNeuroIntro(prof) {
  const key=prof.type==='pan'?'pan':prof.type==='triade'?'triade':prof.type==='dyade'?'dyade':prof.type==='adaptatif'?'adaptatif':'mono';
  return `<div class="neuro-intro"><p>${NEURO_INTRO[key]}</p></div>`;
}

// ── BUILD PROGRESSION ──────────────────────────────────────────────────
function buildProgressionSection(pct) {
  const sorted=Object.entries(pct).filter(([k])=>MASKS.includes(k)).sort((a,b)=>b[1]-a[1]);
  return `<div class="section-label">La hiérarchie de vos protections</div><div class="progression-list">${sorted.map(([m,v],i)=>{
    const lv=v>=70?'élevé':v>=50?'significatif':v>=30?'modéré':'résiduel';
    const desc=v>=70?'Dirige activement vos comportements':v>=50?'Schémas automatiques réguliers':v>=30?'Influence certains choix':'Présent mais non gouvernant';
    return `<div class="prog-item ${i===0?'prog-dominant':''}"><div class="prog-rank">${i+1}</div><div class="prog-emoji">${MASK_META[m].emoji}</div><div class="prog-bar-wrap"><div class="prog-label-row"><span class="prog-name">${MASK_META[m].name}</span><span class="prog-badge prog-badge-${lv}">${lv.charAt(0).toUpperCase()+lv.slice(1)} · ${v}%</span></div><div class="prog-track"><div class="prog-fill" style="background:${MASK_META[m].color}" data-target="${v}"></div></div><div class="prog-desc">${desc}</div></div></div>`;
  }).join('')}</div>`;
}

// ── BUILD CARD (Canvas 1080×1080) ─────────────────────────────────────
function buildCard(pct, prof) {
  const canvas=document.getElementById('share-canvas');
  if (!canvas) return;
  const ctx=canvas.getContext('2d');
  const W=1080,H=1080;
  canvas.width=W; canvas.height=H;
  const dom=prof.masks[0], sec=prof.secondary||null;
  const meta=MASK_META[dom];
  const col=meta.color;
  const spa=computeSPA(pct);
  const MCOLS={rouge:'#B5312A',orange:'#C4581F',jaune:'#B8930A',vert:'#2D7A4F',bleu:'#1D5F8A',indigo:'#5C3280',violet:'#7A3594'};
  const dd=sec?getDyade(dom,sec):null;
  const td=prof.type==='triade'?getTriade(prof.masks):null;

  let revelationLine='', symptome='', liberation='', configName='';
  if (prof.type==='pan') {
    revelationLine=PAN_MASQUE_V2.tagline; configName=PAN_MASQUE_V2.nom;
    symptome=PAN_MASQUE_V2.symptome_universel; liberation=PAN_MASQUE_V2.liberation;
  } else if (td) {
    revelationLine=td.tagline; configName=td.name;
    const m0=td.manifestations[0]||''; symptome=m0.length>88?m0.slice(0,85)+'…':m0;
    liberation=FORCES_LIBEREES[dom]?.titre||'';
  } else if (dd && sec) {
    revelationLine=dd.tagline; configName=dd.name;
    const b0=dd.behaviors[0]||''; symptome=b0.length>88?b0.slice(0,85)+'…':b0;
    liberation=FORCES_LIBEREES[dom]?.titre||'';
  } else {
    const ms=CARD_SYMPTOMES_MONO[dom]||{};
    symptome=ms.symptome||''; liberation=ms.liberation||'';
    revelationLine=FORCES_LIBEREES[dom]?.titre||'';
  }
  if (revelationLine.length>90) revelationLine=revelationLine.slice(0,87)+'…';
  const thought=PLAYLIST[dom]?.thoughts[0]||'';
  const level=getLevel(pct[dom]||0);

  function wrapText(text,maxW) {
    const words=text.split(' '),lines=[];
    let cur='';
    words.forEach(w=>{
      const test=cur+(cur?' ':'')+w;
      if(ctx.measureText(test).width>maxW&&cur){lines.push(cur);cur=w;}else{cur=test;}
    });
    if(cur) lines.push(cur);
    return lines;
  }

  const drawContent=()=>{
    const X=52,W2=W-X-40;
    ctx.fillStyle='#1A1814'; ctx.fillRect(0,0,W,H);
    const g=ctx.createRadialGradient(W*.3,H,0,W*.3,H,H*.9);
    g.addColorStop(0,col+'40'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    const total=MASKS.reduce((s,m)=>s+(pct[m]||0),0)||1;
    let yb=0;
    MASKS.forEach(m=>{
      const hb=Math.round((pct[m]||0)/total*H);
      ctx.fillStyle=MCOLS[m]; ctx.fillRect(0,yb,18,hb); yb+=hb;
    });
    ctx.fillStyle=col; ctx.fillRect(W-6,0,6,H);
    ctx.textBaseline='alphabetic';
    ctx.font='700 26px Arial, sans-serif'; ctx.fillStyle='#C9A84C'; ctx.letterSpacing='6px';
    const lw=ctx.measureText('V.A.L.E.U.R©').width;
    ctx.fillText('V.A.L.E.U.R©',(W-lw)/2,88); ctx.letterSpacing='0px';
    ctx.fillStyle='#C9A84C'; ctx.globalAlpha=.35; ctx.fillRect(X,106,W2,1); ctx.globalAlpha=1;
    ctx.font='600 20px Arial, sans-serif'; ctx.letterSpacing='4px'; ctx.fillStyle=col;
    ctx.fillText((meta.emoji||'')+' '+(meta.name||dom).toUpperCase(),X,156); ctx.letterSpacing='0px';
    ctx.font='400 16px Arial, sans-serif'; ctx.fillStyle='rgba(247,244,238,.45)';
    ctx.fillText(level+' · '+((pct[dom]||0)+'% d\'emprise'),X,190);
    ctx.fillStyle='rgba(247,244,238,.1)'; ctx.fillRect(X,212,W2,1);
    ctx.font='500 16px Arial, sans-serif'; ctx.letterSpacing='3px'; ctx.fillStyle='rgba(247,244,238,.4)';
    ctx.fillText('CE QUI REVIENT DANS VOTRE TÊTE',X,248); ctx.letterSpacing='0px';
    ctx.font='italic 300 48px Georgia, serif'; ctx.fillStyle='#FFFFFF';
    const tLines=wrapText('« '+thought+' »',W2-20);
    let ty=310; tLines.forEach(l=>{ctx.fillText(l,X+16,ty);ty+=64;});
    const sep1Y=Math.max(ty+20,490);
    ctx.fillStyle=col+'55'; ctx.fillRect(X,sep1Y,W2,2);
    ctx.font='600 18px Arial, sans-serif'; ctx.letterSpacing='3px'; ctx.fillStyle=col;
    ctx.fillText('CE QUE ÇA SIGNIFIE',X,sep1Y+42); ctx.letterSpacing='0px';
    ctx.font='italic 300 34px Georgia, serif'; ctx.fillStyle='#F7F4EE';
    const rLines=wrapText(revelationLine,W2);
    let ry=sep1Y+88; rLines.forEach(l=>{ctx.fillText(l,X,ry);ry+=46;});
    if (configName) {
      ctx.font='400 16px Arial, sans-serif'; ctx.fillStyle='#C9A84C';
      ctx.fillText(configName,X,ry+14); ry+=38;
    }
    const barY=ry+20, bw=Math.floor(W2/7), barH=44;
    const MLAB={rouge:'R',orange:'O',jaune:'J',vert:'V',bleu:'B',indigo:'I',violet:'Vi'};
    [...MASKS].sort((a,b)=>(pct[b]||0)-(pct[a]||0)).forEach((m,i)=>{
      const bx=X+i*bw, fill=Math.round((pct[m]||0)/100*barH);
      ctx.fillStyle='rgba(247,244,238,.08)';
      ctx.beginPath(); if(ctx.roundRect) ctx.roundRect(bx+2,barY,bw-4,barH,3); else ctx.rect(bx+2,barY,bw-4,barH); ctx.fill();
      ctx.fillStyle=MCOLS[m];
      ctx.beginPath(); if(ctx.roundRect) ctx.roundRect(bx+2,barY+(barH-fill),bw-4,fill,3); else ctx.rect(bx+2,barY+(barH-fill),bw-4,fill); ctx.fill();
      ctx.font='600 14px Arial, sans-serif'; ctx.fillStyle='rgba(247,244,238,.55)';
      const ll=ctx.measureText(MLAB[m]).width;
      ctx.fillText(MLAB[m],bx+(bw-ll)/2,barY+barH+20);
    });
    const symY=barY+barH+44;
    if (symptome) {
      ctx.fillStyle=col+'44'; ctx.fillRect(X,symY,W2,1);
      ctx.font='600 13px Arial, sans-serif'; ctx.letterSpacing='2px'; ctx.fillStyle='rgba(247,244,238,.5)';
      ctx.fillText('CE QUE ÇA RESSEMBLE AU QUOTIDIEN',X,symY+22); ctx.letterSpacing='0px';
      ctx.font='italic 300 20px Georgia, serif'; ctx.fillStyle='#FFFFFF';
      const sLines=wrapText(symptome,W2-10); let sy=symY+46;
      sLines.forEach(l=>{ctx.fillText(l,X,sy);sy+=26;});
      if (liberation) {
        ctx.font='400 13px Arial, sans-serif'; ctx.fillStyle='#C9A84C';
        const lt='→ Ce qui pourrait être libéré : '+liberation;
        ctx.fillText(lt.length>72?lt.slice(0,69)+'…':lt,X,sy+6);
      }
    }
    const footY=H-52;
    ctx.fillStyle='rgba(247,244,238,.08)'; ctx.fillRect(X,footY,W2,1);
    ctx.font='400 16px Arial, sans-serif'; ctx.fillStyle='#C9A84C';
    ctx.fillText(spa+'% de présence authentique (SPA)',X,footY+26);
    ctx.font='400 14px Arial, sans-serif'; ctx.letterSpacing='1px'; ctx.fillStyle='rgba(247,244,238,.25)';
    ctx.fillText('questionnaire.psyh.fr  ·  #methodeVALEUR',X,footY+48); ctx.letterSpacing='0px';
  };

  drawContent();

  const logoImg=document.getElementById('logo-valeur-img');
  const overlayLogo=()=>{
    if(!logoImg||!logoImg.naturalHeight) return;
    ctx.globalAlpha=.07; const ls=580;
    ctx.drawImage(logoImg,(W-ls)/2,(H-ls)/2-30,ls,ls); ctx.globalAlpha=1;
  };
  if (logoImg&&logoImg.complete&&logoImg.naturalHeight>0) overlayLogo();
  else if (logoImg) logoImg.addEventListener('load',overlayLogo,{once:true});

  const dlBtn=document.getElementById('btn-dl-card');
  if (dlBtn) dlBtn.onclick=()=>{
    const a=document.createElement('a'); a.download='portrait-valeur.png';
    a.href=canvas.toDataURL('image/png'); a.click();
  };
  const shareBtn=document.getElementById('btn-share-card');
  if (shareBtn) shareBtn.onclick=async()=>{
    const txt="J'ai découvert ce qui me bloque vraiment au quotidien. C'est précis, utile, et ça change ma manière de me voir. → questionnaire.psyh.fr";
    if (navigator.share) {
      canvas.toBlob(async blob=>{
        try { await navigator.share({files:[new File([blob],'portrait-valeur.png',{type:'image/png'})],text:txt}); }
        catch(e) { await navigator.clipboard.writeText(txt); alert('Lien copié !'); }
      });
    } else { await navigator.clipboard.writeText(txt); alert('Message copié : '+txt); }
  };
}

// ── INIT ───────────────────────────────────────────────────────────────
(function init() {
  const params=new URLSearchParams(location.search);
  const pct={};
  MASKS.forEach(m=>{
    const v=params.get(m);
    if (v!==null) pct[m]=Math.min(100,Math.max(0,parseInt(v)||0));
  });

  const loader=document.getElementById('page-loader');
  const wrap=document.getElementById('portrait-wrap');

  if (Object.keys(pct).length!==7) {
    if (loader) { loader.classList.add('out'); setTimeout(()=>loader.style.display='none',800); }
    wrap.innerHTML='<p style="text-align:center;padding:40px;color:rgba(240,234,225,.6)">Aucun résultat. Veuillez repasser le questionnaire.<br><a href="https://questionnaire.psyh.fr" style="color:#C9A84C">← Recommencer</a></p>';
    return;
  }

  const email=params.get('email')||'';
  const prenom=params.get('prenom')||'';
  const isAdmin=params.get('admin')==='VALEUR-ADMIN-2025';
  const prof=detectProfile(pct);

  saveToNeon(pct, prof, email, prenom);

  wrap.innerHTML=buildPortrait(prof, pct);

  if (loader) { loader.classList.add('out'); setTimeout(()=>loader.style.display='none',800); }

  setTimeout(animateBars, 150);

  setTimeout(()=>buildCard(pct, prof), 300);

  if (!isAdmin && email) {
    try {
      emailjs.init('Qamyb35cCRJ5Pulqs');
      const dom=prof.masks[0], sec=prof.secondary||prof.masks[1]||null;
      const dd=sec?getDyade(dom,sec):null;
      const td=prof.type==='triade'?getTriade(prof.masks):null;
      const tagline=(td?.tagline)||(dd?.tagline)||(prof.type==='pan'?PAN_MASQUE_V2.tagline:'')||FORCES_LIBEREES[dom]?.titre||'';
      const configName=(td?.name)||(dd?.name)||(prof.type==='pan'?PAN_MASQUE_V2.nom:MASK_META[dom].name)||'';
      emailjs.send('Questionnaire VALEUR','template_inscription',{
        to_email:email, prenom:prenom||'Vous',
        masque_dominant:MASK_META[dom].name, peur_centrale:MASK_META[dom].peur,
        tagline_config:tagline, config_name:configName,
        spa_score:computeSPA(pct)+'%', lien_rapport:location.href,
        lien_psycho:'https://www.doctolib.fr/psychologue/bordeaux/celine-bourbon',
        force_liberee:FORCES_LIBEREES[dom]?.titre||'',
        date_passation:new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})
      });
    } catch(e) { console.log('Email failed silently:',e); }
  }
})();
</script>
</body>
