<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>V.A.L.E.U.R© — Votre Portrait</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FCFAF7; --text: #2A2622; --text2: #4A4340; --text3: #8C827D;
            --gold: #C9A84C; --line: #E5E0D8; --card-bg: #F6F4F0;
            --rouge: #B5312A; --orange: #C4581F; --jaune: #B8930A;
            --vert: #2D7A4F; --bleu: #1D5F8A; --indigo: #5C3280; --violet: #7A3594;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            color: var(--text);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 24px 80px;
        }
        h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 400; color: var(--text); }
        h1 { font-size: clamp(36px, 6vw, 56px); line-height: 1.1; margin-bottom: 8px; }
        h2 { font-size: 22px; margin-bottom: 16px; color: var(--gold); }
        .chroma-bar {
            height: 4px;
            background: linear-gradient(90deg, var(--rouge), var(--orange), var(--jaune), var(--vert), var(--bleu), var(--indigo), var(--violet));
            margin-bottom: 48px;
        }
        .block {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 32px 28px;
            margin-bottom: 32px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
        }
        .mask-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 16px;
        }
        .mirror-phrase {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-style: italic;
            line-height: 1.5;
            color: var(--text);
            margin: 24px 0;
            padding-left: 16px;
            border-left: 3px solid var(--gold);
        }
        .reminder-box {
            background: #FFFDF7;
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 8px;
            padding: 16px 20px;
            margin: 20px 0;
            font-size: 14px;
            color: var(--text2);
            text-align: center;
        }
        .reminder-box strong { color: var(--gold); font-weight: 500; }
        .metaphor-box {
            background: #FFFDF7;
            border-left: 3px solid var(--gold);
            padding: 16px 20px;
            margin: 20px 0;
            font-size: 14px;
            color: var(--text2);
            font-style: italic;
        }
        .mechanism { display: flex; flex-direction: column; gap: 16px; margin: 24px 0; }
        .step { display: flex; gap: 16px; align-items: flex-start; }
        .step-num {
            width: 28px; height: 28px; border-radius: 50%;
            background: var(--gold); color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 14px; flex-shrink: 0;
        }
        .step-text { font-size: 15px; line-height: 1.6; }
        .force-box {
            background: linear-gradient(135deg, #FCFAF7 0%, #F3F1EC 100%);
            border-left: 3px solid var(--gold);
            padding: 20px 24px;
            border-radius: 0 8px 8px 0;
            margin: 24px 0;
        }
        .spa-section { display: flex; align-items: center; gap: 20px; margin: 32px 0; }
        .spa-ring { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
        .spa-ring svg { transform: rotate(-90deg); }
        .spa-value {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px; color: var(--gold);
        }
        .hero-mask {
            text-align: center; padding: 48px 20px 40px; margin-bottom: 32px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--card-bg) 0%, rgba(201,168,76,0.06) 100%);
            border: 1px solid rgba(201,168,76,0.15);
        }
        .hero-mask-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(48px, 8vw, 80px); font-weight: 300; line-height: 1;
            color: var(--text); margin-bottom: 12px;
        }
        .hero-separator { width: 60px; height: 2px; background: var(--gold); margin: 20px auto; }
        .hero-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px; font-style: italic; color: var(--text2);
            max-width: 500px; margin: 0 auto; line-height: 1.5;
        }
        .btn-print {
            display: inline-block; background: var(--gold); color: white;
            padding: 12px 28px; border-radius: 40px; font-size: 14px; font-weight: 500;
            text-decoration: none; cursor: pointer; border: none; margin-top: 16px;
        }
        .btn-print:hover { opacity: 0.9; }
        .cta-sep {
            width: 1px; height: 48px;
            background: linear-gradient(to bottom, transparent, rgba(201,168,76,.3), transparent);
            margin: 0 auto 32px;
        }
        .cta-btn {
            display: inline-flex; align-items: center; gap: 8px; padding: 14px 36px;
            border: 1px solid rgba(42,38,34,.2); background: transparent;
            color: var(--text2); font-family: 'DM Sans', sans-serif;
            font-size: 11px; font-weight: 500; letter-spacing: .2em; text-transform: uppercase;
            cursor: pointer; text-decoration: none; transition: all .25s;
        }
        .cta-btn:hover { border-color: var(--gold); color: var(--gold); }
        .footer-valeur {
            text-align: center; margin-top: 60px;
            border-top: 1px solid var(--line); padding-top: 28px;
        }
        .footer-valeur .fv-name {
            font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 500;
            color: var(--text3); letter-spacing: .06em; margin-bottom: 5px;
        }
        .footer-valeur .fv-method {
            font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 600;
            letter-spacing: .3em; text-transform: uppercase;
            color: rgba(201,168,76,.55); margin-bottom: 5px;
        }
        .footer-valeur .fv-book {
            font-family: 'Cormorant Garamond', serif; font-size: 12px;
            font-style: italic; color: var(--text3); opacity: .7;
        }
        a { color: var(--gold); text-decoration: none; border-bottom: 1px solid transparent; transition: border .2s; }
        a:hover { border-bottom-color: var(--gold); }
        @media(max-width:600px) { .container { padding: 40px 16px 60px; } .block { padding: 24px 18px; } }
        .roadmap { display:flex; flex-direction:column; gap:10px; margin:16px 0; }
        .roadmap-step { display:flex; align-items:flex-start; gap:12px; padding:12px 16px; background:rgba(255,255,255,.7); border-radius:8px; border-left:4px solid; }
        .roadmap-num { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:14px; flex-shrink:0; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
        .roadmap-text { font-size:14px; line-height:1.5; color:var(--text); }
        .micro-action { background:rgba(201,168,76,.08); border:1px solid rgba(201,168,76,.2); border-radius:8px; padding:18px 20px; margin-top:16px; }
        .micro-action-title { font-size:11px; font-weight:600; letter-spacing:.22em; text-transform:uppercase; color:var(--gold); margin-bottom:8px; }
        .battery { display:flex; align-items:center; gap:12px; margin:10px 0; }
        .battery-bar { flex:1; height:12px; background:rgba(0,0,0,.06); border-radius:6px; overflow:hidden; }
        .battery-fill { height:100%; border-radius:6px; background:linear-gradient(90deg,#C4581F,#B8930A,#2D7A4F); -webkit-print-color-adjust:exact; print-color-adjust:exact; }
        .cover-page{background:#FDFAF6;border:1px solid rgba(201,168,76,.18);border-radius:4px;padding:44px 40px 36px;margin-bottom:32px;position:relative;overflow:hidden;}
        .cover-letterhead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid rgba(201,168,76,.2);}
        .cover-brand{font-family:'DM Sans',sans-serif;}
        .cover-brand-main{font-size:13px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);}
        .cover-brand-sub{font-size:11px;color:var(--text3);letter-spacing:.08em;margin-top:3px;}
        .cover-meta{text-align:right;font-size:11px;color:var(--text3);line-height:1.7;}
        .cover-prenom-block{margin:28px 0 20px;}
        .cover-label{font-size:10px;font-weight:600;letter-spacing:.32em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
        .cover-prenom{font-family:'Cormorant Garamond',serif;font-size:clamp(38px,7vw,64px);font-weight:300;line-height:1.1;color:var(--text);letter-spacing:.02em;}
        .cover-divider{height:1px;background:linear-gradient(90deg,var(--gold),rgba(201,168,76,.15));margin:24px 0;}
        .cover-tagline{font-family:'Cormorant Garamond',serif;font-size:clamp(17px,2.5vw,22px);font-style:italic;font-weight:300;line-height:1.55;color:var(--text);text-align:center;padding:4px 0 2px;}
        .cover-tagline-attr{text-align:center;font-size:11px;color:var(--text3);letter-spacing:.1em;margin-top:8px;}
        .cover-concept{margin:24px 0;padding:20px 22px;background:rgba(255,255,255,.7);border-left:3px solid rgba(201,168,76,.35);border-radius:0 4px 4px 0;}
        .cover-concept p{font-size:14px;color:var(--text2);line-height:1.85;margin:0;}
        .cover-findings{margin-top:24px;}
        .cover-findings-label{font-size:10px;font-weight:600;letter-spacing:.32em;text-transform:uppercase;color:var(--text3);margin-bottom:16px;}
        .cover-masks{display:flex;gap:16px;flex-wrap:wrap;}
        .cover-mask-card{flex:1;min-width:180px;padding:16px 18px;border-radius:4px;border:1px solid rgba(0,0,0,.06);background:#fff;}
        .cover-mask-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px;vertical-align:middle;}
        .cover-mask-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;margin:8px 0 4px;letter-spacing:.03em;}
        .cover-mask-score{font-size:28px;font-weight:600;line-height:1;margin-bottom:6px;}
        .cover-mask-peur{font-size:12px;color:var(--text3);line-height:1.5;}
        @media(max-width:500px){.cover-masks{flex-direction:column;}.cover-page{padding:32px 22px 28px;}}
        @media print{
            .cover-page{background:white!important;border:1px solid #DDD!important;page-break-after:always;margin-bottom:0;}
            .cover-prenom{font-size:48pt;}
            .cover-tagline{font-size:16pt;}
            .cover-mask-score{font-size:22pt;}
        }
        .rapport-header { display:none; }
        .rapport-footer { display:none; }
        .intro-dyade { border-top:3px solid var(--gold); }
        .mask-section { margin-bottom:0; }
        .mask-section-label {
            display:inline-block; padding:5px 18px; border-radius:0 20px 20px 0;
            font-size:11px; font-weight:600; letter-spacing:.15em; text-transform:uppercase;
            margin-bottom:20px; margin-left:-28px;
        }
        .compact-block { margin-bottom:20px; padding:24px 22px; }
        .eyebrow { font-size:10px; font-weight:600; letter-spacing:.32em; text-transform:uppercase; color:rgba(201,168,76,.75); margin-bottom:8px; }
        .page-break-before { page-break-before:auto; }
        .no-print { }
        .print-only { display:none; }
        @media print {
            @page { size:A4; margin:22mm 20mm 20mm 22mm; }
            @page :first { margin-top:15mm; }
            * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
            body { background:white !important; color:#1A1714 !important; font-size:11.5pt; line-height:1.75; }
            .container { max-width:100%; padding:0; }
            .btn-print, #share-section,
            .no-print,
            .footer-valeur { display:none !important; }
            .rapport-header { display:block !important; margin-bottom:24pt; }
            .rapport-footer { display:block !important; margin-top:24pt; }
            .print-only { display:block !important; }
            .block { background:white !important; box-shadow:none !important;
                     border:1px solid #DDD !important; margin-bottom:14pt;
                     padding:18pt 16pt; page-break-inside:avoid; }
            .compact-block { padding:14pt 16pt; }
            .intro-dyade { border-top:3pt solid #C9A84C !important; }
            .hero-mask { background:white !important; border:1px solid #DDD !important;
                         page-break-after:avoid; }
            h1 { font-size:26pt; }
            h2 { font-size:15pt; color:#1A1714 !important; }
            .mirror-phrase { font-size:14pt; border-left:3pt solid #C9A84C; }
            .hero-mask-name { font-size:32pt; }
            .metaphor-box { border-left:3pt solid #C9A84C; }
            .hero-tagline, p { color:#2A2622 !important; }
            [style*="color:var(--text2)"] { color:#2A2622 !important; }
            [style*="color:var(--text3)"] { color:#6B6460 !important; }
            .page-break-before { page-break-before:always !important; }
            .mask-section { page-break-inside:avoid; }
            .mechanism { page-break-inside:avoid; }
            .force-box { page-break-inside:avoid; }
            .spa-ring { page-break-inside:avoid; }
            p { orphans:3; widows:3; }
            h2 { page-break-after:avoid; }
            h1 { page-break-after:avoid; }
            .chroma-bar { -webkit-print-color-adjust:exact; height:4pt; }
            .mask-section-label { margin-left:0 !important; border-radius:4px; }
            .spa-ring svg circle { stroke-width:6 !important; }
            a { color:inherit !important; text-decoration:none !important; border:none !important; }
            a[href]:after { content:none !important; }
        }
        .grid7 { display:grid; grid-template-columns:1fr 1fr; gap:10px 18px; }
        .grid7-cell { padding:10px 12px; border:1px solid rgba(0,0,0,.06); border-radius:8px; background:rgba(255,255,255,.5); }
        .grid7-top { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
        .grid7-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
        .grid7-name { font-weight:600; font-size:14px; }
        .grid7-line { font-size:12.5px; line-height:1.5; color:var(--text2); margin-top:2px; }
        .grid7-tag { font-size:9.5px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--text3); margin-right:5px; }
        @media(max-width:560px){ .grid7{grid-template-columns:1fr;} }
        .carte { margin-top:14px; }
        .carte-row { display:flex; align-items:flex-start; gap:10px; padding:11px 0; border-bottom:1px solid rgba(0,0,0,.05); }
        .carte-dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; margin-top:5px; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
        .carte-main { flex:1; min-width:0; }
        .carte-head { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:4px; }
        .carte-name { font-weight:600; font-size:14px; flex-shrink:0; }
        .carte-fear { font-size:12.5px; color:var(--text2); }
        .carte-elan { font-size:13px; line-height:1.6; color:var(--text2); }
        .carte-bar { width:120px; height:7px; border-radius:4px; background:rgba(0,0,0,.06); overflow:hidden; flex-shrink:0; }
        .carte-fill { display:block; height:100%; border-radius:4px; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
        .carte-pct { font-size:12px; font-weight:700; color:var(--text2); min-width:38px; text-align:right; flex-shrink:0; }
        .zone-pill { font-size:9.5px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; padding:2px 8px; border-radius:20px; flex-shrink:0; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
        @media(max-width:600px){ .carte-bar{width:90px;} }
        .appui-card { padding:12px 16px; margin-top:10px; border-radius:0 8px 8px 0; background:rgba(255,255,255,.6); }
        .praticien-note { font-size:11.5px; line-height:1.6; color:var(--text3); font-style:italic; margin:8px 0 0; padding-top:8px; border-top:1px dashed rgba(0,0,0,.1); }
        .annexe-clinicien { margin-top:32px; border:1px solid rgba(201,168,76,.25); border-radius:8px; overflow:hidden; }
        .annexe-clinicien > summary { padding:16px 20px; cursor:pointer; font-size:13px; font-weight:600; color:var(--gold); letter-spacing:.04em; background:rgba(201,168,76,.05); list-style:none; }
        .annexe-clinicien > summary::-webkit-details-marker { display:none; }
        .annexe-clinicien > summary::before { content:"\25B8\u00a0"; }
        .annexe-clinicien[open] > summary::before { content:"\25BE\u00a0"; }
        .annexe-body { padding:4px 4px 12px; }
        .xr-line { padding:9px 14px; margin-bottom:7px; background:rgba(0,0,0,.015); border-radius:0 6px 6px 0; font-size:13.5px; line-height:1.6; }
        .xr-flip { font-size:11px; color:var(--text3); font-style:italic; }
        .xr-read { font-size:13px; line-height:1.65; color:var(--text2); }
        @media print { .xr-line{ page-break-inside:avoid; background:#FAFAF7!important; } }
        .sys-chain { display:flex; align-items:center; flex-wrap:wrap; gap:4px; justify-content:center; padding:6px 0; }
        .sys-node { display:inline-flex; align-items:center; gap:6px; }
        .sys-dot { width:12px; height:12px; border-radius:50%; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
        .sys-arrow { color:var(--text3); font-size:16px; margin:0 4px; }
        @media print { .grid7-dot,.sys-dot{ -webkit-print-color-adjust:exact; print-color-adjust:exact; } .low-card,.sys-chain{ page-break-inside:avoid; } }
        .bipolar { margin:22px 0; }
        .bipolar-poles { display:flex; align-items:stretch; gap:0; border-radius:10px; overflow:hidden; border:1px solid rgba(0,0,0,.07); }
        .bipolar-pole { flex:1; padding:16px 18px; }
        .bipolar-pole .bp-label { font-size:10px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; margin-bottom:7px; }
        .bipolar-pole .bp-text { font-size:14px; line-height:1.55; color:var(--text); }
        .bp-sensible { background:rgba(255,255,255,.7); }
        .bp-arrow { display:flex; align-items:center; justify-content:center; min-width:40px; font-size:18px; color:var(--text3); background:rgba(0,0,0,.03); }

        .bipolar-tension { margin-top:14px; padding:14px 16px; border-radius:0 8px 8px 0; font-size:13.5px; line-height:1.7; color:var(--text2); }
        .bipolar-resource { margin-top:12px; padding:14px 16px; border-radius:0 8px 8px 0; font-size:13.5px; line-height:1.7; color:var(--text2); background:rgba(201,168,76,.06); }
        .bipolar-score { margin-top:12px; padding:14px 16px; border-radius:0 8px 8px 0; font-size:13.5px; line-height:1.7; color:var(--text2); background:rgba(0,0,0,.025); }

        .vmap-cell { background:rgba(255,255,255,.7); border:1px solid rgba(201,168,76,.22); border-radius:10px; padding:16px 16px 14px; }
        .vmap-letter { font-family:'Cormorant Garamond',serif; font-size:30px; font-weight:400; line-height:1; color:var(--gold); }
        .vmap-word { font-size:13px; font-weight:600; letter-spacing:.04em; color:var(--text); margin:6px 0 5px; }

</head>
<body>
<div class="container" id="app">
    <div class="chroma-bar"></div>
    <div id="portrait-content"><p style="text-align:center;padding:60px 20px;color:var(--text3);">Chargement du portrait…</p></div>
</div>

<div class="footer-valeur no-print">
    <div class="fv-name">Céline Bourbon · Psychologue</div>
    <div class="fv-method">Méthode V.A.L.E.U.R© · Tous droits réservés · © 2026</div>
    <div class="fv-book"><em>De la peur à la joie d'être soi</em> · Éditions L'Harmattan</div>
</div>

<script>
// ══════════════════════════════════
// CONFIG
// ══════════════════════════════════
const VERCEL_API  = 'https://valeur-backend-api.vercel.app/api';

const MASKS = ['rouge','orange','jaune','vert','bleu','indigo','violet'];
const MASK_COLORS = {
    rouge: '#B5312A', orange: '#C4581F', jaune: '#B8930A',
    vert: '#2D7A4F', bleu: '#1D5F8A', indigo: '#5C3280', violet: '#7A3594'
};

// Pôle sensible → ressource (première lettre en minuscule, sans point final)
function sensibleResource(m) {
    const s = (BIPOLAR[m] && BIPOLAR[m].sensible) ? BIPOLAR[m].sensible.replace(/\.\s*$/, '') : '';
    return s ? s.charAt(0).toLowerCase() + s.slice(1) : '';
}

// ── Indice de charge globale (somme pondérée des écarts au seuil) ──────────
function computeCharge(scores) {
    return MASKS.reduce(function(acc, m){
        const s = scores[m]||0, t = MASK_THRESHOLDS[m];
        return acc + Math.max(0, (s - t) / (100 - t));
    }, 0);
}
function buildChargeGauge(scores) {
    const charge = computeCharge(scores);          // 0 → 7
    const pct = Math.round((charge / 7) * 100);
    const comment = charge < 1
        ? "Vos défenses sont ponctuelles et réversibles."
        : charge <= 3
            ? "Plusieurs protections tournent simultanément — un travail ciblé peut les apaiser."
            : "Vos systèmes de protection sont très mobilisés en ce moment. C'est une information précieuse : ils travaillent dur pour vous. Un accompagnement structuré peut les aider à se remettre au repos.";
    const col = charge < 1 ? '#2D7A4F' : charge <= 3 ? '#B8930A' : '#B5312A';
    return `<div style="margin-top:24px;border-top:1px solid var(--line);padding-top:18px;">
        <!-- Optimisation 5 : renommer la charge -->
        <p style="font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;">Indice de mobilisation de vos protections</p>
        <p style="font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:var(--text2);margin-bottom:14px;">
            Indice synthétique de la pression exercée par l'ensemble des protections actives (0 à 7).
        </p>
        <div class="battery">
            <span style="font-size:11px;color:var(--text3);min-width:70px;">Mobilisation</span>
            <div class="battery-bar"><div class="battery-fill" style="width:${pct}%;background:${col};"></div></div>
            <span style="font-size:13px;font-weight:700;color:${col};min-width:48px;text-align:right;">${charge.toFixed(1)}/7</span>
        </div>
        <p style="font-size:13.5px;color:var(--text2);line-height:1.7;margin-top:10px;">${comment}</p>
    </div>`;
}

// ── Indice d'amplification transdiagnostique (Orange/Jaune) ────────────────
function buildAmplification(profile, scores) {
    const dom = profile.primary;
    const o = profile.tdOrange, j = profile.tdJaune;
    if (!o && !j) return '';
    const domPct = scores[dom]||0;
    // Surcharge ressentie : Jaune amplifie, Orange bloque la régulation → fourchette
    const range = (o && j) ? [20,30] : j ? [15,25] : [10,20];
    const mids  = Math.round((range[0]+range[1])/2);
    const felt  = Math.min(100, domPct + Math.round(domPct * mids / 100));
    const mecas = [o?'le blocage émotionnel (Orange)':null, j?'l\u2019amplification par l\u2019incertitude (Jaune)':null]
        .filter(Boolean).join(' et ');
    const color = MASK_COLORS[dom];
    return `<div class="block" style="border-left:4px solid ${color}40;background:${color}06;">
        <h2 style="color:${color};">La pression réellement ressentie</h2>
        <p style="color:var(--text2);font-size:14.5px;line-height:1.85;margin-bottom:14px;">
            Votre masque dominant atteint <strong>${domPct}\u00a0%</strong>. Mais avec ${mecas},
            la pression ressentie est environ <strong>${range[0]} à ${range[1]}\u00a0%</strong> plus forte
            que ce que le score brut indique — soit l'équivalent d'environ <strong>${felt}\u00a0%</strong>.
        </p>
        <div class="battery">
            <span style="font-size:11px;color:var(--text3);min-width:70px;">Score brut</span>
            <div class="battery-bar"><div class="battery-fill" style="width:${domPct}%;background:${color};"></div></div>
            <span style="font-size:11px;font-weight:600;color:var(--text);">${domPct}%</span>
        </div>
        <div class="battery">
            <span style="font-size:11px;color:var(--text3);min-width:70px;">Ressenti</span>
            <div class="battery-bar"><div class="battery-fill" style="width:${felt}%;background:repeating-linear-gradient(45deg,${color},${color} 6px,${color}99 6px,${color}99 12px);"></div></div>
            <span style="font-size:11px;font-weight:600;color:${color};">${felt}%</span>
        </div>
        <p style="font-size:11px;color:var(--text3);margin-top:12px;font-style:italic;">
            Estimation fondée sur la co-activation entre patterns anxieux (Carleton et al., 2007\u00a0: 40\u201350\u00a0%).
        </p>
    </div>`;
}

// LECTURE SCORES (URL → localStorage → démo)
// ══════════════════════════════════
function readScores() {
    const p = new URLSearchParams(location.search);
    let scores = null;
    const urlS = {};
    MASKS.forEach(m => { if (p.has(m)) urlS[m] = Math.min(100, Math.max(0, parseInt(p.get(m)) || 0)); });
    if (p.has('spa')) urlS.spa = Math.min(100, Math.max(0, parseInt(p.get('spa')) || 0));
    if (Object.keys(urlS).filter(k => MASKS.includes(k)).length >= 7) scores = urlS;
    if (!scores || Object.keys(scores).filter(function(k){return MASKS.includes(k);}).length < 7) {
        return null;
    }
        if (!scores) {
        try { const ls = JSON.parse(localStorage.getItem('valeur_scores') || '{}'); if (ls && ls.rouge !== undefined) scores = ls; } catch(e) {}
    }
    if (!scores || Object.keys(scores).filter(function(k){return MASKS.includes(k);}).length < 7) {
        scores = { rouge:44, orange:38, jaune:73, vert:56, bleu:69, indigo:79, violet:32, spa:61 };
    }
    scores.prenom = p.get('prenom') || localStorage.getItem('valeur_prenom') || scores.prenom || '';
    scores.email  = p.get('email')  || localStorage.getItem('valeur_email')  || scores.email  || '';
    scores.pid    = p.get('pid')    || scores.pid || '';
    scores.items  = p.get('items')  || (function(){ try { return localStorage.getItem('valeur_items') || ''; } catch(e){ return ''; } })();
    return scores;
}

// ── Score de Présence Authentique ─────────────────────────────────────────
// 12 items SPA · SPA_MAX = 48 · le % est calculé par le questionnaire et passé en URL
function computeSPA(scores) {
    if (scores.spa !== undefined && scores.spa !== null) return scores.spa; // % déjà calculé par le questionnaire (12 items / 48)
    const raw = scores.spa_raw !== undefined ? scores.spa_raw : null;
    if (raw !== null) return Math.round((raw / 48) * 100);
    // Fallback : estimation depuis l'absence de scores masques
    const maskSum = ['rouge','orange','jaune','vert','bleu','indigo','violet']
        .reduce(function(acc, m) { return acc + (scores[m] || 0); }, 0);
    const avg = maskSum / 7;
    return Math.max(0, Math.min(100, Math.round(100 - avg)));
}

// DÉTECTION PROFIL — v4 (Juin 2026) — seuils cliniques par masque
// Réf : SHAI · TAS-20 · IUS-12 · ECR-R · LOC · FMPS · MSI · Ben-Porath 2003
// ══════════════════════════════════════════════════════════════════════
// DÉTECTION PROFIL — v5 (Modèle simplifié · Juin 2026)
// Un masque dominant + satellites Orange/Jaune transdiagnostiques
// Réf : Barlow 2004 · Carleton 2007 · Ben-Porath 2003 · MASK_THRESHOLDS
// ══════════════════════════════════════════════════════════════════════
function detectValidProfile(scores) {
    // Tri complet des 7 masques
    const sorted = MASKS.map(m => ({ key:m, pct:scores[m]||0 }))
        .sort((a,b) => b.pct-a.pct || TIEBREAK.indexOf(a.key)-TIEBREAK.indexOf(b.key));

    // Masques cliniquement actifs (seuil propre à chaque instrument)
    const active = sorted.filter(m => m.pct >= MASK_THRESHOLDS[m.key]);
    const S1 = sorted[0]?.pct || 0;

    // Mécanismes transdiagnostiques — actifs quel que soit le profil
    // Orange ≥ 60% : bloqueur émotionnel (Bagby 1994)
    // Jaune  ≥ 70% : amplificateur systémique (Carleton 2007)
    const tdOrange = (scores['orange']||0) >= MASK_THRESHOLDS['orange'];
    const tdJaune  = (scores['jaune'] ||0) >= MASK_THRESHOLDS['jaune'];

    // ── 0. ADAPTATIF ─────────────────────────────────────────────────────
    if (S1 < 50 || active.length === 0) {
        return { type: S1 < 30 ? 'adaptatif_eq' : 'adaptatif_vig',
                 primary: sorted[0].key, masks: sorted.map(m=>m.key),
                 satellites: [], tdOrange, tdJaune };
    }

    // ── 1. PAN-MASQUES — ≥5 actifs, spread ≤ 20% ─────────────────────────
    if (active.length >= 5) {
        const spread = active[0].pct - active[active.length-1].pct;
        if (spread <= 20)
            return { type:'pan', masks: active.map(m=>m.key),
                     primary: active[0].key, satellites: [] };
    }

    // ── 2. MASQUE DOMINANT + SATELLITES ──────────────────────────────────
    // Indice de dominance : ratio pct/seuil — plus révélateur que le score brut
    const withRatio = active.map(function(m) {
        return { key:m.key, pct:m.pct, ratio: m.pct / MASK_THRESHOLDS[m.key] };
    });
    withRatio.sort(function(a,b) {
        return (b.ratio-a.ratio) || (b.pct-a.pct) || (TIEBREAK.indexOf(a.key)-TIEBREAK.indexOf(b.key));
    });
    const dom = withRatio[0];

    // Satellites : Orange (bloqueur) et/ou Jaune (amplificateur)
    const satellites = ['orange','jaune'].filter(function(m) {
        return m !== dom.key && (scores[m]||0) >= MASK_THRESHOLDS[m];
    });

    // Type selon intensité du dominant
    const type = dom.pct >= 75 ? 'mono_dominant' : dom.pct >= 60 ? 'mono_modere' : 'residuel';
    return { type, primary: dom.key, masks: [dom.key], satellites, tdOrange, tdJaune };
}



// ── Enrichissement profil : sévérité, flags, ordre clinique ───────────────
// ── Enrichissement post-détection (léger) ─────────────────────────────────
function enrichProfile(profile, scores) {
    profile.orangeBlocker  = (profile.satellites||[]).includes('orange');
    profile.jauneAmplifier = (profile.satellites||[]).includes('jaune');
    return profile;
}




// ── Portrait compact d'un masque ──────────────────────────────────────────
function buildMaskPortrait(m, scores, isMain) {
    const meta = META[m], color = MASK_COLORS[m];
    const steps = LOOPS[m] || [];
    const pct = scores[m] || 0;
    let h = '';
    if (isMain) {
        h += `<div class="hero-mask" style="background:${MASK_PASTELS[m]};border:1.5px solid ${color}30;">
            <span style="font-size:11px;letter-spacing:3px;text-transform:uppercase;color:${color};font-weight:600;">Votre protection</span>
            <div class="hero-mask-name">Masque ${MASK_LABELS[m]}</div>
            
            <p class="hero-tagline">${meta.peur ? 'Une peur centrale : ' + meta.peur + '.' : ''}</p>
        </div>`;
        // Optimisation 1 : message de résilience pour score élevé
        if (pct > 75) {
            h += `<div class="block" style="background:${MASK_PASTELS[m]};border:1px solid ${color}30;">
                <p style="font-family:'Cormorant Garamond',serif;font-size:19px;font-style:italic;color:var(--text);margin:0;">
                    Un score aussi élevé n'est pas une fragilité. C'est le signe que ce système de protection a énormément travaillé pour vous. C'est une force qui s'est rigidifiée, pas une absence de force. Votre capacité à le reconnaître aujourd'hui en est la preuve.
                </p>
            </div>`;
        }
    }
    // Ouverture
    h += `<div class="block${isMain ? '' : ' compact-block'}">
        <h2 style="color:${color};">Ce que le test a reconnu</h2>
        <div class="mirror-phrase" style="border-left-color:${color};">${MIRROR[m] || ''}</div>
        ${UNIVERSAL[m] ? `<div class="reminder-box" style="text-align:left;margin:16px 0 0;font-size:13.5px;">${UNIVERSAL[m]}</div>` : ''}
    </div>`;
    // Tension bipolaire — cœur du portrait
    h += `<div class="block${isMain ? '' : ' compact-block'}">
        <h2 style="color:${color};">Une tension entre deux pôles</h2>
        <p style="font-size:15px;color:var(--text2);line-height:1.8;margin-bottom:4px;">
            Ce masque n\u2019est pas une pathologie. C\u2019est une tension entre une sensibilité vive
            et une défense qui s\u2019est rigidifiée. Vous vivez l\u2019oscillation entre les deux\u00a0:
        </p>
        ${buildBipolar(m, color, !isMain, pct)}
    </div>`;
    // Boucle
    if (steps.length) {
        const s3 = steps.slice(0, 3);
        h += `<div class="block${isMain ? '' : ' compact-block'}">
            <h2 style="color:${color};">Pourquoi c\u2019est plus fort que vous</h2>
            <p style="color:var(--text2);font-size:15px;line-height:1.85;margin-bottom:16px;">
                Cette r\u00e9action n\u2019est pas un d\u00e9faut de caract\u00e8re. Votre esprit a r\u00e9solu un probl\u00e8me.
                Le probl\u00e8me a chang\u00e9, mais la solution est rest\u00e9e. Voici comment elle fonctionne\u00a0:
            </p>
            <div class="mechanism">${s3.map((s,i) => `<div class="step"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`).join('')}</div>
            <div class="metaphor-box">Imaginez un d\u00e9tecteur de fum\u00e9e r\u00e9gl\u00e9 trop sensiblement. Il prot\u00e8ge la maison. Mais il sonne aussi quand les toasts br\u00fblent. Votre masque fonctionne comme cela\u00a0: il ne sait pas encore que la guerre est finie.</div>
        </div>`;
    }
    // Force
    h += `<div class="block${isMain ? '' : ' compact-block'}" style="background:linear-gradient(135deg,#FCFAF7,#F3F1EC);">
        <h2 style="color:${color};">Ce que vous portez derri\u00e8re ce masque</h2>
        <p style="color:var(--text2);margin-bottom:12px;">La peur prend de la place. Et l\u00e0 o\u00f9 elle s\u2019est install\u00e9e, quelque chose n\u2019a pas pu s\u2019exprimer pleinement. Ce n\u2019est pas perdu\u00a0\u2014 c\u2019est l\u00e0, derri\u00e8re le masque.</p>
        <div class="force-box"><p style="font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;">Derri\u00e8re ce masque, il y a une force r\u00e9elle\u00a0:</p><p style="font-weight:500;margin-top:8px;">${meta.force}</p></div>
    </div>`;
    return h;
}

            ${META[m] && META[m].force ? `<p style="font-size:13.5px;line-height:1.75;color:var(--text2);margin:0;"><span style="font-weight:600;color:${color};">La force derrière\u00a0· </span>${META[m].force}</p>` : ''}
        </div>`;
    }
    h += `</div>`;
    return h;
}


// ── Section transdiagnostique systémique ──
function buildTransdiagSection(profile, scores, contextMasks) {
    const dom = profile.primary;
    const sections = [];

    if (profile.tdOrange && !contextMasks.every(function(m){return m==='orange';})) {
        const color = MASK_COLORS['orange'];
        const pct   = scores['orange']||0;
        const others = contextMasks.filter(function(m){return m!=='orange' && m!=='jaune';});

        let rows = '';
        others.forEach(function(m) {
            const txt = ORANGE_ON_DOMINANT[m];
            if (txt) rows += `<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.05);font-size:13px;">
                <span style="background:${MASK_COLORS[m]};color:#fff;padding:1px 8px;border-radius:20px;flex-shrink:0;font-size:11px;height:fit-content;margin-top:1px;">${MASK_LABELS[m]}</span>

            </div>`;
        });

        sections.push(`<div class="block" style="border-left:4px solid ${color}40;background:${color}06;">
            <!-- ... -->`);
    }

    if (profile.tdJaune && !contextMasks.every(function(m){return m==='jaune';})) {
        const color = MASK_COLORS['jaune'];
        const pct   = scores['jaune']||0;
        const others = contextMasks.filter(function(m){return m!=='jaune' && m!=='orange';});

        let rows = '';
        others.forEach(function(m) {
            const txt = JAUNE_ON_DOMINANT[m];
            if (txt) rows += `<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.05);font-size:13px;">
                <span style="background:${MASK_COLORS[m]};color:#fff;padding:1px 8px;border-radius:20px;flex-shrink:0;font-size:11px;height:fit-content;margin-top:1px;">${MASK_LABELS[m]}</span>

    return sections.join('');
}


// ── Priorités de travail — ordre de traversée ─────────────────────────────
function buildPrioritySection(profile, scores, secondary) {
    const dom  = profile.primary;
    const sec  = (secondary || []).slice().sort(function(a,b){ return (scores[b]||0)-(scores[a]||0); });
    const promoted = sec.filter(function(m){ return (scores[m]||0) >= 85; });
    const rest     = sec.filter(function(m){ return (scores[m]||0) <  85; });
    const order = [];
    if (profile.tdOrange) order.push({m:'orange', role:'Bloqueur \u00e9motionnel \u2014 priorit\u00e9 absolue'});
    if (profile.tdJaune)  order.push({m:'jaune',  role:'Amplificateur \u2014 intensifie tout le reste'});
    promoted.forEach(function(m){ order.push({m, role:'Protection active tr\u00e8s \u00e9lev\u00e9e \u2014 trait\u00e9e en parall\u00e8le'}); });
    order.push({m:dom, role:'Protection dominante'});
    rest.forEach(function(m){ order.push({m, role:'Protection active'}); });

    if (order.length < 1) return '';
    order.forEach(function(item, i){
        if (i === 0) return;
        const prev = order[i-1];
        if (['orange','jaune'].includes(item.m) || ['orange','jaune'].includes(prev.m)) return;
        if (Math.abs((scores[item.m]||0) - (scores[prev.m]||0)) < 5)
            item.grouped = true;
    });

    let h = `<div class="block" style="border-top:2px solid rgba(201,168,76,.2);">
        <h2>Plan de travers\u00e9e V.A.L.E.U.R\u00a9</h2>
        <p style="color:var(--text2);font-size:14px;line-height:1.8;margin-bottom:16px;">
            V.A.L.E.U.R\u00a9 ne travaille pas contre vos protections \u2014 elle travaille avec elles,
            dans l\u2019ordre o\u00f9 elles peuvent \u00eatre entendues.
        </p>`;

    if (promoted.length) {
        const pm = promoted[0];
        h += `<div class="reminder-box" style="text-align:left;margin:0 0 18px;">
            Votre masque ${MASK_LABELS[pm]} \u00e9tant tr\u00e8s \u00e9lev\u00e9 (${scores[pm]||0}\u00a0%), il est trait\u00e9 en parall\u00e8le
            de votre protection dominante \u2014 pour ne pas ralentir le travail sur les d\u00e9clencheurs du quotidien.
        </div>`;
    }

    order.forEach(function(item, idx) {
        const color = MASK_COLORS[item.m];
        const role  = MASK_ROLE[item.m];
        const sens  = sensibleResource(item.m);
        h += `<div style="display:flex;gap:16px;align-items:flex-start;margin-bottom:${idx<order.length-1?'18px;padding-bottom:18px;border-bottom:1px solid rgba(0,0,0,.05)':'0'}">
            <div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:38px;">
                <div style="width:36px;height:36px;border-radius:50%;background:${color};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;-webkit-print-color-adjust:exact;print-color-adjust:exact;">${idx+1}</div>
                ${idx<order.length-1?'<div style="width:1px;height:20px;background:rgba(0,0,0,.1);"></div>':''}
            </div>
            <div style="flex:1;padding-top:6px;">
                <div style="font-family:\'Cormorant Garamond\',serif;font-size:18px;font-weight:300;color:${color};margin-bottom:3px;">Masque ${MASK_LABELS[item.m]} ${item.grouped?'<span style="font-size:11px;font-style:italic;color:var(--text3);">\u00b7 trait\u00e9 avec le pr\u00e9c\u00e9dent (\u00e9cart\u00a0&lt;\u00a05\u00a0%)</span>':''}</div>
                <div style="font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:${color};opacity:.8;margin-bottom:6px;">${item.role}</div>
                <p style="font-size:13px;color:var(--text2);margin:0 0 8px;line-height:1.65;">${role ? role.psycho : ''}</p>
                ${sens?`<div style="font-size:12.5px;line-height:1.6;color:var(--text2);padding:8px 12px;background:${color}0A;border-left:2px solid ${color};border-radius:0 6px 6px 0;"><span style="font-weight:600;color:${color};">Pôle sensible restauré\u00a0\u00b7 </span>${sens}</div>`:''}
            </div>
        </div>`;
    });

    h += `<div style="margin-top:24px;padding-top:20px;border-top:1px solid rgba(201,168,76,.2);">
        <div style="font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;">Les six temps de la méthode</div>
        <p style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:6px;">
            Chaque protection est traversée selon le même mouvement en six temps\u00a0:
        </p>
        ${buildValeurMap()}
        <div class="reminder-box" style="text-align:left;margin:16px 0 0;font-size:13.5px;background:rgba(45,122,79,.05);border-color:rgba(45,122,79,.2);">
            <strong>Avant de comprendre, sentir.</strong> La prochaine fois qu'une de ces tensions monte, ne cherchez pas
            d'abord à l'analyser. Posez simplement une main là où vous la sentez dans le corps — la gorge, la poitrine,
            le ventre. Sentir précède comprendre\u00a0: c'est le temps <em>Localiser</em>, et c'est souvent lui qui ouvre tout le reste.
        </div>
        <div style="margin-top:18px;padding:16px 18px;border-radius:8px;background:linear-gradient(135deg,#FCFAF7,#F3F1EC);border:1px solid rgba(201,168,76,.25);">
            <p style="font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;line-height:1.6;color:var(--text);margin:0;">
                Le point de bascule n'est pas quand le masque disparaît — c'est quand vous le reconnaissez
                <em>avant</em> qu'il ne prenne toute la place. Ce moment-là est déjà une victoire.
            </p>
        </div>
    </div>`;

    h += '</div>';
    return h;
}

// ── Scores + SPA ──────────────────────────────────────────────────────────
function buildScoresSPA(scores, spa, dom) {
    const spaText = spa >= 70

        : spa >= 50 ? "Environ une r\u00e9ponse sur deux vient de votre propre centre. Cet espace peut grandir."
        : spa >= 30 ? "La protection guide beaucoup de vos r\u00e9actions. Ce n\u2019est pas un verdict \u2014 c\u2019est une information pr\u00e9cise."
        : "Vos protections sont tr\u00e8s actives. Ce score dit surtout qu\u2019elles ont beaucoup travaill\u00e9. \u00c7a m\u00e9rite du respect.";

    let h = `<div class="block page-break-before">

    const sortedM = [...MASKS].sort((a,b) => (scores[b]||0)-(scores[a]||0));

        h += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">

                <div style="position:absolute;top:0;left:0;width:${pct}%;height:100%;background:${isActive?color:'#CCC'};border-radius:4px;-webkit-print-color-adjust:exact;print-color-adjust:exact;transition:width .6s ease;"></div>
                <div title="Seuil clinique : ${thresh}%"

            <span style="font-size:14px;font-weight:600;width:36px;text-align:right;color:${isActive?color:'var(--text3)'};">${pct}%</span>
            <span style="font-size:11px;width:80px;text-align:right;color:${isActive?color:'var(--text3)'};">${lv}</span>
        </div>`;
    });

    const activeCount = MASKS.filter(function(m){ return (scores[m]||0) >= MASK_THRESHOLDS[m]; }).length;
    if (activeCount >= 2) {
        h += `<div class="reminder-box" style="margin:16px 0 0;font-size:13px;">
            Environ 70\u00a0% des personnes pr\u00e9sentant ce type de profil ont au moins une autre protection active.
            Votre configuration est donc fr\u00e9quente et bien document\u00e9e\u00a0\u2014 la comorbidit\u00e9 est la r\u00e8gle, pas l'exception.
        </div>`;
    }

    h += `<details style="margin-top:24px;border:1px solid rgba(201,168,76,.25);border-radius:6px;overflow:hidden;">
        <summary style="padding:14px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--gold);letter-spacing:.06em;background:rgba(201,168,76,.05);list-style:none;">
            &#9656;\u00a0Pourquoi ces seuils sont-ils diff\u00e9rents selon les masques\u00a0?
        </summary>
        <div style="padding:16px 18px 18px;background:rgba(201,168,76,.03);">
            <p style="font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:16px;">
                Chaque masque est mesur\u00e9 par un instrument valid\u00e9 dans des populations cliniques sp\u00e9cifiques.
                Le seuil de significativit\u00e9 correspond au niveau \u00e0 partir duquel la recherche documente
                un impact mesurable sur le fonctionnement quotidien\u00a0\u2014 il n\u2019est pas arbitraire.
                Un score en dessous du seuil n\u2019est pas \u00ab\u00a0normal\u00a0\u00bb\u00a0\u2014 il indique une tendance pr\u00e9sente
                qui n\u2019atteint pas encore le niveau d\u2019activation syst\u00e9matique.

            ${MASKS.map(function(m) {
                const ex = MASK_THRESHOLD_EXPLAIN[m];
                const pct = scores[m]||0;
                const thresh = MASK_THRESHOLDS[m];
                const active = pct >= thresh;
                const color = MASK_COLORS[m];
                return `<div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.05);align-items:flex-start;">
                    <div style="min-width:58px;text-align:right;">
                        <span style="font-size:12px;font-weight:600;color:${active?color:'#AAA'};">${MASK_LABELS[m]}</span><br>
                        <span style="font-size:10px;color:${active?color:'#CCC'};">${pct}%</span>

    h += `<div style="margin-top:24px;border-top:1px solid var(--line);padding-top:18px;">

        <p style="font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:var(--text2);margin-bottom:16px;">La part de vos r\u00e9ponses qui vient de vous-m\u00eame \u2014 non de vos peurs ou de vos d\u00e9fenses.</p>
        <div style="display:flex;align-items:center;gap:20px;">
            <div class="spa-ring" style="width:70px;height:70px;flex-shrink:0;position:relative;">
                <svg width="70" height="70" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="42" fill="none" stroke="#E5E0D8" stroke-width="6"/>
                    <circle cx="50" cy="50" r="42" fill="none" stroke="#C9A84C" stroke-width="6"
                        stroke-dasharray="264" stroke-dashoffset="${264*(1-spa/100)}"
                        stroke-linecap="round" transform="rotate(-90 50 50)"
                        style="-webkit-print-color-adjust:exact;print-color-adjust:exact;"/>
                </svg>
                <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--gold);">${spa}%</div>
            </div>
            <div>
                <p style="font-weight:600;margin-bottom:4px;">Pr\u00e9sence authentique \u2014 ${spa}%</p>

            </div>
        </div>
    </div>`;

    const avgMask = Math.round(MASKS.reduce(function(s,m){return s+(scores[m]||0);}, 0) / 7);
    h += `<div style="margin-top:24px;border-top:1px solid var(--line);padding-top:18px;">

            Vos protections tournent actuellement \u00e0 <strong>${avgMask}%</strong> de leur capacit\u00e9.
            Votre espace de libert\u00e9 est de <strong>${spa}%</strong>.
            L\u2019objectif n\u2019est pas 100\u00a0% \u2014 c\u2019est de vous rendre la majorit\u00e9 du contr\u00f4le.
        </p>
        <div class="battery">
            <span style="font-size:11px;color:var(--text3);min-width:70px;">Protections</span>
            <div class="battery-bar"><div class="battery-fill" style="width:${avgMask}%;"></div></div>
            <span style="font-size:11px;font-weight:600;color:var(--text);">${avgMask}%</span>
        </div>
        <div class="battery">
            <span style="font-size:11px;color:var(--text3);min-width:70px;">Libert\u00e9</span>
            <div class="battery-bar"><div class="battery-fill" style="width:${spa}%;background:#C9A84C;"></div></div>
            <span style="font-size:11px;font-weight:600;color:var(--gold);">${spa}%</span>
        </div>
    </div>`;

    h += buildChargeGauge(scores);

    const norm = dom && NORMALIZATION[dom] ? NORMALIZATION[dom] : '';
    if (norm) {
        h += `<div class="reminder-box" style="margin-top:18px;font-size:13px;color:var(--text2);">${norm}</div>`;
    }

    const micro = dom && MICRO_ACTIONS[dom] ? MICRO_ACTIONS[dom] : '';
    if (micro) {
        h += `<div class="micro-action">

        </div>`;
    }

    h += `<p style="margin-top:24px;text-align:center;" class="no-print">
        <button class="btn-print" onclick="window.print()">Enregistrer en PDF</button>

}

// ── [NOUVEAU] Carte en un coup d'œil ──
function shortFear(m){ return (META[m].peur||'').replace(/^la\s+/i,''); }
function elanRetenuPhrase(pct){
    if (pct >= 80) return `À ${pct}\u00a0%, c'est une part majeure de cet élan qui est aujourd'hui retenue\u00a0: la tension est presque permanente, et la bascule vers la défense se fait au moindre déclencheur. Autant d'énergie immobilisée — autant à rendre, peu à peu, disponible.`;
    if (pct >= 65) return `À ${pct}\u00a0%, une bonne part de cet élan est retenue\u00a0: la tension est forte, mais connaît des répits. Il reste des moments où l'élan circule librement — ce sont eux qu'on élargit.`;
    return `À ${pct}\u00a0%, l'élan n'est retenu qu'en partie\u00a0: la tension se déclenche surtout dans certains contextes et s'apaise ailleurs. La marge de liberté est déjà réelle.`;
}

function buildCarte(scores) {
    const ranked = MASKS.slice().sort(function(a,b){ return (scores[b]||0)-(scores[a]||0); });
    const rows = ranked.map(function(m){
        const pct = scores[m]||0, c = MASK_COLORS[m];
        const zone = pct >= MASK_THRESHOLDS[m] ? 'retenu' : (pct < LOW_CUTOFF ? 'intact' : 'partiel');
        const pill = zone==='retenu'
            ? `<span class="zone-pill" style="color:${c};background:${c}15;">élan retenu</span>`
            : zone==='intact'
                ? `<span class="zone-pill" style="color:#2D7A4F;background:rgba(45,122,79,.1);">élan intact</span>`
                : `<span class="zone-pill" style="color:var(--text3);background:rgba(0,0,0,.04);">partiel</span>`;
        const elan = sensibleResource(m), fear = shortFear(m);
        const state = zone==='retenu' ? `aujourd'hui <strong>retenu</strong> par la ${fear}`
            : zone==='intact' ? `<strong>resté libre</strong>`
            : `<strong>partiellement retenu</strong> par la ${fear}`;
        return `<div class="carte-row">
            <span class="carte-dot" style="background:${c};"></span>
            <div class="carte-main">
                <div class="carte-head">
                    <span class="carte-name" style="color:${c};">Masque ${MASK_LABELS[m]}</span>
                    <span class="carte-bar"><span class="carte-fill" style="width:${pct}%;background:${c};"></span></span>
                    <span class="carte-pct">${pct}\u00a0%</span>
                    ${pill}
                </div>
                <div class="carte-elan"><span style="color:${c};font-weight:600;">Élan\u00a0:</span> ${elan} \u2014 ${state}.</div>
            </div>
        </div>`;
    }).join('');
    return `<div class="block" style="border-top:3px solid rgba(201,168,76,.25);">
        <div class="eyebrow" style="color:var(--gold);">Votre carte en un coup d'œil</div>
        <h2>Vos 7 protections, d'un seul regard</h2>
        <p style="color:var(--text2);font-size:14.5px;line-height:1.85;margin-bottom:6px;">
            Chaque masque est un <strong>élan</strong> — une part vivante de vous. Quand une peur le retient, l'élan
            se rigidifie en tension\u00a0: c'est un <strong>élan retenu</strong> (une protection active). Quand rien ne le retient,
            il reste libre\u00a0: c'est un <strong>élan intact</strong> — un appui. Pour chaque masque ci-dessous, vous lisez
            l'élan concret dont il s'agit, et s'il est aujourd'hui retenu ou libre.
        </p>
        <div class="carte">${rows}</div>
    </div>`;
}

function buildAppuis(scores) {
    let low = MASKS.filter(function(m){ return (scores[m]||0) < 30; })
        .sort(function(a,b){ return (scores[a]||0)-(scores[b]||0); });
    if (!low.length) { // garantir au moins l'appui le plus net
        low = MASKS.slice().sort(function(a,b){ return (scores[a]||0)-(scores[b]||0); }).slice(0,1);
    }
    const OPEN = ["Ici, l'élan est resté libre", "Là, rien ne vient brider l'élan", "Sur ce terrain, l'élan circule sans entrave", "Ce versant de vous est demeuré ouvert"];
    const CLOSE = ["C'est un appui réel pour le travail à venir.", "Un sol stable sur lequel s'appuyer.", "Une ressource déjà disponible, à mobiliser plutôt qu'à conquérir.", "Une force acquise, sur laquelle compter."];
    const cards = low.map(function(m, i){
        const lr = LOW_READING[m], c = MASK_COLORS[m], pct = scores[m]||0;
        const suspect = lr.flag && pct < LOW_CUTOFF;
        const enable = ELAN_ENABLE[m];
        return `<div class="appui-card" style="border-left:3px solid #2D7A4F;">
            <div style="font-family:'Cormorant Garamond',serif;font-size:17px;color:${c};margin-bottom:4px;">

            </div>
            <p style="font-size:14px;line-height:1.75;color:var(--text2);margin:0;">
                ${OPEN[i % OPEN.length]}\u00a0: ${lr.libre}.${enable ? ` Cela vous rend sans doute plus libre de ${enable}.` : ''} ${CLOSE[i % CLOSE.length]}
            </p>
            ${suspect ? `<p class="note">Note\u00a0: un score aussi bas mérite d'être nommé — il peut, plus rarement, signaler ${lr.angle}. À explorer.</p>` : ''}
        </div>`;
    }).join('');
    return `<div class="block" style="background:rgba(45,122,79,.04);border:1px solid rgba(45,122,79,.18);">
        <div class="eyebrow" style="color:#2D7A4F;">Vos appuis</div>

            Un masque bas est un espace de liberté disponible\u00a0: c'est un élan qui est resté vivant.
            Ces domaines bougent librement en vous. On construit le changement sur ce qui tient déjà\u00a0:
            voici vos points d'appui.
        </p>
        ${cards}
    </div>`;
}

function buildExperienceEnsemble(profile, scores) {
    const active = MASKS.filter(function(m){ return (scores[m]||0) >= MASK_THRESHOLDS[m]; });
    const n = active.length;
    if (n < 2) return '';
    const word = n===2?'deux':n===3?'trois':n===4?'quatre':n===5?'cinq':(''+n);
    return `<div class="block" style="border-left:4px solid var(--gold);">
        <h2>L'expérience d'ensemble</h2>
        <p style="color:var(--text2);font-size:15px;line-height:1.85;margin:0;">
            Avec <strong>${word} protections actives</strong> en même temps, vous pouvez avoir l'impression que chaque
            domaine de votre vie réclame sa propre vigilance — comme si vous teniez plusieurs fronts à la fois.
            Cette fatigue n'est pas un défaut de volonté\u00a0: c'est le coût normal d'un système qui n'a pas encore reçu
            le signal que la menace est passée. Le travail ne consiste pas à en faire plus, mais à rendre, une à une,
            ces vigilances inutiles.
        </p>
    </div>`;
}

// ── [NOUVEAU] Réseau dirigé ──
function buildSystem(profile, scores) {
    const dom = profile.primary, o = profile.tdOrange, j = profile.tdJaune;
    const others = MASKS.filter(function(m){ return m!==dom && m!=='orange' && m!=='jaune' && (scores[m]||0)>=MASK_THRESHOLDS[m]; })
        .sort(function(a,b){ return (scores[b]||0)-(scores[a]||0); });
    const chain = [];
    if (o) chain.push({m:'orange', verb:'bloque la régulation'});
    if (j) chain.push({m:'jaune',  verb:'amplifie par l\'incertitude'});
    chain.push({m:dom, verb: chain.length?'reçoit la pression':'se déclenche'});
    others.slice(0,2).forEach(function(m){ chain.push({m, verb:'prend le relais'}); });
    if (chain.length < 2) return '';

    const partner = others[0] || (j?'jaune':o?'orange':null);
    const nom = partner ? (DYAD_NAMES[dom+'_'+partner] || DYAD_NAMES[partner+'_'+dom]) : null;
    const multi = (o?1:0)+(j?1:0)+others.length >= 1;

    const visual = chain.map(function(s,i){
        const c = MASK_COLORS[s.m];
        return `${i>0?`<span class="sys-arrow">\u2192</span>`:''}<span class="sys-node"><span class="sys-dot" style="background:${c};"></span><span style="color:${c};font-size:13px;font-weight:600;">${MASK_LABELS[s.m]}</span></span>`;
    }).join('');

    return `<div class="block" style="border:1px solid rgba(201,168,76,.2);background:rgba(201,168,76,.04);">
        <div class="eyebrow" style="color:var(--gold);">Un système, pas une liste</div>
        <h2>Comment vos protections se répondent</h2>
        <div class="sys-chain">${visual}</div>
        <p style="color:var(--text2);font-size:14.5px;line-height:1.85;margin:14px 0 0;">
            Vos protections ne s'additionnent pas\u00a0: elles s'<strong>appellent l'une l'autre</strong>.
            ${o?`Votre <strong style="color:${MASK_COLORS.orange};">Orange</strong> tient l'émotion à distance, ce qui prive de signal\u00a0; `:''}${j?`votre <strong style="color:${MASK_COLORS.jaune};">Jaune</strong> transforme l'incertitude en alerte permanente, qui vient nourrir `:'tout vient converger sur '}votre <strong style="color:${MASK_COLORS[dom]};">${MASK_LABELS[dom]}</strong>${others.length?`, que votre <strong style="color:${MASK_COLORS[others[0]]};">${MASK_LABELS[others[0]]}</strong> tente alors de gérer`:''}.
            ${nom?` Cette configuration porte un nom documenté\u00a0: <em>${nom}</em>.`:''}
        </p>
        ${multi?`<p style="font-size:14px;color:var(--text2);line-height:1.8;margin:12px 0 0;border-top:1px solid var(--line);padding-top:12px;">
            C'est pourquoi vous pouvez vous sentir bien plus tendu\u00b7e ou épuisé\u00b7e que chacun de vos scores, pris isolément,
            ne le laisserait croire\u00a0: ce que vous ressentez n'est pas exagéré — c'est l'effet d'ensemble, quand plusieurs
            protections tournent en même temps.
        </p>`:''}
    </div>`;
}

function decodeItems(str) {
    if (!str || str.length < ITEM_BANK.length) return null;
    const out = {};
    for (let i = 0; i < ITEM_BANK.length; i++) {
        const d = str.charCodeAt(i) - 48;
        out[ITEM_BANK[i].id] = (d >= 0 && d <= 5) ? d : null;
    }
    return out;
}
function buildExtremeResponses(scores) {
    const resp = decodeItems(scores.items);
    if (!resp) return '';
    const byMask = {};
    ITEM_BANK.forEach(function(it) {
        const r = resp[it.id];
        if (r === null || r === undefined) return;
        const extreme = (!it.inv && r === 4) || (it.inv && r === 0);
        if (extreme) (byMask[it.mask] = byMask[it.mask] || []).push(it);
    });
    const masks = MASKS.filter(function(m){ return byMask[m] && byMask[m].length; })
        .sort(function(a, b){ return (scores[b]||0) - (scores[a]||0); });
    if (!masks.length) return '';
    const total = masks.reduce(function(a, m){ return a + byMask[m].length; }, 0);
    const groups = masks.map(function(m) {
        const c = MASK_COLORS[m];
        const lines = byMask[m].map(function(it) {
            const ins = ITEM_INSIGHT[it.id] || '';
            return '<div class="xr-line" style="border-left:3px solid ' + c + ';">'
                + (it.inv ? '<span class="xr-flip">Réponse « pas du tout » à un énoncé inversé\u00a0: </span>' : '')
                + '<div style="color:var(--text);margin-bottom:' + (ins ? '7px' : '0') + ';">«\u00a0' + it.text + '\u00a0»</div>'
                + (ins ? '<div class="xr-read"><span style="font-weight:600;color:' + c + ';">Une piste à explorer\u00a0\u00b7 </span>' + ins + '</div>' : '')
                + '</div>';
        }).join('');
        return '<div style="margin-bottom:16px;">'
            + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">'
            + '<span style="width:10px;height:10px;border-radius:50%;background:' + c + ';-webkit-print-color-adjust:exact;print-color-adjust:exact;"></span>'
            + '<span style="font-family:\'Cormorant Garamond\',serif;font-size:17px;color:' + c + ';">Masque ' + MASK_LABELS[m] + '</span>'
            + '<span style="font-size:11px;color:var(--text3);">' + byMask[m].length + ' réponse' + (byMask[m].length>1?'s':'') + ' au maximum</span>'
            + '</div>' + lines + '</div>';
    }).join('');
    return '<div class="block" style="border-top:2px solid rgba(201,168,76,.25);">'
        + '<div class="eyebrow" style="color:var(--gold);">Vos réponses, telles quelles</div>'
        + '<h2>Ce que vous avez affirmé sans nuance</h2>'
        + '<p style="color:var(--text2);font-size:14.5px;line-height:1.85;margin-bottom:16px;">'
        + 'Au-delà des scores, voici les <strong>' + total + '</strong> énoncé' + (total>1?'s':'') + ' auxquels vous avez répondu à l\u2019extrême '
        + '\u2014 «\u00a0tout à fait\u00a0», ou «\u00a0pas du tout\u00a0» pour les formulations inversées. Ce sont vos patterns défensifs les '
        + 'plus directs, dans vos propres mots. Les lectures qui les accompagnent sont des <strong>pistes à explorer</strong>, '
        + 'non des verdicts\u00a0: à confirmer ou à nuancer avec votre praticien.</p>'
        + groups + '</div>';
}

function buildPortrait(scores, profile, prenom) {
    const dom  = profile.primary;
    const spa  = computeSPA(scores);
    let   html = '';

    html += buildCoverPage(profile, scores, prenom);

    // ── Manifeste : pourquoi ce test + concept de masque + grille des 7 ──
    html += buildManifeste();

    // ── Carte d'orientation (tôt) : les 7 masques + appuis (élans intacts) ──
    html += buildCarte(scores);
    html += buildAppuis(scores);

    if (profile.type.startsWith('adaptatif')) {
        html += `<div class="block"><h2>${ADAPTATIF.nom}</h2>
            <p style="color:var(--text2);line-height:1.8;margin-bottom:16px;">${ADAPTATIF.desc}</p>
            <div class="force-box"><p style="font-weight:500;">${ADAPTATIF.direction}</p></div></div>`;
        html += buildValeurSection();
    }

    else if (profile.type === 'pan') {
        html += `<div class="block intro-dyade" style="border-top:3px solid rgba(201,168,76,.3);">
            <p style="color:var(--text2);font-size:15px;line-height:1.8;">${PAN_MASQUE.desc}</p>
        </div>`;
        profile.masks.forEach(function(m) {
            html += `<div class="mask-section" style="border-left:4px solid ${MASK_COLORS[m]}20;">
                <div class="mask-section-label" style="background:${MASK_COLORS[m]};color:#fff;">Masque ${MASK_LABELS[m]}</div>`;
            html += buildMaskPortrait(m, scores, false);
            html += '</div>';
        });
        html += buildReframe(dom);
        html += buildSystem(profile, scores);
        html += buildTransdiagSection(profile, scores, profile.masks);
        html += buildExtremeResponses(scores);
        html += buildValeurSection();
    }

    else {
        // Masques secondaires actifs (hors dominant, hors Orange/Jaune)
        const secondary = MASKS.filter(function(m) {
            return m !== dom
                && m !== 'orange' && m !== 'jaune'
                && (scores[m]||0) >= MASK_THRESHOLDS[m];
        });

        // ── Votre protection principale (+ origine intégrée) ──────────────
        html += buildMaskPortrait(dom, scores, true);
        html += buildReframe(dom);

        // ── Comment elles se répondent : réseau + bloqueurs transdiag ─────
        const contextMasks = [dom].concat(secondary);
        html += buildSystem(profile, scores);
        html += buildTransdiagSection(profile, scores, contextMasks);

        // ── Portraits compacts des masques secondaires actifs ─────────────
        secondary.forEach(function(m) {
            html += buildMaskPortraitCompact(m, scores);
        });

        // ── Vos réponses les plus tranchées (sur-mesure) ──────────────────
        html += buildExtremeResponses(scores);

        // ── L'expérience d'ensemble (pont vers le vécu, avant le plan) ─────
        html += buildExperienceEnsemble(profile, scores);

        // ── Par où commencer : plan + rituel + méthode (clôture mobilisante) ─
        html += buildPrioritySection(profile, scores, secondary);
        html += buildNamingRitual(dom);
        html += buildSPACompass(spa);
        html += buildValeurSection();
    }

    // ── Annexe clinicien (repliable) : scores chiffrés, SPA, charge, seuils ──
    html += `<details class="annexe-clinicien no-print">
        <summary>Annexe clinicien \u00b7 scores détaillés, SPA, charge globale &amp; repères psychométriques</summary>
        <div class="annexe-body">${buildScoresSPA(scores, spa, dom)}</div>
    </details>
    <div class="print-only">${buildScoresSPA(scores, spa, dom)}</div>`;

    html += `<div class="rapport-footer print-only">
        <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);border-top:1px solid var(--line);padding-top:10px;">
            <span>V.A.L.E.U.R\u00a9 \u00b7 Rapport Personnel \u00b7 Confidentiel</span>
            <span>C\u00e9line Bourbon \u00b7 Psychologue \u00b7 \u00a9 2026</span>
        </div>
    </div>`;

    return html;
}








function getLevelLabel(pct) {
    if (pct >= 85) return 'Dominant';
    if (pct >= 70) return '\u00c9lev\u00e9';
    if (pct >= 50) return 'Significatif';
    if (pct >= 30) return 'Mod\u00e9r\u00e9';
    return 'Non significatif';
}
