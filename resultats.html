
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>V.A.L.E.U.R© — Votre Portrait</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
:root{
  --ivory:#FEFBF6;--ivory-2:#F7F2EB;--ivory-3:#EFE9DF;--ivory-card:#FFFDF9;
  --ink:#1A1814;--ink-2:#2C2820;--ink-3:#5A534A;--ink-4:#8C8278;--ink-5:#B8B0A5;
  --gold:#C9A84C;--gold-light:rgba(201,168,76,.12);--gold-line:rgba(201,168,76,.30);--gold-glow:rgba(201,168,76,.08);
  --rouge:#B5312A;--orange:#C4581F;--jaune:#B8930A;--vert:#2D7A4F;--bleu:#1D5F8A;--indigo:#5C3280;--violet:#7A3594;
  --rouge-soft:rgba(181,49,42,.07);--orange-soft:rgba(196,88,31,.07);--jaune-soft:rgba(184,147,10,.07);
  --vert-soft:rgba(45,122,79,.07);--bleu-soft:rgba(29,95,138,.07);--indigo-soft:rgba(92,50,128,.07);--violet-soft:rgba(122,53,148,.07);
  --chroma:linear-gradient(90deg,#B5312A 0%,#C4581F 16.6%,#B8930A 33.2%,#2D7A4F 49.8%,#1D5F8A 66.4%,#5C3280 83%,#7A3594 100%);
  --fs:'Cormorant Garamond',Georgia,serif;--fb:'DM Sans',system-ui,sans-serif;
  --r:12px;--r-sm:6px;--r-lg:20px;--max:960px;
  --sh-card:0 2px 12px rgba(26,24,20,.06),0 1px 3px rgba(26,24,20,.04);
  --sh-up:0 8px 32px rgba(26,24,20,.10),0 2px 8px rgba(26,24,20,.06);
  --sh-gold:0 4px 24px rgba(201,168,76,.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--ivory);font-family:var(--fb);font-weight:300;color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
a{color:var(--ink-2);text-decoration:none}

/* ── CHROME ── */
.chroma-bar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--chroma);z-index:1000}

/* ── NAV ── */
nav{position:fixed;top:3px;left:0;right:0;z-index:900;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(254,251,246,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--ivory-3)}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-logo-img{width:38px;height:38px;object-fit:contain;mix-blend-mode:multiply;flex-shrink:0}
.nav-logo-text{font-family:var(--fs);font-size:15px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--ink)}
.nav-back{font-size:14px;letter-spacing:1.5px;text-transform:uppercase;color:#3D3830;transition:color .2s}
.nav-back:hover{color:#C9A84C}

/* ── LOADER ── */
#page-loader{position:fixed;inset:0;background:var(--ivory);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .6s ease}
#page-loader.out{opacity:0;pointer-events:none}
.ld-logo{font-family:var(--fs);font-size:2.2rem;letter-spacing:.4em;color:var(--ink);font-weight:300}
.ld-bar{width:120px;height:2px;background:var(--ivory-3);border-radius:2px;overflow:hidden}
.ld-bar-fill{height:100%;background:var(--chroma);animation:barFill 1.4s ease forwards}

/* ── LAYOUT ── */
.container{max-width:var(--max);margin:0 auto;padding:clamp(72px,10vh,96px) 32px 80px}
#portrait-wrap{min-height:200px}

/* ── EYEBROW / DIVIDER ── */
.section-eyebrow{display:flex;align-items:center;gap:12px;font-family:var(--fb);font-size:13px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:#1A1814;margin-bottom:20px}
.section-eyebrow::before,.section-eyebrow::after{content:'';flex:1;height:1px;background:var(--gold-line)}
.section-label{font-size:13px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:#1A1814;margin:32px 0 16px}
.section-divider{height:1px;background:var(--ivory-3);margin:40px 0}

/* ── HERO ── */
.hero-section{position:relative;padding:48px 0 56px;text-align:center}
.hero-watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(480px,90vw);height:auto;opacity:.09;pointer-events:none;z-index:0;mix-blend-mode:multiply}
.hero-content{position:relative;z-index:1}
.hero-eyebrow{font-size:13px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:#1A1814;margin-bottom:24px}
.spa-score-hint{font-family:var(--fb);font-size:14px;color:#3D3830;margin-top:20px;letter-spacing:.5px}
.spa-score-hint strong{color:#1A1814;font-weight:600}

/* ── THOUGHTS ── */
.thoughts-section{margin-bottom:28px}
.thought-primary{font-family:var(--fs);font-style:italic;font-size:clamp(22px,4vw,44px);font-weight:300;line-height:1.25;color:var(--ink);max-width:780px;margin:0 auto 16px;position:relative}
.thought-secondary,.thought-tertiary{font-family:var(--fs);font-style:italic;font-size:clamp(16px,2.2vw,22px);color:var(--ink-3);margin:0 auto 12px;max-width:680px;line-height:1.4}

/* ── BADGE ── */
.badge-config{display:inline-flex;align-items:center;flex-wrap:wrap;gap:10px;padding:10px 16px 10px 10px;background:var(--ivory-card);border:1.5px solid var(--gold-line);border-radius:40px;box-shadow:var(--sh-gold);margin-bottom:16px;justify-content:center}
.badge-mask{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:40px;font-size:13px;font-weight:500;color:#fff}
.badge-plus{font-size:18px;color:#3D3830;font-weight:300}
.badge-label{font-size:13px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#3D3830;padding:4px 10px;border:1px solid var(--ivory-3);border-radius:40px}
.badge-faux-self{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#7A3594;padding:4px 10px;border:1px solid rgba(122,53,148,.25);border-radius:40px;background:rgba(122,53,148,.06)}
.badge-secondary{font-size:13px;color:var(--ink-3);padding:4px 10px;border:1px solid var(--ivory-3);border-radius:40px}
.profile-subtype{font-size:14px;letter-spacing:2px;text-transform:uppercase;color:#5A534A;margin:8px 0 16px}

/* ── SPA ── */
.spa-section{background:linear-gradient(135deg,var(--gold-glow),var(--ivory-card));border:1px solid var(--gold-line);border-radius:var(--r);padding:32px;margin-bottom:40px;box-shadow:var(--sh-gold)}
.spa-inner{display:flex;align-items:center;gap:32px}
.spa-arc{position:relative;width:120px;height:120px;flex-shrink:0}
.spa-arc svg{width:100%;height:100%;transform:rotate(-90deg)}
.spa-number{position:absolute;top:50%;left:50%;transform:translate(-50%,-52%);font-family:var(--fs);font-size:32px;font-weight:300;color:var(--ink)}
.spa-lbl{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#6B4F10}
.spa-info{flex:1}
.spa-desc{font-family:var(--fs);font-style:italic;font-size:18px;line-height:1.65;color:var(--ink-3);margin-bottom:8px}
.spa-sub{font-size:14px;line-height:1.7;color:#3D3830}

/* ── SCORES (barres verticales) ── */
.scores-section{margin-bottom:32px}
.scores-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;align-items:end}
.score-col{display:flex;flex-direction:column;align-items:center;gap:6px}
.score-bar-wrap{width:100%;height:100px;background:var(--ivory-3);border-radius:4px 4px 0 0;overflow:hidden;display:flex;align-items:flex-end}
.score-bar-fill{width:100%;height:0%;border-radius:4px 4px 0 0;transition:height 1.2s cubic-bezier(.16,1,.3,1)}
.score-emoji{font-size:16px}
.score-pct{font-size:14px;font-weight:500;color:#5A534A;font-family:var(--fs)}

/* ── PROGRESSION ── */
.scores-progression-section{margin-bottom:40px}
.progression-list{display:flex;flex-direction:column;gap:8px;margin-bottom:32px}
.prog-item{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--ivory-card);border-radius:var(--r-sm);border:1px solid var(--ivory-3);border-left:3px solid transparent;transition:transform .15s,box-shadow .15s}
.prog-item:hover{transform:translateX(4px);box-shadow:var(--sh-card)}
.prog-item.prog-dominant{border-left-color:var(--mask-color,var(--gold));background:linear-gradient(135deg,var(--mask-soft,var(--gold-glow)) 0%,var(--ivory-card) 100%)}
.prog-rank{font-size:14px;color:#5A534A;font-weight:600;width:18px;text-align:center;flex-shrink:0}
.prog-emoji{font-size:20px;flex-shrink:0}
.prog-bar-wrap{flex:1;min-width:0}
.prog-label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:6px}
.prog-name{font-size:13px;font-weight:500;color:var(--ink)}
.prog-badge{font-size:11px;letter-spacing:1px;padding:3px 10px;border-radius:20px;font-weight:700;text-transform:uppercase}
.prog-badge-élevé,.prog-badge-elevé{background:rgba(168,135,58,.18);color:#6B4F10}
.prog-badge-significatif{background:rgba(92,50,128,.14);color:#3B1F52}
.prog-badge-modéré{background:rgba(45,122,79,.14);color:#174D30}
.prog-badge-résiduel{background:#E8E1D4;color:#3D3830}
.prog-badge-dominant{background:rgba(168,135,58,.22);color:#5A3D08;font-size:11px;font-weight:700}
.prog-track{height:8px;background:var(--ivory-3);border-radius:4px;overflow:hidden;margin:6px 0}
.prog-fill{height:100%;width:0%;border-radius:4px;transition:width 1.4s cubic-bezier(.16,1,.3,1)}
.prog-desc{font-size:14px;color:#3D3830;margin-top:4px;font-style:italic}

/* ── NEURO ── */
.neuro-intro {
  margin-bottom: 48px;
  padding: 40px 44px;
  position: relative;
  border-radius: 3px;
  background: #0D0D0D;
  color: #FEFBF6;
  overflow: hidden;
}
.neuro-intro::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 3px;
  padding: 1.5px;
  background: linear-gradient(90deg, #B5312A 0%, #C4581F 17%, #B8930A 33%, #2D7A4F 50%, #1D5F8A 67%, #5C3280 83%, #7A3594 100%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}
.neuro-intro .section-eyebrow {
  color: #C9A84C;
  margin-bottom: 20px;
}
.neuro-intro p {
  font-family: 'Cormorant Garamond', 'Playfair Display', Georgia, serif;
  font-style: italic;
  font-size: 17px;
  line-height: 1.9;
  color: rgba(254, 251, 246, 0.85);
  margin-bottom: 16px;
}
.neuro-intro p:last-child { margin-bottom: 0; }
.neuro-intro strong {
  color: #FEFBF6;
  font-style: normal;
  font-weight: 600;
}

/* ── PORTRAIT ── */
.portrait-body{margin-bottom:40px}
.portrait-headline{font-family:var(--fs);font-size:clamp(26px,4.5vw,42px);font-weight:400;line-height:1.15;color:var(--ink);margin-bottom:12px}
.portrait-tagline{font-family:var(--fs);font-style:italic;font-size:clamp(18px,2.5vw,24px);color:#3D3830;margin-bottom:28px;line-height:1.4}
.portrait-desc{font-size:17px;line-height:1.85;color:var(--ink-3);margin-bottom:28px}
.portrait-bridge{font-size:17px;line-height:1.85;color:var(--ink-3);margin-bottom:24px}
.portrait-mirror{font-family:var(--fs);font-style:italic;font-size:clamp(20px,3vw,26px);line-height:1.6;color:var(--ink);background:var(--ivory-card);border-left:4px solid var(--gold);padding:28px 36px;border-radius:0 var(--r) var(--r) 0;box-shadow:var(--sh-card);position:relative;margin-bottom:24px}
.portrait-mirror::before{content:'\201C';font-family:var(--fs);font-size:120px;color:var(--gold);opacity:.08;position:absolute;top:-20px;left:16px;line-height:1;pointer-events:none}
.portrait-voice{background:linear-gradient(135deg,var(--ivory-2),var(--ivory-card));border:1px solid var(--ivory-3);border-radius:var(--r);padding:24px 28px;margin:28px 0}
.voice-label{font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#1A1814;margin-bottom:12px}
.voice-quote{font-family:var(--fs);font-style:italic;font-size:17px;line-height:1.75;color:var(--ink-2)}
.authentic-voice-block{background:linear-gradient(135deg,rgba(201,168,76,.10) 0%,rgba(201,168,76,.04) 100%);border:1px solid var(--gold-line);border-radius:var(--r);padding:24px 28px;margin-top:32px}
.authentic-voice-text{font-family:var(--fs);font-style:italic;font-size:19px;line-height:1.65;color:#1A1814;margin:8px 0 0}

/* ── BEHAVIORS / CYCLE ── */
.behaviors-list{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:28px}
.behavior-item{background:var(--ivory-2);border:1px solid var(--ivory-3);border-radius:40px;padding:10px 20px;font-size:17px;color:var(--ink-3);transition:border-color .2s,background .2s;line-height:1.85}
.behavior-item:hover{border-color:var(--gold-line);background:var(--gold-glow)}
.cycle-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:28px}
.cycle-step{background:var(--ivory-card);border:1px solid var(--ivory-3);border-radius:var(--r-sm);padding:16px}
.step-n{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--gold-light);color:#6B4F10;font-size:13px;font-weight:600;margin-bottom:8px}
.cycle-step p{font-size:14px;line-height:1.65;color:var(--ink-3)}

/* ── DAILY GRID ── */
.daily-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-card);margin-bottom:28px}
.daily-col{padding:24px}
.daily-masked{background:var(--ivory-2)}
.daily-free{background:linear-gradient(135deg,rgba(201,168,76,.06),var(--ivory-card))}
.daily-col-label{font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;margin-bottom:16px}
.daily-masked .daily-col-label{color:#3D3830}
.daily-free .daily-col-label{color:#1A1814}
.daily-item{display:flex;gap:12px;margin-bottom:14px;font-size:17px;line-height:1.85}
.daily-time{font-family:var(--fs);font-size:14px;color:#3D3830;flex-shrink:0;font-weight:300;padding-top:1px}
.daily-desc{color:var(--ink-3)}

/* ── DYADE LOOP ── */
.dyade-loop-section{margin:32px 0}
.dyade-loop-box{background:var(--ivory-card);border-radius:var(--r);border:1px solid var(--ivory-3);padding:20px 24px;box-shadow:var(--sh-card)}
.loop-biais{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.biais-tag{font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#1A1814;padding:4px 10px;border:1px solid var(--gold-line);border-radius:20px;background:var(--gold-light)}
.biais-sep{color:#3D3830;font-size:14px}
.loop-story{font-size:17px;line-height:1.85;color:var(--ink-3);margin-bottom:14px;padding:12px 16px;background:var(--ivory-2);border-radius:var(--r-sm);border-left:2px solid var(--gold-line)}
.loop-secondary-mirror{font-size:14px;color:#3D3830;font-style:italic}
.secondary-label{font-style:normal;color:var(--ink-3)}

/* ── TRIADE ── */
.triade-label-section{margin:28px 0}
.triade-name-box{background:var(--ivory-card);border-radius:var(--r);border:1px solid var(--ivory-3);padding:20px 24px;box-shadow:var(--sh-card)}
.triade-name{display:block;font-family:var(--fs);font-size:22px;color:var(--ink);margin-bottom:8px}
.triade-note{font-size:14px;line-height:1.7;color:var(--ink-3);margin-bottom:14px}
.triade-masks{display:flex;gap:8px;flex-wrap:wrap}
.triade-mask-chip{font-size:13px;padding:4px 12px;border-radius:20px;border-width:1.5px;border-style:solid;color:var(--ink-2);background:var(--ivory)}

/* ── ORIGIN ── */
.origin-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
@media(max-width:480px){.origin-grid{grid-template-columns:1fr}}
.origin-card{padding:16px;border-radius:var(--r-sm);border-left:3px solid;background:var(--ivory-2)}
.origin-name{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:4px}
.origin-peur{font-size:14px;color:#3D3830;font-style:italic}
.secondary-block{background:var(--ivory-2);border:1px solid var(--ivory-3);border-radius:var(--r-sm);padding:14px 18px;font-size:14px;line-height:1.7;color:var(--ink-3);font-style:italic;margin-bottom:20px}

/* ── FORCE ── */
.force-section{background:linear-gradient(135deg,#1A1505 0%,#0F1208 100%);border-radius:var(--r-lg);padding:48px 52px;position:relative;overflow:hidden;margin:40px 0}
.force-logo-wm{position:absolute;bottom:-30px;right:-20px;width:280px;height:280px;object-fit:contain;opacity:.08;pointer-events:none;z-index:0;filter:brightness(1.8) saturate(.6)}
.force-section .section-eyebrow{color:rgba(201,168,76,.8);margin-bottom:16px}
.force-section .section-eyebrow::before,.force-section .section-eyebrow::after{background:rgba(201,168,76,.2)}
.force-title{font-family:var(--fs);font-size:clamp(22px,3vw,30px);font-weight:400;color:#C9A84C;margin-bottom:16px;line-height:1.25;position:relative;z-index:1}
.force-text{font-size:16px;line-height:1.85;color:rgba(254,251,246,.72);position:relative;z-index:1}
.force-ornament{font-family:var(--fs);font-size:80px;color:#C9A84C;opacity:.06;position:absolute;bottom:-10px;right:24px;pointer-events:none;line-height:1}

/* ── CARD ── */
.card-section{margin:56px 0;text-align:center}
#share-canvas{display:block;margin:0 auto;max-width:min(100%,380px);aspect-ratio:1080/1350;border-radius:var(--r);box-shadow:var(--sh-up),0 0 0 1px var(--gold-line)}
.card-buttons{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.btn{padding:11px 28px;font-family:var(--fb);font-size:13px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;border-radius:40px;cursor:pointer;transition:all .2s;border:none}
.btn-primary{background:var(--ink);color:var(--ivory)}
.btn-ghost{background:transparent;border:1.5px solid var(--ivory-3);color:var(--ink-3)}
.btn:hover{opacity:.85;transform:translateY(-2px);box-shadow:var(--sh-card)}

/* ── CTA ── */
.cta-section{text-align:center;padding:56px 24px 40px;border-top:1px solid var(--ivory-3)}
.cta-text{font-family:var(--fs);font-style:italic;font-size:20px;color:var(--ink-3);line-height:1.6;max-width:480px;margin:0 auto 28px}
.cta-platform{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#5A534A;margin-top:12px}
.btn-doctolib{display:inline-block;padding:16px 44px;background:var(--ink);color:var(--ivory);font-family:var(--fb);font-size:13px;font-weight:500;letter-spacing:3px;text-transform:uppercase;border-radius:2px;text-decoration:none;transition:background .2s,transform .2s,box-shadow .2s}
.btn-doctolib:hover{background:var(--ink-2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,24,20,.18)}

/* ── PRINT HEADER ── */
.print-header{display:none}

/* ── ANIMATIONS ── */
@keyframes fadeReveal{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes barFill{from{width:0%}}
@keyframes spin{to{transform:rotate(360deg)}}
.bloc-animate{opacity:0;animation:fadeReveal .7s ease forwards}
.bloc-animate:nth-child(1){animation-delay:.1s}
.bloc-animate:nth-child(2){animation-delay:.25s}
.bloc-animate:nth-child(3){animation-delay:.40s}
.bloc-animate:nth-child(4){animation-delay:.55s}
.bloc-animate:nth-child(5){animation-delay:.70s}
.bloc-animate:nth-child(6){animation-delay:.85s}
.bloc-animate:nth-child(7){animation-delay:1.0s}
.bloc-animate:nth-child(8){animation-delay:1.1s}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .container{padding:72px 16px 48px}

/* ── Causality intro ────────────────────────────────────────── */
.causality-intro {
  display: flex; gap: 16px; align-items: flex-start;
  padding: 20px 24px;
  background: rgba(201,168,76,.06);
  border-radius: var(--r);
  margin-bottom: 28px;
  font-size: 14px; line-height: 1.85;
  color: var(--ink-3); font-style: italic;
}
.causality-icon {
  font-size: 18px; color: #C9A84C;
  flex-shrink: 0; margin-top: 3px;
}
/* ── Dyade header ───────────────────────────────────────────── */
.dyade-header {
  background: linear-gradient(135deg, var(--ivory-2,#F7F2EB), var(--ivory-card,#FFFDF9));
  border-radius: var(--r-lg,20px);
  border: 1px solid var(--ivory-3,#EFE9DF);
  padding: 36px 40px;
  margin-bottom: 28px;
  text-align: center;
}
.dyade-header.dyade-forte { border-width: 2px; border-color: rgba(201,168,76,.35); }
.dyade-eyebrow {
  font-size: 13px; font-weight: 600; letter-spacing: 4px;
  text-transform: uppercase; color: #1A1814;
  margin-bottom: 12px;
}
.dyade-name {
  font-family: var(--fs,'Cormorant Garamond',serif);
  font-size: clamp(28px,4vw,40px); font-weight: 400;
  color: var(--ink,#1A1814); margin-bottom: 10px; line-height: 1.15;
}
.dyade-tagline {
  font-family: var(--fs,'Cormorant Garamond',serif);
  font-style: italic; font-size: clamp(16px,2.2vw,21px);
  color: var(--ink-3,#5A534A); margin-bottom: 22px; line-height: 1.55;
}
.dyade-masks-row {
  display: flex; align-items: center; justify-content: center;
  gap: 14px; flex-wrap: wrap; margin-bottom: 14px;
}
.dyade-mask-pill {
  color: #fff; font-size: 13px; font-weight: 500;
  padding: 9px 20px; border-radius: 40px; letter-spacing: .5px;
}
.dyade-amplify { font-size: 24px; color: var(--gold,#C9A84C); font-weight: 300; }
/* ── Triade header ──────────────────────────────────────────── */
.triade-header {
  background: linear-gradient(135deg, var(--ivory-2,#F7F2EB), var(--ivory-card,#FFFDF9));
  border-radius: var(--r-lg,20px);
  border: 1px solid var(--ivory-3,#EFE9DF);
  padding: 36px 40px; margin-bottom: 28px; text-align: center;
}
.triade-pills {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; flex-wrap: wrap; margin: 16px 0;
}
.triade-plus { font-size: 20px; color: var(--gold,#C9A84C); }
.triade-science {
  font-size: 14px; line-height: 1.75; color: #3D3830;
  font-style: italic; margin-top: 16px; max-width: 480px; margin-left: auto; margin-right: auto;
}
/* ── Loop top (dyade/triade, position haute) ────────────────── */
.loop-top {
  background: var(--ivory-2,#F7F2EB);
  border-left: 4px solid var(--gold,#C9A84C);
  border-radius: 0 var(--r,12px) var(--r,12px) 0;
  padding: 22px 28px; margin-bottom: 28px;
}
.loop-top-label {
  font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
  color: #1A1814; margin-bottom: 14px; font-weight: 600;
}
.loop-story-prominent {
  font-size: 17px; line-height: 1.85;
  color: var(--ink-2,#2C2820); font-style: italic; margin-top: 12px;
}
/* ── Mirror compact (pour profils dyade/triade) ─────────────── */
.portrait-mirror-compact {
  font-family: var(--fs,'Cormorant Garamond',serif);
  font-style: italic; font-size: clamp(17px,2.4vw,22px);
  line-height: 1.6; color: var(--ink,#1A1814);
  border-left: 3px solid var(--gold,#C9A84C);
  padding: 20px 28px;
  background: var(--ivory-card,#FFFDF9);
  border-radius: 0 var(--r,12px) var(--r,12px) 0;
  margin-bottom: 20px;
}
/* ── Pivot separator ────────────────────────────────────────── */
.pivot-separator {
  display: flex; align-items: center; gap: 16px;
  margin: 40px 0 28px;
}
.pivot-line { flex: 1; height: 1px; background: var(--ivory-3,#EFE9DF); }
.pivot-text {
  font-size: 13px; font-weight: 600; letter-spacing: 3px;
  text-transform: uppercase; color: #1A1814;
  white-space: nowrap;
}
/* ── Céline quote ───────────────────────────────────────────── */
.cita-quote {
  border-left: 3px solid var(--gold,#C9A84C);
  padding: 20px 28px; margin: 0 0 28px;
  font-family: var(--fs,'Cormorant Garamond',serif);
  font-style: italic; font-size: clamp(18px,2.5vw,22px);
  color: var(--ink-2,#2C2820); line-height: 1.65;
}
.cita-quote p { margin-bottom: 10px; }
.cita-quote span {
  display: block; font-size: 13px; letter-spacing: 3px;
  text-transform: uppercase; color: #1A1814;
  font-style: normal; font-family: var(--fb,'DM Sans',sans-serif);
}
/* ── CTA amélioré ───────────────────────────────────────────── */
.cta-bridge {
  font-family: var(--fs,'Cormorant Garamond',serif);
  font-style: italic; font-size: clamp(18px,2.5vw,22px);
  color: var(--ink-3,#5A534A); line-height: 1.65;
  margin-bottom: 28px; max-width: 480px; margin-left: auto; margin-right: auto;
}
.cta-sub {
  font-size: 13px; color: #5A534A;
  margin-top: 14px; letter-spacing: .5px;
}

/* ── PRINT ── */

  .print-header img{width:60px;height:60px;object-fit:contain}
  .print-header-text{font-family:'Cormorant Garamond',serif;font-size:14px;letter-spacing:3px;text-transform:uppercase;color:#1A1814}
}

// ── DETECT PROFILE ─────────────────────────────────────────────────────
const TIEBREAK_ORDER = ['jaune','rouge','indigo','vert','bleu','orange','violet'];

function detectProfile(pct) {
  // Trier par score décroissant, puis par tiebreak en cas d'égalité
  const sorted = Object.entries(pct)
    .filter(([k]) => MASKS.includes(k))
    .sort((a, b) => b[1] - a[1] || TIEBREAK_ORDER.indexOf(a[0]) - TIEBREAK_ORDER.indexOf(b[0]));

  const masks = sorted.map(x => x[0]);
  const scores = sorted.map(x => x[1]);

  const S1 = scores[0] || 0;
  const S2 = scores[1] || 0;
  const S3 = scores[2] || 0;
  const S4 = scores[3] || 0;

  // Résultat de base (sera modifié selon le profil détecté)
  const res = {
    type: 'mono',
    subtype: 'residuel',
    primary: masks[0] || null,
    secondary: null,
    tertiary: null,
    masks: masks,       // tableau complet trié
    scores: pct,
    sorted: sorted
  };

  // 1. Adaptatif
  if (S1 < 50) {
    res.type = 'adaptatif';
    res.subtype = S1 < 30 ? 'equilibre' : 'vigilant';
    return res;
  }

  // 12. Pan-masques (vérifié avant les autres car condition spécifique)
  const active60 = scores.filter(v => v >= 60);
  if (active60.length >= 5) {
    const maxActive = Math.max(...active60);
    const minActive = Math.min(...active60);
    const spread = maxActive - minActive;
    if (spread <= 20) {
      res.type = 'pan';
      res.subtype = spread <= 5 ? 'ultra_plat' : spread <= 10 ? 'generalise' : 'structure';
      res.primary = masks[0];
      res.secondary = masks[1];
      res.tertiary = masks[2];
      return res;
    }
  }

  // 2. Triade (ouverte)
  if (S1 >= 60 && S2 >= 55 && S3 >= 55 && (S1 - S3) <= 15 && (S2 - S4) > 10) {
    res.type = 'triade';
    res.subtype = 'ouverte';
    res.primary = masks[0];
    res.secondary = masks[1];
    res.tertiary = masks[2];
    return res;
  }

  // 3. Triade serrée
  if (S1 >= 55 && S2 >= 55 && S3 >= 55 && (S1 - S3) <= 10) {
    res.type = 'triade';
    res.subtype = 'serree';
    res.primary = masks[0];
    res.secondary = masks[1];
    res.tertiary = masks[2];
    return res;
  }

  // 4. Dyade forte
  if (S1 >= 65 && S2 >= 65 && S3 < 55 && (S1 - S2) <= 10) {
    res.type = 'dyade';
    res.subtype = 'forte';
    res.primary = masks[0];
    res.secondary = masks[1];
    return res;
  }

  // 5. Dyade forte + tertiaire
  if (S1 >= 65 && S2 >= 65 && S3 >= 55 && S3 <= 64 && (S1 - S2) <= 10) {
    res.type = 'dyade';
    res.subtype = 'forte_tertiaire';
    res.primary = masks[0];
    res.secondary = masks[1];
    res.tertiary = masks[2];
    return res;
  }

  // 7. Dyade modérée
  if (S1 >= 55 && S2 >= 55 && S3 < 50 && (S1 - S2) <= 10) {
    res.type = 'dyade';
    res.subtype = 'moderee';
    res.primary = masks[0];
    res.secondary = masks[1];
    return res;
  }

  // 8. Mono dominant + secondaire notable
  if (S1 >= 75 && S2 >= 60 && S2 <= 74 && (S1 - S2) >= 11 && (S1 - S2) <= 20) {
    res.type = 'mono';
    res.subtype = 'dominant_secondaire_notable';
    res.secondary = masks[1];
    return res;
  }

  // 9. Mono dominant pur
  if (S1 >= 75 && S2 < 55 && (S1 - S2) > 20) {
    res.type = 'mono';
    res.subtype = 'dominant_pur';
    return res;
  }

  // 10. Mono fort
  if (S1 >= 60 && S1 <= 74 && S2 < 50 && (S1 - S2) > 15) {
    res.type = 'mono';
    res.subtype = 'fort';
    return res;
  }

  // 11. Mono modéré
  if (S1 >= 50 && S1 <= 59) {
    res.type = 'mono';
    res.subtype = 'modere';
    return res;
  }

  // Cas résiduel (fallback)
  return res;
}
function computeSPA(sc) {
  const t = MASKS.reduce((s,m)=>s+(sc[m]||0),0);
  return Math.max(0,Math.min(100,Math.round(100-t/7)));
}

function getLevel(pct) {
  if (pct>=85) return 'Dominant';
  if (pct>=70) return 'Élevé';
  if (pct>=50) return 'Significatif';
  if (pct>=30) return 'Modéré';
  return 'Résiduel';
}

function getDyade(a, b) {
  if (!a || !b) return null;
  return DYADES[[a, b].sort().join("+")] || null;
}
function getTriade(masks) {
  if (!masks || masks.length < 3) return null;
  return TRIADES[[...masks].sort().join("+")] || null;
}

async function saveToNeon(pct, prof, email, prenom) {
  try {
    await fetch('https://valeur-backend-api.vercel.app/api/save-profile', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        email:email||null,
        prenom:prenom||null,
        scores:pct,
        dominant:prof.masks[0],
        secondary:prof.secondary||prof.masks[1]||null,
        profil_type:prof.type,
        profil_subtype:prof.subtype||null,
        spa:computeSPA(pct),
        created_at:new Date().toISOString()
      })
    });
  } catch(e) { console.log('Save failed silently:',e); }
}

// ── BUILD SPA ──────────────────────────────────────────────────────────
function buildSPA(spa) {
  const r=44, circ=2*Math.PI*r, offset=circ*(1-spa/100);
  const arcCol=spa>=60?'var(--gold)':spa>=40?'var(--bleu)':'var(--ink-5)';
  return `<div class="spa-section">
    <div class="section-eyebrow">Score de Présence Authentique</div>
    <div class="spa-inner">
      <div class="spa-arc">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="${r}" fill="none" stroke="var(--ivory-3)" stroke-width="8"/>
          <circle cx="50" cy="50" r="${r}" fill="none" stroke="${arcCol}" stroke-width="8"
                  stroke-linecap="round" stroke-dasharray="${circ.toFixed(1)}"
                  stroke-dashoffset="${offset.toFixed(1)}" style="transition:stroke-dashoffset 1.4s ease"/>
        </svg>
        <div class="spa-number">${spa}%</div>
        <div class="spa-lbl">SPA</div>
      </div>
      <div class="spa-info">
        <p class="spa-desc"><em>Vous disposez déjà de ${spa} % d'espace de liberté intérieure.</em></p>
        <p class="spa-sub">Les moments où vous agissez depuis ce que vous êtes vraiment, sans que la peur décide à votre place.</p>
      </div>
    </div>
  </div>`;
}

// ── MASK GRADIENTS ────────────────────────────────────────────────────
const MASK_GRADIENTS = {
  rouge:  ['#4A0C12', '#B5312A'],
  orange: ['#6B2005', '#C4581F'],
  jaune:  ['#6A4800', '#B8930A'],
  vert:   ['#0A2E18', '#2D7A4F'],

// ── BUILD CARD (Canvas 1080×1350) ─────────────────────────────────────
function buildCard(pct, prof, prenom) {
  const canvas = document.getElementById('share-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1350;
  canvas.width = W; canvas.height = H;
  canvas.style.aspectRatio = '1080/1350';

  const dom  = prof.masks[0];
  const sec  = prof.secondary || null;
  const meta    = MASK_META[dom];
  const col     = meta.color;
  const spa     = computeSPA(pct);
  const dd      = sec ? getDyade(dom, sec) : null;
  const td      = prof.type === 'triade' ? getTriade(prof.masks) : null;
  const maskImg = MASK_IMAGES[dom] || MASK_IMAGES['pan'];
  const grad    = MASK_GRADIENTS[dom] || MASK_GRADIENTS['pan'];

  const PEUR_LABEL_CARD = {
    rouge:  "Parmi les 7 peurs qui empêchent d'être soi, la peur de la maladie et de la mort est celle qui prend le plus de place chez vous.",
    orange: "Parmi les 7 peurs qui empêchent d'être soi, la peur de ressentir et de souffrir est celle qui prend le plus de place chez vous.",
    jaune:  "Parmi les 7 peurs qui empêchent d'être soi, la peur de l'inconnu et de l'incertain est celle qui prend le plus de place chez vous.",
    vert:   "Parmi les 7 peurs qui empêchent d'être soi, la peur du rejet et de l'abandon est celle qui prend le plus de place chez vous.",
    bleu:   "Parmi les 7 peurs qui empêchent d'être soi, la peur de perdre le contrôle est celle qui prend le plus de place chez vous.",
    indigo: "Parmi les 7 peurs qui empêchent d'être soi, la peur de l'échec et du jugement est celle qui prend le plus de place chez vous.",
    violet: "Parmi les 7 peurs qui empêchent d'être soi, la peur d’être jugé·e sur qui l’on est est celle qui prend le plus de place chez vous.",
  };

  // ── helpers ──────────────────────────────────────────────────────────
  function wrapText(text, maxW) {
    const words = text.split(' '), lines = [];
    let cur = '';
    words.forEach(w => {
      const t = cur + (cur ? ' ' : '') + w;
      if (ctx.measureText(t).width > maxW && cur) { lines.push(cur); cur = w; }
      else cur = t;
    });
    if (cur) lines.push(cur);
    return lines;
  }
  function roundRect(x, y, w, h2, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h2-r);
    ctx.quadraticCurveTo(x+w,y+h2,x+w-r,y+h2); ctx.lineTo(x+r,y+h2);
    ctx.quadraticCurveTo(x,y+h2,x,y+h2-r); ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  }
  function hexToRgba(hex, a) {
    const n = parseInt(hex.replace('#',''), 16);
    return 'rgba('+(n>>16)+','+(((n>>8)&255))+','+(n&255)+','+a+')';
  }
  function stripHtml(html) {
    return html.replace(/<[^>]+>/g,'').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
  }

  // ── RENDU ─────────────────────────────────────────────────────────────
  const render = (c, withLogo) => {
    c.textBaseline = 'alphabetic';

    // ══ FOND dégradé masque ═══════════════════════════════════════════
    const bgGrad = c.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, grad[0]);
    bgGrad.addColorStop(1, grad[1]);
    c.fillStyle = bgGrad; c.fillRect(0, 0, W, H);

    // Halo radial subtil
    const halo = c.createRadialGradient(W/2, 0, 0, W/2, 0, W*.8);
    halo.addColorStop(0, hexToRgba(col, .15));
    halo.addColorStop(1, 'rgba(0,0,0,0)');
    c.fillStyle = halo; c.fillRect(0, 0, W, H);

    // ── Masque PNG arrière-plan (30% opacity) ─────────────────────────
    if (maskImg && maskImg.complete && maskImg.naturalHeight > 0) {
      c.save();
      c.globalAlpha = 0.28;
      const mS = 1100;
      c.drawImage(maskImg, (W - mS) / 2, 60, mS, mS);
      c.restore();
    }

    // ══ ZONE A — Header (y: 0 → 160) ══════════════════════════════════
    // Bande chromatique top 12px
    ['#B5312A','#C4581F','#B8930A','#2D7A4F','#1D5F8A','#5C3280','#7A3594']
      .forEach((cl,i) => { c.fillStyle=cl; c.fillRect(i*(W/7),0,Math.ceil(W/7)+1,12); });

    // Logo V·A·L·E·U·R© avec glow doré
    const logoEl = document.getElementById('logo-valeur-img');
    if (withLogo && logoEl && logoEl.complete && logoEl.naturalHeight > 0) {
      c.save();
      c.shadowColor = '#C9A84C'; c.shadowBlur = 18; c.globalAlpha = 0.95;
      const lH = 70, lW = lH * (logoEl.naturalWidth / logoEl.naturalHeight);
      c.drawImage(logoEl, (W - lW) / 2, 26, lW, lH);
      c.restore();
    } else {
      c.font = '700 32px Georgia,serif'; c.fillStyle = '#C9A84C';
      c.shadowColor = '#C9A84C'; c.shadowBlur = 14;
      c.textAlign = 'center'; c.fillText('V · A · L · E · U · R ©', W/2, 80);
      c.shadowBlur = 0;
    }

    c.font = '300 18px Arial'; c.fillStyle = 'rgba(255,255,255,.55)';
    c.textAlign = 'center';
    c.fillText("Se libérer des 7 peurs qui empêchent d'être soi", W/2, 118);

    // Sépar or
    c.fillStyle = 'rgba(201,168,76,.35)'; c.fillRect(72, 142, W-144, 1);

    // ══ ZONE B — Masque identité (y: 160 → 360) ══════════════════════
    // Emoji masque (56px)
    c.font = '56px serif'; c.textAlign = 'center'; c.fillStyle = '#FFFFFF';
    c.fillText(meta.emoji || '', W/2, 218);

    // Nom masque avec letterSpacing 5px
    c.font = '700 28px Arial'; c.fillStyle = '#FFFFFF';
    c.letterSpacing = '5px'; c.textAlign = 'center';
    c.fillText((meta.name || dom).toUpperCase(), W/2, 260);
    c.letterSpacing = '0px';

    // Phrase PEUR_LABEL (2 lignes max)
    const peurTxt = PEUR_LABEL_CARD[dom] || '';
    c.font = '300 20px Arial'; c.fillStyle = 'rgba(254,251,246,0.75)'; c.textAlign = 'center';
    const plLines = wrapText(peurTxt, W - 200);
    let plY = 290;
    plLines.slice(0, 2).forEach(l => { c.fillText(l, W/2, plY); plY += 26; });

    // Score % dominant (80px, couleur masque)
    c.font = '700 80px Georgia,serif'; c.fillStyle = col; c.textAlign = 'center';
    c.fillText((pct[dom] || 0) + '%', W/2, 378);

    // ══ ZONE C — Sous-titre viral (y: 390 → 440) ══════════════════════
    const colorName = dom.charAt(0).toUpperCase() + dom.slice(1);
    const partA = 'Je suis un masque ';
    const partC = ' et toi ?';
    c.font = '400 26px Arial'; c.textAlign = 'left';
    const wA = c.measureText(partA).width;
    const wB = c.measureText(colorName).width;
    const wC = c.measureText(partC).width;
    const lineStartX = W/2 - (wA + wB + wC) / 2;
    c.fillStyle = '#FFFFFF'; c.fillText(partA, lineStartX, 418);
    c.fillStyle = col; c.fillText(colorName, lineStartX + wA, 418);
    c.fillStyle = '#FFFFFF'; c.fillText(partC, lineStartX + wA + wB, 418);

    // ══ ZONE D — Citation bridge (y: 440 → 760) ══════════════════════
    c.font = '72px Georgia,serif'; c.fillStyle = 'rgba(201,168,76,0.65)';
    c.textAlign = 'left'; c.fillText('“', 72, 510);

    const bridgeRaw  = PLAYLIST[dom] ? PLAYLIST[dom].bridge : '';
    const bridgeTxt  = stripHtml(bridgeRaw);
    const bridgeTrunc = bridgeTxt.length > 200 ? bridgeTxt.slice(0, 200) + '…' : bridgeTxt;
    c.font = 'italic 28px Georgia,serif'; c.fillStyle = '#FFFFFF'; c.textAlign = 'left';
    const bLines = wrapText(bridgeTrunc, W - 160);
    let bY = 530;
    bLines.forEach(l => { c.fillText(l, 80, bY); bY += 41; });

    // ══ ZONE E — Prénom (y: 760 → 840) ══════════════════════════════
    if (prenom && prenom.trim()) {
      c.font = '400 36px Georgia,serif'; c.fillStyle = 'rgba(254,251,246,0.85)';
      c.textAlign = 'center';
      c.fillText('— ' + prenom.trim() + ' —', W/2, 808);
    }

    // ══ ZONE F — Config profil (y: 840 → 1050) ════════════════════════
    let fY = 862; c.textAlign = 'center';

    if (prof.type === 'mono') {
      const bX2 = 80, bWF = W - 160, bHF = 12;
      ctx.fillStyle = 'rgba(255,255,255,.10)';
      roundRect(bX2, fY, bWF, bHF, 6); c.fill();
      const fw2 = Math.round((pct[dom]||0)/100 * bWF);
      const bg2 = c.createLinearGradient(bX2,0,bX2+bWF,0);
      bg2.addColorStop(0, col); bg2.addColorStop(1, col+'BB');
      c.fillStyle = bg2; roundRect(bX2, fY, fw2, bHF, 6); c.fill();
      fY += bHF + 28;
      c.font = '500 24px Arial'; c.fillStyle = '#C9A84C'; c.textAlign = 'center';
      c.fillText('Présence authentique : ' + spa + '%', W/2, fY);

    } else if (prof.type === 'dyade' && dd) {
      c.font = '700 14px Arial'; c.fillStyle = '#C9A84C';
      c.letterSpacing = '4px'; c.textAlign = 'center';
      c.fillText('CONFIGURATION DYADE', W/2, fY); fY += 38;
      c.letterSpacing = '0px';
      c.font = 'italic 300 36px Georgia,serif'; c.fillStyle = '#FFFFFF';
      c.fillText(dd.n, W/2, fY); fY += 48;
      c.font = '300 20px Arial'; c.fillStyle = 'rgba(255,255,255,.60)';
      const dtL = wrapText(dd.tagline.slice(0, 90), W - 160);
      dtL.slice(0, 2).forEach(l => { c.fillText(l, W/2, fY); fY += 28; });

    } else if (prof.type === 'triade' && td) {
      c.font = '700 14px Arial'; c.fillStyle = '#C9A84C';
      c.letterSpacing = '4px'; c.textAlign = 'center';
      c.fillText('CONFIGURATION TRIADE', W/2, fY); fY += 38;
      c.letterSpacing = '0px';
      c.font = 'italic 300 34px Georgia,serif'; c.fillStyle = '#FFFFFF';
      const tNL = wrapText(td.n, W-160);
      tNL.slice(0,2).forEach(l => { c.fillText(l, W/2, fY); fY += 42; });

    } else if (prof.type === 'pan') {
      c.font = '700 14px Arial'; c.fillStyle = '#C9A84C';
      c.letterSpacing = '4px'; c.textAlign = 'center';
      c.fillText('CONFIGURATION PAN-MASQUES', W/2, fY); fY += 44;
      c.letterSpacing = '0px';
      const bWP = Math.floor((W - 160 - 60) / 7);
      const bMaxHP = 100;
      MASKS.forEach((m, i) => {
        const bxP = 80 + i * (bWP + 10);
        const fhP = Math.round((pct[m]||0)/100 * bMaxHP);
        ctx.fillStyle = 'rgba(255,255,255,.07)';
        roundRect(bxP, fY, bWP, bMaxHP, 3); c.fill();
        if (fhP > 0) {
          ctx.fillStyle = MASK_GRADIENTS[m] ? MASK_GRADIENTS[m][1] : MASK_META[m].color;
          roundRect(bxP, fY + bMaxHP - fhP, bWP, fhP, 3); c.fill();
        }
        c.font = '16px serif'; c.fillStyle = MASK_META[m].color; c.textAlign = 'center';
        c.fillText(MASK_META[m].emoji || '', bxP + bWP/2, fY + bMaxHP + 22);
        c.font = '700 16px Arial'; c.fillStyle = '#FFFFFF';
        c.fillText((pct[m]||0) + '%', bxP + bWP/2, fY + bMaxHP + 42);
      });
      fY += bMaxHP + 60;

    } else if (prof.type === 'adaptatif') {
      c.font = '700 14px Arial'; c.fillStyle = '#C9A84C';
      c.letterSpacing = '4px'; c.textAlign = 'center';
      c.fillText('PROFIL ADAPTATIF · PRÉSENCE AUTHENTIQUE', W/2, fY); fY += 44;
      c.letterSpacing = '0px';
      c.font = '700 64px Georgia,serif'; c.fillStyle = '#C9A84C';
      c.fillText(spa + '%', W/2, fY + 60); fY += 80;
      c.font = '300 22px Arial'; c.fillStyle = 'rgba(255,255,255,.7)';
      c.fillText('Score de présence authentique', W/2, fY + 10);
    }

    // ══ ZONE G — CTA + Footer (y: 1050 → 1350) ════════════════════════
    if (prof.type !== 'mono' && prof.type !== 'adaptatif') {
      c.font = '500 22px Arial'; c.fillStyle = '#C9A84C'; c.textAlign = 'center';
      c.fillText('▗  Présence authentique : ' + spa + '%', W/2, 1068);
    }
    const sepG = (prof.type !== 'mono' && prof.type !== 'adaptatif') ? 1090 : 1064;
    c.fillStyle = 'rgba(201,168,76,.35)'; c.fillRect(72, sepG, W-144, 1);

    // Pill CTA
    const ctaY = sepG + 68;
    ctx.strokeStyle = col; ctx.lineWidth = 2;
    roundRect(W/2 - 280, ctaY - 32, 560, 58, 29); c.stroke();
    const ctaA = 'Découvre ton profil. ';
    const ctaB = 'Gratuit.';
    c.font = '400 26px Georgia,serif'; c.textBaseline = 'middle';
    const wCTA_A = c.measureText(ctaA).width;
    const wCTA_B = c.measureText(ctaB).width;
    const ctaSX = W/2 - (wCTA_A + wCTA_B) / 2;
    c.fillStyle = '#FFFFFF'; c.textAlign = 'left';
    c.fillText(ctaA, ctaSX, ctaY);
    c.font = '700 26px Georgia,serif'; c.fillStyle = col;
    c.fillText(ctaB, ctaSX + wCTA_A, ctaY);
    c.textBaseline = 'alphabetic';

    // Footer
    c.font = '500 22px Arial'; c.fillStyle = '#C9A84C'; c.textAlign = 'left';
    c.fillText('questionnaire.psyh.fr', 72, 1280);
    c.font = '400 20px Arial'; c.fillStyle = 'rgba(255,255,255,.40)';
    c.letterSpacing = '1px'; c.textAlign = 'right';
    c.fillText('#methodeVALEUR', W-72, 1280);
    c.letterSpacing = '0px';

    // Bande chromatique bottom 12px
    ['#B5312A','#C4581F','#B8930A','#2D7A4F','#1D5F8A','#5C3280','#7A3594']
      .forEach((cl,i) => { c.fillStyle=cl; c.fillRect(i*(W/7),H-12,Math.ceil(W/7)+1,12); });
  };

  // ── Téléchargement ─────────────────────────────────────────────────
  const dl = () => {
    render(ctx, true);
    try {
      const a = document.createElement('a');
      a.download = 'portrait-valeur.png'; a.href = canvas.toDataURL('image/png'); a.click();
    } catch(e) {
      const c2 = document.createElement('canvas'); c2.width = W; c2.height = H;
      render(c2.getContext('2d'), false);
      const a = document.createElement('a');
      a.download = 'portrait-valeur.png'; a.href = c2.toDataURL('image/png'); a.click();
    }
  };

  // ── Partage ────────────────────────────────────────────────────────
  const share = async () => {
    const txt =
      "'Ceci n'est pas un test de personnalité. C'est la carte de vos protections invisibles.'" +
      ' Je viens de découvrir mon '+meta.name+' V.A.L.E.U.R©. ' +
      'Précis. Utile. Gratuit. → questionnaire.psyh.fr';
    const getBlob = () => new Promise(res => {
      render(ctx, true);
      try { canvas.toBlob(b => res(b), 'image/png'); }
      catch(e) {
        const c2 = document.createElement('canvas'); c2.width = W; c2.height = H;
        render(c2.getContext('2d'), false); c2.toBlob(b => res(b), 'image/png');
      }
    });
    if (navigator.share) {
      try {
        const blob = await getBlob();
        await navigator.share({ files:[new File([blob],'portrait-valeur.png',{type:'image/png'})], text:txt });
      } catch(e) { await navigator.clipboard.writeText(txt).catch(()=>{}); alert('Message copié !'); }
    } else { await navigator.clipboard.writeText(txt).catch(()=>{}); alert('Message copié !'); }
  };

  // ── Setup ──────────────────────────────────────────────────────────
  const setup = () => {
    render(ctx, true);
    const dlBtn = document.getElementById('btn-dl-card');
    if (dlBtn) dlBtn.onclick = dl;
    const shareBtn = document.getElementById('btn-share-card');
    if (shareBtn) shareBtn.onclick = share;
  };

  if (maskImg && !maskImg.complete) {
    maskImg.onload = () => setTimeout(setup, 100);
    maskImg.onerror = () => setTimeout(setup, 100);
    setTimeout(setup, 800);
  } else {
    setTimeout(setup, 100);
  }
}

      const dd=sec?getDyade(dom,sec):null;
      const td=prof.type==='triade'?getTriade(prof.masks):null;
      const tagline=(td?.tagline)||(dd?.tagline)||(prof.type==='pan'?PAN_MASQUE_V2.tagline:'')||FORCES_LIBEREES[dom]?.titre||'';
      const configName=(td?.name)||(dd?.name)||(prof.type==='pan'?PAN_MASQUE_V2.nom:MASK_META[dom].name)||'';
      emailjs.send('Questionnaire VALEUR','template_inscription',{
        to_email:email, prenom:prenom||'Vous',
        masque_dominant:MASK_META[dom].name, peur_centrale:MASK_META[dom].peur,
        tagline_config:tagline, config_name:configName,
        spa_score:computeSPA(pct)+'%', lien_rapport:location.href,
        lien_psycho:'https://www.doctolib.fr/psychologue/bordeaux/celine-bourbon',
        force_liberee:FORCES_LIBEREES[dom]?.titre||'',
        date_passation:new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})
      });
    } catch(e) { console.log('Email failed silently:',e); }
  }
})();
</script>
