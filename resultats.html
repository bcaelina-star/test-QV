<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>V.A.L.E.U.R© — Votre Traversée</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
 --bg:#FCFAF7; --text:#1A1714; --text2:#3A3532; --text3:#6B6460;
 --gold:#C9A84C; --gold-ink:#7A5E1A; --line:#E5E0D8; --card-bg:#F6F4F0;
 --rouge:#B5312A; --orange:#C4581F; --jaune:#B8930A;
 --vert:#2D7A4F; --bleu:#1D5F8A; --indigo:#5C3280; --violet:#7A3594;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'DM Sans',sans-serif;font-weight:300;color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;}
.container{max-width:780px;margin:0 auto;padding:60px 24px 80px;}
h1,h2,h3,h4{font-family:'Cormorant Garamond',serif;font-weight:400;color:var(--text);}
h2{font-size:26px;margin-bottom:16px;line-height:1.3;}
h3{font-size:20px;margin-bottom:8px;}
h4{font-size:18px;margin-bottom:6px;}
p{font-size:15px;}
.chroma-bar{height:4px;margin-bottom:48px;background:linear-gradient(90deg,var(--rouge),var(--orange),var(--jaune),var(--vert),var(--bleu),var(--indigo),var(--violet));}
.movement-tag{font-size:10px;font-weight:600;letter-spacing:.34em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.movement-tag .num{color:var(--gold);font-weight:600;}

/* Couverture */
.cover-page{background:#FDFAF6;border:1px solid rgba(201,168,76,.18);padding:44px 40px 36px;margin-bottom:32px;}
.cover-letterhead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid rgba(201,168,76,.2);}
.cover-brand-main{font-size:13px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);}
.cover-brand-sub{font-size:11px;color:var(--text3);letter-spacing:.08em;margin-top:3px;}
.cover-meta{text-align:right;font-size:11px;color:var(--text3);line-height:1.7;}
.cover-prenom-block{margin:28px 0 20px;}
.cover-label{font-size:10px;font-weight:600;letter-spacing:.32em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
.cover-prenom{font-family:'Cormorant Garamond',serif;font-size:clamp(38px,7vw,64px);font-weight:300;line-height:1.1;color:var(--text);letter-spacing:.02em;}
.cover-divider{height:1px;background:linear-gradient(90deg,var(--gold),rgba(201,168,76,.15));margin:24px 0;}
.cover-tagline{font-family:'Cormorant Garamond',serif;font-size:clamp(17px,2.5vw,22px);font-style:italic;font-weight:300;line-height:1.55;color:var(--text);text-align:center;padding:4px 0 2px;}
.cover-tagline-attr{text-align:center;font-size:11px;color:var(--text3);letter-spacing:.1em;margin-top:8px;}

/* Manifeste */
.manifeste{background:var(--card-bg);border-radius:12px;padding:36px 32px;margin-bottom:32px;border:1px solid rgba(201,168,76,.18);}
.manifeste h2{font-size:28px;color:var(--gold-ink);margin-bottom:20px;}
.manifeste .mf-lead{font-family:'Cormorant Garamond',serif;font-size:19px;font-style:italic;line-height:1.6;color:var(--text);margin-bottom:20px;}

/* Blocs */
.block{background:var(--card-bg);border-radius:12px;padding:32px 28px;margin-bottom:32px;box-shadow:0 1px 4px rgba(0,0,0,.02);}
.block.accent{border-left:4px solid;}
.lead{color:var(--text2);font-size:14.5px;line-height:1.85;}
.mirror-phrase{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;line-height:1.5;color:var(--text);margin:22px 0;padding-left:16px;border-left:3px solid;}
.voice-phrase{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;line-height:1.6;color:var(--text2);margin:16px 0;padding:16px 20px;background:rgba(255,255,255,.7);border-radius:8px;}

/* Double défensif */
.double-def{background:rgba(0,0,0,.02);border:1px solid rgba(0,0,0,.08);border-radius:12px;padding:24px 26px;margin:22px 0;}
.double-def h3{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:400;color:var(--text);margin-bottom:8px;}
.double-def p{font-size:14px;color:var(--text2);line-height:1.8;}
.double-def .dd-brace{display:flex;align-items:center;gap:14px;margin:16px 0 0;padding:14px 18px;background:#fff;border-radius:10px;border:1px dashed rgba(201,168,76,.3);}
.double-def .dd-brace .dd-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.double-def .dd-brace .dd-label{font-size:13px;color:var(--text2);line-height:1.6;}

/* Carte d'identité */
.cid-grid{display:flex;flex-direction:column;gap:0;margin:18px 0 0;border:1px solid rgba(0,0,0,.07);border-radius:10px;overflow:hidden;}
.cid-row{display:flex;gap:0;border-top:1px solid rgba(0,0,0,.06);}
.cid-row:first-child{border-top:none;}
.cid-k{flex:0 0 140px;padding:14px 16px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;background:rgba(0,0,0,.02);color:var(--cid-c);display:flex;align-items:flex-start;}
.cid-v{flex:1;padding:14px 16px;font-size:14px;color:var(--text2);line-height:1.65;}

/* Bloqueur / Amplificateur */
.ba-concept{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0;}
.ba-card{border-radius:12px;padding:18px 20px;border:1px solid;}
.ba-card .ba-role{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px;}
.ba-card .ba-name{font-family:'Cormorant Garamond',serif;font-size:21px;margin-bottom:8px;}
.ba-card .ba-d{font-size:13.5px;color:var(--text2);line-height:1.65;}
.ba-you{background:#FFFDF7;border:1px solid rgba(201,168,76,.25);border-radius:10px;padding:16px 18px;margin:8px 0 0;font-size:14px;color:var(--text2);line-height:1.75;}

/* Piège + épreuve */
.trap{background:#1A1714;color:#F1ECE3;border-radius:12px;padding:28px 30px;margin:0 0 32px;}
.trap .tq{font-family:'Cormorant Garamond',serif;font-size:23px;font-style:italic;line-height:1.5;color:#fff;margin-bottom:14px;}
.trap .tt{font-size:14.5px;line-height:1.8;color:rgba(241,236,227,.82);}
.reality-check{background:linear-gradient(135deg,rgba(45,122,79,.08),rgba(45,122,79,.02));border:2px solid rgba(45,122,79,.3);border-radius:12px;padding:24px 26px;margin:-16px 0 32px;}
.reality-check .rc-tag{font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--vert);margin-bottom:8px;}
.reality-check .rc-title{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--vert);margin-bottom:14px;}
.reality-check .rc-step{font-size:14px;color:var(--text2);line-height:1.7;margin:6px 0;}
.reality-check .rc-note{font-size:12px;color:var(--text3);font-style:italic;margin-top:12px;line-height:1.6;}

/* Espaces libres */
.appui-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0 0;}
.appui-card{background:rgba(45,122,79,.05);border:1px solid rgba(45,122,79,.22);border-radius:10px;padding:16px 18px;}
.appui-h{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin-bottom:6px;}
.appui-h .d{width:9px;height:9px;border-radius:50%;}
.appui-card p{font-size:13px;color:var(--text2);line-height:1.6;}

/* Carte jauges */
.carte-block{background:var(--card-bg);border-radius:12px;padding:32px 28px;margin-bottom:32px;}
.toile-wrapper{display:flex;align-items:center;justify-content:center;margin:16px 0 24px;}
.toile-wrapper canvas{max-width:340px;max-height:340px;width:100%;height:auto;}
.jauge-liste{display:flex;flex-direction:column;gap:12px;}
.jauge-ligne{display:flex;align-items:center;gap:12px;}
.jauge-nom{width:130px;font-size:13px;font-weight:600;color:var(--text);text-align:right;flex-shrink:0;}
.jauge-normalisee{flex:1;height:20px;background:rgba(0,0,0,.04);border-radius:4px;position:relative;overflow:visible;}
.jauge-normalisee .zone-grise{position:absolute;top:0;left:0;height:100%;background:rgba(0,0,0,.06);border-radius:4px 0 0 4px;}
.jauge-normalisee .zone-couleur{position:absolute;top:0;height:100%;border-radius:0 4px 4px 0;}
.jauge-normalisee .trait-score{position:absolute;top:-4px;width:3px;height:28px;border-radius:2px;z-index:2;}
.jauge-pct{width:42px;font-size:13px;font-weight:600;text-align:right;flex-shrink:0;}
.carte-legend{margin-top:18px;padding:14px 18px;background:#FFFDF7;border:1px solid rgba(201,168,76,.2);border-radius:8px;font-size:13px;color:var(--text2);line-height:1.7;}

/* Pont items → libération */
.bridge-item{display:flex;gap:12px;align-items:flex-start;margin:12px 0;padding:14px 16px;background:rgba(255,255,255,.7);border-radius:10px;border:1px solid rgba(0,0,0,.05);}
.bridge-item .bi-dot{width:8px;height:8px;border-radius:50%;margin-top:7px;flex-shrink:0;}
.bridge-item .bi-body{font-size:14px;color:var(--text2);line-height:1.65;}

/* Libération */
.libc-list{display:flex;flex-direction:column;gap:12px;margin:18px 0 0;}
.libc-item{display:flex;gap:14px;align-items:flex-start;padding:14px 16px;background:var(--lib-bg);border:1px solid var(--lib-c);border-radius:10px;}
.libc-ic{flex-shrink:0;font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--lib-c);line-height:1.2;}
.libc-t{font-size:14.5px;color:var(--text);line-height:1.7;}

/* Rituel & écriture */
.rituel-block{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.3);border-radius:12px;padding:24px 26px;margin-bottom:32px;}
.rituel-block h3{font-size:20px;color:var(--gold-ink);margin-bottom:10px;}
.rituel-block p{font-size:14px;color:var(--text2);line-height:1.8;}
.writing-prompt{background:rgba(201,168,76,0.08);border:1px dashed var(--gold);border-radius:12px;padding:24px;margin:24px 0;text-align:center;}
.writing-prompt textarea{width:100%;border:1px solid var(--line);border-radius:6px;padding:14px;font-family:'Cormorant Garamond',serif;font-size:16px;resize:vertical;background:white;}

/* Parcours V.A.L.E.U.R */
.vmap{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px 0 8px;}
.vmap-cell{background:rgba(255,255,255,.7);border:1px solid rgba(201,168,76,.22);border-radius:10px;padding:16px;}
.vmap-cell.live{border-color:var(--gold);background:rgba(201,168,76,.08);}
.vmap-letter{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:400;line-height:1;color:var(--gold);}
.vmap-word{font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--text);margin:6px 0 5px;}
.vmap-desc{font-size:12px;line-height:1.55;color:var(--text2);}
.vmap-flag{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-ink);margin-top:6px;}

.btn-print{display:inline-block;background:var(--gold);color:#fff;padding:12px 28px;border-radius:40px;font-size:14px;font-weight:500;text-decoration:none;cursor:pointer;border:none;margin-top:16px;}
.btn-print:hover{opacity:.9;}
.footer-valeur{text-align:center;margin-top:60px;border-top:1px solid var(--line);padding-top:28px;}
.footer-valeur .fv-name{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;color:var(--text3);letter-spacing:.06em;margin-bottom:5px;}
.footer-valeur .fv-method{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:rgba(201,168,76,.6);margin-bottom:5px;}
.footer-valeur .fv-book{font-family:'Cormorant Garamond',serif;font-size:12px;font-style:italic;color:var(--text3);opacity:.7;}
.footer-legal{text-align:center;font-size:10px;color:var(--text3);opacity:.6;margin-top:12px;line-height:1.5;}

a{color:var(--gold-ink);text-decoration:none;border-bottom:1px solid transparent;transition:border .2s;}
a:hover{border-bottom-color:var(--gold);}

/* Boussole permanente */
.spa-boussole{position:fixed;bottom:20px;right:20px;z-index:100;background:var(--card-bg);border:2px solid var(--gold);border-radius:50%;width:64px;height:64px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.1);cursor:pointer;}
.spa-boussole .sb-inner{text-align:center;line-height:1.1;}
.spa-boussole .sb-pct{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--gold-ink);}
.spa-boussole .sb-label{font-size:7px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);}

/* Pattern */
.pattern-block{background:#FFFDF7;border:1px solid rgba(201,168,76,.25);border-radius:8px;padding:24px;margin:0;}
.item-extreme{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px;}
.item-extreme .dot{width:8px;height:8px;border-radius:50%;margin-top:8px;flex-shrink:0;}
.item-extreme .text{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--text);line-height:1.5;}
.item-extreme .ins{font-size:12px;color:var(--text3);margin-top:3px;line-height:1.5;}

/* Pastilles peurs */
.fears-line{display:flex;flex-wrap:wrap;gap:16px;margin:22px 0;}
.fear-chip{font-size:13px;padding:7px 16px;border-radius:40px;border:1px solid;background:#fff;font-weight:500;}
.reveal{text-align:center;margin:6px 0 0;}
.reveal-pre{font-size:11px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
.reveal-name{font-family:'Cormorant Garamond',serif;font-size:clamp(34px,6vw,52px);font-weight:300;line-height:1.05;}
.reveal-peur{font-size:14px;color:var(--text2);margin-top:8px;}

@media(max-width:600px){
 .appui-grid,.ba-concept{grid-template-columns:1fr;}
 .cid-k{flex-basis:110px;}
 .container{padding:40px 16px 60px;}
 .block,.carte-block,.manifeste{padding:24px 18px;}
 .vmap{grid-template-columns:repeat(2,1fr);}
 .jauge-ligne{flex-wrap:wrap;}
 .jauge-nom{width:100%;text-align:left;}
}
@media print{
 @page{size:A4;margin:18mm 18mm 20mm 18mm;}
 @page :first{margin-top:15mm;}
 *{ -webkit-print-color-adjust:exact!important; print-color-adjust:exact!important; }
 body{ background:#fff!important; color:#1A1714!important; font-size:11pt; line-height:1.6; }
 .container{ max-width:100%; padding:0; }
 .btn-print,.no-print,.footer-valeur,.spa-boussole{ display:none!important; }

 .block,.carte-block,.cover-page,.manifeste{
   background:#fff!important; box-shadow:none!important;
   border:1px solid #DDD!important; margin-bottom:16pt; padding:18pt 20pt;
   break-inside:auto;
 }
 .block.accent{ border-left:4px solid; }

 .cid-grid, .double-def, .pattern-block, .appui-card, .libc-item,
 .mirror-phrase, .voice-phrase, .trap, .reality-check, .rituel-block,
 .vmap-cell, .ba-you, .ba-card, .spa-hero, .writing-prompt{
   break-inside:avoid;
   page-break-inside:avoid;
 }
 h2, h3, h4{ page-break-after:avoid; }
 .movement-tag{ page-break-after:avoid; }

 h2{ font-size:15pt; margin-bottom:8pt; }
 h3{ font-size:13pt; }
 .lead, .mf-lead{ font-size:12pt; }
 .mirror-phrase{ font-size:14pt; padding-left:12pt; }
 .item-text{ font-size:11pt; }

 .jauge-ligne{ gap:8px; }
 .jauge-nom{ width:110px; font-size:10pt; }
 .jauge-normalisee{ height:16px; }
 .jauge-pct{ width:36px; font-size:10pt; }
 .carte-legend{ font-size:10pt; }

 .toile-wrapper canvas{ max-width:220px; max-height:220px; }

 .appui-grid{ grid-template-columns:1fr 1fr; gap:10px; }
 .appui-card{ padding:12px 14px; }

 .block p, .carte-block p, .manifeste p{ margin-bottom:6pt; }
 .chroma-bar{ margin-bottom:24pt; }
 .cover-page{ padding:28pt 30pt 24pt; }
 .cover-prenom{ font-size:36pt; }
 .cover-tagline{ font-size:14pt; }
 .footer-legal{ font-size:8pt; }
}
</style>
</head>
<body>
<div class="container" id="app">
<div class="chroma-bar"></div>
<div id="portrait-content"><p style="text-align:center;padding:60px 20px;color:var(--text3);">Lecture de votre traversée…</p></div>
</div>
<div id="spa-boussole" class="spa-boussole no-print" title="Votre boussole — Présence à vous-même"></div>
<div class="footer-valeur no-print">
<div class="fv-name">Céline Bourbon · Psychologue & auteure</div>
<div class="fv-method">Méthode V.A.L.E.U.R© · Tous droits réservés · © 2026</div>
<div class="fv-book"><em>De la peur à la joie d'être soi</em> · Éditions L'Harmattan</div>
</div>
<script>
// ══════════════ V.A.L.E.U.R© — DONNÉES COMPLÈTES ══════════════
const MASKS=['rouge','orange','jaune','vert','bleu','indigo','violet'];
const MASK_COLORS={rouge:'#B5312A',orange:'#C4581F',jaune:'#B8930A',vert:'#2D7A4F',bleu:'#1D5F8A',indigo:'#5C3280',violet:'#7A3594'};
const MASK_PASTELS={rouge:'rgba(181,49,42,.10)',orange:'rgba(196,88,31,.10)',jaune:'rgba(184,147,10,.10)',vert:'rgba(45,122,79,.10)',bleu:'rgba(29,95,138,.10)',indigo:'rgba(92,50,128,.10)',violet:'rgba(122,53,148,.10)'};
const MASK_LABELS={rouge:'Rouge',orange:'Orange',jaune:'Jaune',vert:'Vert',bleu:'Bleu',indigo:'Indigo',violet:'Violet'};

const MASK_THRESHOLDS={rouge:50,orange:60,jaune:60,vert:60,bleu:55,indigo:60,violet:55};
const TIEBREAK=['jaune','rouge','indigo','vert','bleu','orange','violet'];

const PEUR_NOM={rouge:"Peur de la maladie",orange:"Peur de ressentir",jaune:"Peur de l'inconnu",vert:"Peur du rejet",bleu:"Peur de l'impuissance",indigo:"Peur du jugement",violet:"Peur d'être soi"};
const PEUR_NOM_COURT={rouge:"Maladie",orange:"Ressentir",jaune:"Inconnu",vert:"Rejet",bleu:"Impuissance",indigo:"Jugement",violet:"Être soi"};

const ELAN_SPONTANE={
 rouge:"une présence pleinement incarnée et paisible",
 orange:"une énergie créatrice et une intelligence émotionnelle fluide",
 jaune:"une confiance tranquille et une action juste, sans besoin de garanties",
 vert:"un amour authentique et libre, qui ne se sacrifie plus pour exister",
 bleu:"une autorité naturelle et une parole inspirée, qui élève sans contrôler",
 indigo:"une vision claire et une intuition affûtée, libre du jugement",
 violet:"une paix profonde et une connexion joyeuse à votre singularité"
};

const MIRROR={
 rouge:"Avant même de poser le pied hors du lit, vous écoutez votre corps. Une tension dans la poitrine, un battement un peu plus rapide — et sous l'emprise du masque, vous partez en quête d'une explication. Non par hypochondrie, mais parce que votre système nerveux a appris qu'ignorer un signal pouvait être dangereux.",
 orange:"Quand on vous demande comment vous allez vraiment, vous répondez « ça va » sans y penser. Sous l'emprise du masque, nommer ce qui se passe à l'intérieur, ce serait ouvrir une porte que vous avez appris à garder fermée. Ressentir a eu un prix — alors les émotions sont mises à distance.",
 jaune:"Sous l'emprise du masque, vous avez déjà trois plans pour une situation qui n'est pas encore arrivée. Vous vérifiez les horaires, les issues, les alternatives. Pas par plaisir — par nécessité intérieure. Votre esprit ne supporte pas le vide laissé par l'incertitude, alors il le remplit de prévisions.",
 vert:"Sous l'emprise du masque, vous sentez le moindre changement de ton chez l'autre. Vous adaptez votre réponse, votre posture, parfois votre opinion — pour maintenir l'harmonie. Non par faiblesse, mais parce que votre cerveau a enregistré que perdre le lien était une menace bien plus grande que de perdre un argument.",
 bleu:"Sous l'emprise du masque, déléguer vous demande plus d'énergie que de faire vous-même. Vous repassez derrière, vérifiez, corrigez. Pas par arrogance — par impossibilité de lâcher prise sans angoisse. Vous avez appris que tenir les rênes était la seule façon de ne pas vous effondrer.",
 indigo:"Sous l'emprise du masque, vous relisez un message déjà envoyé. Vous retravaillez un dossier déjà validé. Vous cherchez la faille — parce que si quelqu'un la trouve avant vous, cela confirmera ce que vous craignez en secret : que vous n'êtes pas vraiment à la hauteur.",
 violet:"Sous l'emprise du masque, vous passez d'un rôle à l'autre avec une fluidité déconcertante — au travail, en famille, entre amis. Mais dans le silence, une question revient : qui êtes-vous quand personne ne regarde ? Vous avez si bien appris à vous adapter que vous ne savez plus tout à fait où se trouve votre centre."
};

const VOICE={

function readScores(){
 const p=new URLSearchParams(location.search);
 let scores=null; const urlS={};
 MASKS.forEach(m=>{ if(p.has(m)) urlS[m]=Math.min(100,Math.max(0,parseInt(p.get(m))||0)); });
 if(p.has('spa')) urlS.spa=Math.min(100,Math.max(0,parseInt(p.get('spa'))||0));
 if(Object.keys(urlS).filter(k=>MASKS.includes(k)).length>=7) scores=urlS;
 if(!scores){ try{ const ls=JSON.parse(localStorage.getItem('valeur_scores')||'{}'); if(ls&&ls.rouge!==undefined) scores=ls; }catch(e){} }
 if(!scores||Object.keys(scores).filter(k=>MASKS.includes(k)).length<7){
  scores={rouge:44,orange:38,jaune:63,vert:56,bleu:59,indigo:69,violet:32,spa:61};
 }
 scores.prenom=p.get('prenom')||localStorage.getItem('valeur_prenom')||'';
 scores.email=p.get('email')||localStorage.getItem('valeur_email')||'';
 scores.pid=p.get('pid')||'';
 scores.items=p.get('items')||(function(){ try{ return localStorage.getItem('valeur_items')||''; }catch(e){ return ''; } })();
 return scores;
}

function decodeItems(str){
 if(!str||str.length<ITEM_BANK.length) return null;
 const out={};
 for(let i=0;i<ITEM_BANK.length;i++){ const d=str.charCodeAt(i)-48; out[ITEM_BANK[i].id]=(d>=0&&d<=4)?d:null; }
 return out;
}

function getExtremeItems(mask,responses,limit){
 limit=limit||3;
 if(!responses) return [];
 const items=ITEM_BANK.filter(it=>it.mask===mask);
 const scored=items.map(it=>{
  const raw=responses[it.id];
  if(raw===null||raw===undefined) return null;
  const extreme=(!it.inv&&raw>=4)||(it.inv&&raw===0);
  if(!extreme) return null;
  return {item:it,raw,signature:ITEM_INSIGHT[it.id]?0:1};
 }).filter(Boolean);
 scored.sort((a,b)=> a.signature-b.signature || (b.raw-a.raw));
 return scored.slice(0,limit);
}

function detectProfile(scores){
 const active=MASKS.filter(m=>(scores[m]||0)>=MASK_THRESHOLDS[m]);
 if(active.length===0) return {type:'adaptatif'};

 const sorted=MASKS.slice().sort((a,b)=>{
  const p=(scores[b]||0)-(scores[a]||0);
  return p!==0?p:TIEBREAK.indexOf(a)-TIEBREAK.indexOf(b);
 });
 const dom=sorted[0];
 const blocker=(scores['orange']||0)>=MASK_THRESHOLDS['orange'] && dom!=='orange';
 const amplifier=(scores['jaune']||0)>=MASK_THRESHOLDS['jaune'] && dom!=='jaune';
 const config=blocker&&amplifier?'triade':blocker?'dyade_paradoxale':amplifier?'dyade_amplification':'mono';
 return {type:'protectif',dom,blocker,amplifier,config};
}

function getSpaInterpretation(spa){
 if(spa>=70) return "Votre présence à vous-même est solide. Les masques agissent mais ne vous définissent pas. Vous disposez d'un ancrage intérieur sur lequel vous appuyer.";

 return "Votre attention est souvent captée par les protections. Le chemin V.A.L.E.U.R peut vous aider à retrouver du territoire intérieur, pas à pas.";
}

function dessinerToile(scores){
 const canvas=document.getElementById('toile-canvas'); if(!canvas) return;
 const ctx=canvas.getContext('2d'); const cw=canvas.width,ch=canvas.height;
 const cx=cw/2,cy=ch/2,rMax=120,n=MASKS.length,aStep=(2*Math.PI)/n,a0=-Math.PI/2;
 ctx.clearRect(0,0,cw,ch);
 for(let g=1;g<=4;g++){ const gr=(rMax/4)*g; ctx.beginPath();
  for(let i=0;i<n;i++){ const a=a0+i*aStep,x=cx+gr*Math.cos(a),y=cy+gr*Math.sin(a); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
  ctx.closePath(); ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=1; ctx.stroke(); }
 for(let i=0;i<n;i++){ const a=a0+i*aStep; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+rMax*Math.cos(a),cy+rMax*Math.sin(a)); ctx.strokeStyle='rgba(0,0,0,0.1)'; ctx.lineWidth=1; ctx.stroke(); }
 ctx.beginPath();
 for(let i=0;i<n;i++){ const m=MASKS[i],pct=(scores[m]||0)/100,r=pct*rMax,a=a0+i*aStep,x=cx+r*Math.cos(a),y=cy+r*Math.sin(a); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
 ctx.closePath(); ctx.fillStyle='rgba(201,168,76,0.12)'; ctx.fill(); ctx.strokeStyle='rgba(201,168,76,0.5)'; ctx.lineWidth=2; ctx.stroke();
 for(let i=0;i<n;i++){ const m=MASKS[i],pct=(scores[m]||0)/100,r=pct*rMax,a=a0+i*aStep; ctx.beginPath(); ctx.arc(cx+r*Math.cos(a),cy+r*Math.sin(a),5,0,2*Math.PI); ctx.fillStyle=MASK_COLORS[m]; ctx.fill(); }
 ctx.fillStyle='#3A3532'; ctx.font='11px "DM Sans",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
 for(let i=0;i<n;i++){ const m=MASKS[i],a=a0+i*aStep; ctx.fillText(PEUR_NOM_COURT[m],cx+(rMax+22)*Math.cos(a),cy+(rMax+22)*Math.sin(a)); }
}

  <h2 style="color:${c};">Votre masque dominant : ${MASK_LABELS[dom]}</h2>
  <div class="double-def">
   <h3>Un mécanisme de défense</h3>
   <p>Imaginez une part de vous qui s'est construite il y a longtemps, à une époque où vous aviez besoin d'elle. Elle a pris les commandes d'un domaine précis de votre vie — et elle ne les a jamais rendues. Ce mécanisme vous protège avec une vigilance sans faille. Mais cette protection a un coût : elle retient un élan spontané de votre vraie nature, ${ELAN_SPONTANE[dom]}.</p>
   <div class="dd-brace"><div class="dd-avatar" style="background:${c}20;color:${c};">🎭</div><div class="dd-label"><strong>Ce n'est pas vous.</strong> C'est un automatisme que vous avez appris pour ne pas souffrir. Le reconnaître, c'est déjà reprendre contact avec ce qui, en vous, n'a jamais eu besoin de cette protection.</div></div>
  </div>
  <div class="mirror-phrase" style="border-left-color:${c};">${MIRROR[dom]}</div>
  <div class="cid-grid">
   <div class="cid-row"><div class="cid-k">Sa peur</div><div class="cid-v">${PEUR_NOM[dom]} — ${VOICE[dom].toLowerCase()}</div></div>
   <div class="cid-row"><div class="cid-k">Comment il agit</div><div class="cid-v">${AGIT[dom]}</div></div>
   <div class="cid-row"><div class="cid-k">Quand il s'active</div><div class="cid-v">${SCENE[dom]}</div></div>
   <div class="cid-row"><div class="cid-k">Dans le corps</div><div class="cid-v">Souvent ${CORPORELLES[dom]}</div></div>
   <div class="cid-row"><div class="cid-k">Ce qu'il protège</div><div class="cid-v">Derrière cet automatisme se tient ${TALENT[dom]}. Le masque n'a jamais été un défaut : c'est ce talent, mis sous garde.</div></div>
  </div>
 </div>`;

 if(profile.blocker){
  const co=MASK_COLORS['orange'];
  const inter=BLOCKER_INTERACTION[dom]||`Votre masque dominant (${MASK_LABELS[dom]}) est verrouillé par le Masque Orange, qui coupe l'accès à vos émotions.`;
  html+=`<div class="block" style="border-left:4px solid ${co};">
   <div class="movement-tag" style="color:${co};">Votre bloqueur</div>
   <h2 style="color:${co};">Masque Orange — La fermeture émotionnelle (${scores['orange']||0}%)</h2>
   <p class="lead">Le Masque Orange est un bloqueur de premier ordre : il coupe l'accès à vos émotions, rendant tout travail sur les autres peurs plus difficile. Voici comment il interagit avec votre masque dominant :</p>
   <div class="ba-you">${inter}</div>
  </div>`;
 }

 if(profile.amplifier){
  const cj=MASK_COLORS['jaune'];
  const inter=AMPLIFIER_INTERACTION[dom]||`Votre masque dominant (${MASK_LABELS[dom]}) est amplifié par le Masque Jaune, qui monte le volume de toutes les autres peurs.`;
  html+=`<div class="block" style="border-left:4px solid ${cj};">
   <div class="movement-tag" style="color:${cj};">Votre amplificateur</div>
   <h2 style="color:${cj};">Masque Jaune — L'intolérance à l'incertitude (${scores['jaune']||0}%)</h2>
   <p class="lead">Le Masque Jaune ne crée pas de nouvelle peur : il augmente l'intensité de toutes les autres. Voici comment il amplifie votre masque dominant :</p>
   <div class="ba-you">${inter}</div>
  </div>`;
 }

 // MOUVEMENT III
 html+=`<div class="block" style="border-left:4px solid ${c};">
  <div class="movement-tag"><span class="num">III</span> · La preuve, dans vos propres mots</div>
  <h2 style="color:${c};">Vous l'avez écrit vous-même</h2>`;
 if(extremes.length){
  html+=`<p class="lead">Tout ce qui précède n'est pas une description générale plaquée sur vous. Voici, parmi vos réponses, celles où vous vous êtes reconnu·e le plus nettement — la signature de votre masque, de votre propre main :</p><div class="pattern-block" style="margin-top:16px;">`;
  extremes.forEach(e=>{ const ins=ITEM_INSIGHT[e.item.id]||''; html+=`<div class="item-extreme"><span class="dot" style="background:${c};"></span><div><div class="text">« ${e.item.text} »</div>${ins?`<div class="ins">↳ ${ins}</div>`:''}</div></div>`; });
  html+=`</div>`;
 }else{
  html+=`<p class="lead">Vos réponses dessinent, trait après trait, exactement ce schéma — au point qu'il finit par ressembler à une évidence sur vous-même.</p>`;
 }
 html+=`</div>`;

 if(extremes.length){
  html+=`<div class="trap"><div class="tq">« Voilà. C'est moi. C'est plus fort que moi — je ne changerai jamais. »</div><div class="tt">C'est souvent la pensée qui s'impose à cet instant. Et elle est compréhensible : ce que vous venez de lire est si juste qu'il prend des airs de fatalité. <strong>Mais c'est précisément ici que le portrait bascule.</strong></div></div>`;
  html+=`<div class="reality-check"><div class="rc-tag">Vérifiez par vous-même — maintenant</div><div class="rc-title">${MICRO_ACTIONS[dom]}</div>`;
  const action=SCIENTIFIC_ACTIONS[dom];
  if(action){
   html+=`<div style="margin-top:14px;">${action.steps.map(s=>`<div class="rc-step">${s}</div>`).join('')}</div><div class="rc-note">📚 ${action.ref}</div>`;
  }
  html+=`</div>`;
 }

 // MOUVEMENT IV — ESPACES LIBRES (ressources avec % d'espace libre)
 const lows = MASKS.filter(m => m !== dom && (scores[m] || 0) < MASK_THRESHOLDS[m])
   .sort((a, b) => (scores[a] || 0) - (scores[b] || 0))
   .slice(0, 4);

 html += `<div class="block" style="border:1px solid rgba(45,122,79,.22);background:rgba(45,122,79,.04);">
  <div class="movement-tag" style="color:var(--vert);"><span class="num">IV</span> · Vos espaces libres</div>
  <h2>Vos forces déjà là</h2>
  <p class="lead">Ces domaines ne sont pas des « scores bas ». Ce sont vos <strong>ressources conscientes</strong> — des parties de vous où l’élan circule librement, sans être arrêté par une peur. Elles sont votre point d’appui naturel pour la traversée.</p>`;

 if (lows.length) {
   html += `<div class="appui-grid">`;
   lows.forEach(m => {
     const freeSpace = 100 - (scores[m] || 0);
     const strength = freeSpace >= 70 ? "strong" : "moderate";
     const label = RESOURCE_LABELS[m];
     const text = strength === "strong" ? RESOURCE_STRONG[m] : RESOURCE_MODERATE[m];
     const chipColor = strength === "strong" ? "var(--vert)" : "var(--gold)";
     const chipBg = strength === "strong" ? "rgba(45,122,79,.12)" : "rgba(201,168,76,.12)";
     html += `<div class="appui-card">
       <div class="appui-h">
         <span class="d" style="background:${MASK_COLORS[m]};"></span>
         <span style="font-weight:600;color:var(--text);">${label}</span>
         <span style="font-size:11px;color:var(--text3);margin-left:auto;">espace libre : ${freeSpace}%</span>
       </div>
       <p>${text}</p>
       <div style="margin-top:6px;">
         <span style="display:inline-block;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:20px;background:${chipBg};color:${chipColor};">
           ${strength === "strong" ? "Force bien installée" : "Ressource émergente"}
         </span>
       </div>
     </div>`;
   });
   html += `</div>`;
 } else {
   html += `<p class="lead">Tous vos masques sont actifs — mais rappelez‑vous que votre Score de Présence Authentique reste votre boussole. Même dans la tempête, une partie de vous observe, respire et sait.</p>`;
 }
 html += `</div>`;

 // CARTE COMPLÈTE
 html += `<div class="carte-block" style="background:transparent;padding:24px 0 0;margin:0;">
   <p class="lead" style="margin-bottom:6px;">Votre paysage complet, d'un seul regard — chaque masque lu par rapport à <em>son propre seuil</em> (le trait vertical) :</p>
   <div class="toile-wrapper"><canvas id="toile-canvas" width="340" height="340"></canvas></div>
   <div class="jauge-liste" id="jauge-liste"></div>
   <div class="carte-legend"><strong>Comment lire ces jauges.</strong> Le trait vertical indique votre score. La zone grise va de 0 au seuil au-delà duquel la protection devient active. La zone colorée montre l'espace où la protection peut s'intensifier.</div>
  </div>`;

 // MOUVEMENT V — LIBÉRATION
 const sm=STEPMAP[dom];
 html+=`<div class="block" style="--lib-c:${c}40;--lib-bg:${c}0A;border-left:4px solid ${c};">
  <div class="movement-tag"><span class="num">V</span> · Ce que la libération rend possible</div>
  <h2 style="color:${c};">Quand l'élan se libère</h2>
  <p class="lead">La méthode V.A.L.E.U.R© ne cherche pas à effacer la peur : elle libère ${ELAN_SPONTANE[dom]} que votre masque retenait. Concrètement, pour vous, cela ressemble à ceci :</p>
  <div class="libc-list">${LIB_CONCRETE[dom].map(x=>`<div class="libc-item"><div class="libc-ic">→</div><div class="libc-t">${x}</div></div>`).join('')}</div>
  <div class="hope-quote" style="border-left-color:${c};margin-top:22px;font-family:'Cormorant Garamond',serif;font-size:21px;font-style:italic;line-height:1.55;color:var(--text);padding-left:18px;">${LIBERATION[dom]}</div>
  <p class="lead">Le chemin se fait en six temps — <em>Voir, Accueillir, Localiser, Explorer, Unifier, Renforcer</em>. Pour vous, le desserrement commence souvent par l'étape <strong style="color:${c};">${sm.mot}</strong> : ${sm.note}</p>
  <div class="vmap">${VALEUR_STEPS.map(s=>`<div class="vmap-cell${s.l===sm.k?' live':''}"><div class="vmap-letter">${s.l}</div><div class="vmap-word">${s.mot}</div><div class="vmap-desc">${s.d}</div>${s.l===sm.k?`<div class="vmap-flag">Votre point d'entrée</div>`:''}</div>`).join('')}</div>
 </div>`;

 html+=`<div class="rituel-block">
  <h3>Un geste pour créer la distance</h3>
  <p>Certaines personnes trouvent utile de <strong>donner un nom</strong> à ce masque — « mon détecteur de fumée », « mon pilote automatique », « ma sentinelle ». Cela aide à le reconnaître au moment où il s'active : « tiens, c'est lui qui parle, là ».</p>
  <p>Le nommer, c'est déjà ne plus être lui. C'est passer de « je suis anxieux·se » à « mon système de protection s'est déclenché ». Cette petite distance est le premier espace de liberté — et le point de départ de tout le travail V.A.L.E.U.R©.</p>
  <p style="margin-top:12px;font-style:italic;">Une précision qui change tout : ces sept couleurs ne sont pas des <em>types de personnalité</em>. Ce sont des <strong>états que l'on traverse</strong> — ils montent, prennent de la place, puis redescendent. Vous n'êtes pas « un Rouge » ou « un Bleu » : il vous arrive d'activer une protection Rouge ou Bleue. La nuance n'est pas cosmétique — c'est elle qui rend le changement possible.</p>
 </div>`;

 html+=`<div class="block" style="background:linear-gradient(135deg,#FCFAF7,#F3F1EC);border:1px solid rgba(201,168,76,.25);text-align:center;">
  <p style="font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;line-height:1.6;color:var(--text);margin:0;">Ce portrait est une photographie. La méthode V.A.L.E.U.R© est le chemin pour transformer ces protections en ressources conscientes.<br><br>
  La traversée commence ici — avec cette boussole que vous tenez entre vos mains.</p>
 </div>`;

 html+=`<div class="writing-prompt no-print">
  <p style="font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--text);margin-bottom:6px;">Avant de refermer ce rapport, une phrase pour vous</p>
  <p style="color:var(--text2);font-size:14px;margin-bottom:14px;">Écrivez en quelques mots ce que vous avez reconnu de vous-même aujourd'hui.</p>
  <textarea rows="3" placeholder="Écrivez ici..."></textarea>
 </div>`;

 html+=closing();
 return html;
}

function buildAdaptatifContent(scores,spa){
 const g='#2D7A4F';
 return `<div class="block accent" style="border-left-color:${g};">
  <div class="movement-tag" style="color:${g};">Sept protections, sept manières de répondre à la vie</div>
  <div class="fears-line">${MASKS.map(m=>`<span class="fear-chip" style="color:${MASK_COLORS[m]};border-color:${MASK_COLORS[m]}55;">${PEUR_NOM[m]}</span>`).join('')}</div>
  <h2 style="color:${g};margin-top:14px;">Chez vous : un équilibre rare</h2>
  <p class="lead">Aucune de ces peurs n'a pris durablement les commandes. Elles s'activent puis se retirent, sans se figer en réflexe. Vos masques restent souples — et c'est une force.</p>
  <p class="lead">La méthode V.A.L.E.U.R© est pensée pour les peurs envahissantes ; là où les protections restent souples, elle n'est pas forcément l'outil le plus utile. Ce portrait vaut alors comme un repère, à revisiter si une période plus exigeante venait à raidir l'une de ces protections.</p>
 </div>
 <div class="carte-block"><div class="movement-tag" style="color:var(--gold-ink);">D'un seul regard</div><h2>Votre paysage</h2><div class="toile-wrapper"><canvas id="toile-canvas" width="340" height="340"></canvas></div><div class="jauge-liste" id="jauge-liste"></div><div class="carte-legend"><strong>Comment lire ces jauges.</strong> Chaque jauge indique votre score par rapport au seuil d'activation de la protection. Sous le seuil, l'élan circule librement.</div></div>
 <div class="block" style="border:1px solid rgba(45,122,79,.22);background:rgba(45,122,79,.04);"><div class="movement-tag" style="color:${g};">Votre boussole</div><h2>Espace de liberté — ${spa}%</h2><p class="lead">La part de vos réactions qui vient de vous, et non d'une peur. Chez vous, cet espace est déjà large.</p></div>`;
}

function closing(){
 return `<div class="footer-legal">Les seuils d'activation sont fondés sur la littérature des instruments de référence (SHAI, TAS-20, IUS-12, ECR-R, FMPS, etc.) ; leur validation directe sur l'échantillon V.A.L.E.U.R© est en cours.</div><p style="text-align:center;margin-top:24px;" class="no-print"><button class="btn-print" onclick="window.print()">Enregistrer en PDF</button></p>`;
}
</script>
</body>
</html>
