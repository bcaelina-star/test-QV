<script>

// ══ V.A.L.E.U.R© · Portrait public · questionnaire.psyh.fr ══════════════
// Lecture URL params : rouge=XX&orange=XX...&spa=XX&prenom=XX&email=XX
// Tous les calculs sont dynamiques — aucun masque secondaire ni combinaison hardcodé

const VALEUR_API = 'https://valeur-backend-api.vercel.app/api';

// ── Métadonnées masques ────────────────────────────────────────────────────
const MASK_META = {
  rouge:  {name:'Masque Rouge',  emoji:'🔴', peur:'la peur de la maladie et de la mort',     color:'#B5312A'},
  orange: {name:'Masque Orange', emoji:'🟠', peur:'la peur de ressentir',                     color:'#C4581F'},
  jaune:  {name:'Masque Jaune',  emoji:'🟡', peur:"la peur de l'incertitude",                 color:'#B8930A'},
  vert:   {name:'Masque Vert',   emoji:'🟢', peur:"la peur de l'abandon",                     color:'#2D7A4F'},
  bleu:   {name:'Masque Bleu',   emoji:'🔵', peur:"la peur de perdre le contrôle",            color:'#1D5F8A'},
  indigo: {name:'Masque Indigo', emoji:'🟣', peur:"la peur de l'échec et du jugement",        color:'#5C3280'},
  violet: {name:'Masque Violet', emoji:'🟪', peur:"la peur de ne pas exister, d'être rien",  color:'#7A3594'}
};

// ── PLAYLIST — thoughts & bridge par masque ────────────────────────────────
const PLAYLIST={
  rouge:{peur:"la maladie et la mort",bridge:"Ce que vos réponses dessinent : une <strong>attention quasi permanente aux signaux de votre corps</strong>. Votre système nerveux a appris, à un moment de votre histoire, que surveiller était le seul moyen d\'être en sécurité. Cette vigilance s\'est automatisée — elle s\'active désormais même dans des situations où il n\'y a rien à craindre.",thoughts:["Et si ce symptôme cachait quelque chose de grave ?","Je dois vérifier — si ça se trouve, c\'est sérieux.","Et si je faisais un malaise sans signe avant-coureur ?","Le médecin a dit que ça allait, mais peut-être qu\'il a raté quelque chose…"]},
  orange:{peur:"la souffrance émotionnelle",bridge:"Ce que vos réponses dessinent : un <strong>accès difficile à ce que vous ressentez</strong>. Votre système nerveux a appris qu\'éloigner les émotions était le seul moyen de rester fonctionnel·le. C\'est une protection réelle — mais elle a un coût : elle coupe aussi de la joie, de l\'intimité, du sentiment d\'être pleinement là.",thoughts:["Ce n\'est pas si important. Autant ne pas y penser.","Je ne sais pas vraiment ce que je ressens.","Mieux vaut rester occupé — quand je m\'arrête, c\'est inconfortable.","Les émotions, ça ne mène à rien de concret."]},
  jaune:{peur:"l\'inconnu et l\'incertitude",bridge:"Ce que vos réponses dessinent : un <strong>besoin intense de prévoir et de contrôler l\'avenir</strong>. Votre système nerveux a appris qu\'anticiper était le seul moyen d\'éviter d\'être pris au dépourvu. Votre cerveau planifie, vérifie, recalcule — mais la certitude absolue qu\'il cherche n\'existe pas. D\'où l\'épuisement.",thoughts:["Et si ça se passait mal ? Il faut que j\'anticipe.","Et si je me trompais dans ma décision ?","Je ne peux pas décider tant que je ne suis pas sûr(e).","Si l\'imprévu arrive, tout peut partir en vrille."]},
  vert:{peur:"le rejet et l\'abandon",bridge:"Ce que vos réponses dessinent : une <strong>sensibilité extrême aux signaux relationnels</strong>. Votre système nerveux a appris à surveiller en permanence les humeurs, les silences, les tonalités des autres — pour éviter la rupture. Ce radar fonctionne même avec des personnes bienveillantes, même quand rien ne menace le lien.",thoughts:["Qu\'est-ce qu\'ils pensent de moi ?","J\'ai sûrement dit quelque chose qui a mal passé.","Et s\'ils finissaient par se lasser de moi ?","Mieux vaut m\'adapter — si je prends trop de place, ils vont partir."]},
  bleu:{peur:"l\'impuissance et la perte de maîtrise",bridge:"Ce que vos réponses dessinent : un <strong>besoin de maîtriser les situations et les personnes</strong> autour de vous. Votre système nerveux a appris que lâcher prise exposait à l\'échec ou à l\'effondrement. Ce réflexe de contrôle s\'active même là où vous pourriez, en réalité, vous permettre de vous reposer.",thoughts:["Si je ne contrôle pas ça, ça va partir en vrille.","Les autres ne font jamais comme il faut.","Je dois vérifier, reprendre, corriger — sinon ça rate.","Je ne peux pas me permettre de ne pas être indispensable."]},
  indigo:{peur:"l\'échec et le sentiment d\'imposture",bridge:"Ce que vos réponses dessinent : une <strong>voix intérieure particulièrement sévère</strong> qui évalue, remet en question, anticipe le jugement des autres. Votre système nerveux a appris que cette exigence envers vous-même vous protégerait de l\'échec et du regard critique. Elle vous pousse — mais elle vous épuise davantage qu\'elle ne vous protège.",thoughts:["Ce n\'est pas assez bien. Je dois retravailler ça.","On va finir par voir que je ne mérite pas ma place.","C\'était la chance — pas ma compétence réelle.","Je ne peux pas commencer tant que je ne suis pas prêt(e)."]},
  violet:{
    peur:"d’être jugé·e ou attaqué·e sur qui l’on est — et de ne pas être aimé·e pour ce qu’on est vraiment",
    descriptor:"Sensibilité et lucidité profondes",
    bridge:"Ce que vos réponses dessinent : une <strong>hypersensibilité et hyperadaptabilité profondes</strong> — un profil caméléon. Vous avez appris très tôt qu’être vraiment soi comportait un risque — celui d’être rejeté, incompris, jugé. Alors vous avez construit une version de vous-même qui serait acceptée. Brillante dans ses adaptations. Et profondément seule, car jamais vraiment vue.",
    origine:"Quelque part dans votre histoire, il a été plus sûr de s’adapter que d’exister. Ce que votre système nerveux a retenu : <em>pour être aimé·e, il faut d’abord être acceptable.</em> Et ‘acceptable’ ne voulait pas dire vous-même.",
    prison:"Le Masque Violet est le plus silencieux. Il agit en effacement progressif. Il vous a appris à vous étudier depuis l’extérieur. La question <em>‘qui suis-je’</em> est devenue anxiogène car vous ne savez plus faire la différence entre ce que vous êtes et ce que vous avez construit pour survivre.",

    force:"Votre force est une <strong>sensibilité et une lucidité exceptionnelles</strong>. Vous percevez ce que la plupart ne voient pas. Le problème n’est pas votre lucidité — c’est la <em>direction</em> dans laquelle elle s’est orientée : vers l’extérieur, vers le regard de l’autre. Quand cette même énergie se tourne vers l’intérieur, quelque chose de fondamental change.",
    liberation:"Il y a quelqu’un en vous qui n’a jamais eu besoin d’être différent·e pour avoir de la valeur. Le chemin n’est pas de détruire ce que vous avez construit — c’est de comprendre que vous n’en avez plus besoin pour la même raison.",
    thoughts:["Est-ce que les gens m’aimeraient vraiment s’ils savaient qui je suis au fond ?","Je me sens différent·e — mais je ne sais pas comment le dire.","Je joue des rôles tellement bien que je ne sais plus qui je suis vraiment.","Qu’est-ce qui reste si j’arrête de m’adapter ?"]

const CONTENT={
  rouge:{
    peur:"la mort et la maladie",
    origine:"À un moment de votre histoire, votre corps a signalé un danger. Une maladie, une peur intense, peut-être la mort de quelqu'un de proche — ou simplement l'impression violente que votre corps pouvait vous trahir du jour au lendemain. Ce que votre système nerveux a alors décidé est logique : surveiller en permanence, ne jamais relâcher l'attention. Ce n'était pas une réaction excessive. C'était la seule réponse possible face à quelque chose qui vous dépassait.",
    prison:"Ce masque a deux rôles. Il <strong>emprisonne la peur</strong> — la tient sous clé pour qu'elle ne paralyse pas votre quotidien. Et il <strong>monte la garde</strong> — scrute chaque sensation, chaque signal, chaque variation dans votre corps. Vous êtes devenu·e votre propre veilleur de nuit. Vingt-quatre heures sur vingt-quatre.",
    descriptor:'Corps en alerte permanente',
    mirror:'Quelque chose dans votre corps retient votre attention — presque en permanence. Un battement légèrement différent, une gêne vague, une fatigue que vous ne vous expliquez pas. Et immédiatement, quelque chose en vous cherche : <em>est-ce grave ? Qu\'est-ce que ça signifie ?</em><br><br>Vous avez développé une capacité d\'écoute de votre corps d\'une précision exceptionnelle. Le problème : <strong>vous ne pouvez plus l\'éteindre.</strong> Cette vigilance tourne en boucle, même quand tout va bien, même quand vous venez d\'avoir un bilan médical parfait.<br><br>Ce n\'est pas de l\'hypocondrie. Ce n\'est pas une faiblesse. C\'est une stratégie de survie ancienne, construite par votre nature authentique pour vous protéger d\'une peur qui semblait insurmontable.',
    nature_authentique:"Sous ce masque vit quelqu'un dont l'élan vital est intact — simplement capturé par une alarme de survie qui ne s'éteint jamais. Quand ce masque s'assouplira, l'énergie consumée par la vigilance se transformera en goût de vivre, pleine et simple : être là, dans son corps, dans l'instant, sans surveiller. La confiance en la vie remplace la peur de disparaître. Habiter sa vie — plutôt que la surveiller.",
    scene1_title:'Scène · Mardi matin, avant le lever',
    scene1:'Vous vous réveillez et, avant même d\'ouvrir les yeux, quelque chose dans votre poitrine retient votre attention. Un battement légèrement différent ? Une gêne ? <em>Vous écoutez.</em><br><br>Sur votre téléphone, vous cherchez. Les résultats confirment que ça pourrait être ça. Ou autre chose. <strong>Vous avez maintenant une information de plus — et l\'anxiété est plus forte qu\'avant la recherche.</strong>',
    voice:'« Mon corps n\'est jamais vraiment sûr.\n        Je dois surveiller. Je dois savoir.\n        Si je relâche, quelque chose va m\'échapper. »',
    scene2_title:'Scène · Un résultat rassurant',
    scene2:'Le médecin vous dit : <em>« Tout va bien, les résultats sont normaux. »</em><br>Vous souriez. Vous remerciez. Et dans l\'escalier : <strong>« Mais il n\'a peut-être pas bien regardé... »</strong>',
    couts:['Une vigilance permanente qui épuise — même les nuits, même les vacances','Des consultations qui soulagent sur le moment, puis l\'anxiété revient, intacte','Votre corps est devenu une source d\'inquiétude plutôt qu\'un lieu de vie','Du temps et de l\'énergie partis dans la surveillance au lieu d\'être vécus','Les proches qui ne comprennent plus votre niveau d\'inquiétude, et l\'isolement qui suit'],
    step_key:'L',step_note:'L\'étape LOCALISER est clé pour vous : apprendre à distinguer les sensations réelles des signaux de l\'anxiété — et habiter votre corps comme un lieu de vie plutôt que de surveillance.',
    before:['Vérifier votre pouls, votre tension, vos symptômes — plusieurs fois par jour','Googler vos symptômes et en ressortir plus inquiet·e qu\'avant','Consulter pour être rassuré·e — mais la tranquillité ne dure jamais longtemps','Anticiper les maladies que vous n\'avez pas encore'],
    after:['Traverser une sensation corporelle sans l\'interpréter comme un signal d\'alarme','Passer une journée sans vérifier ni surveiller','Recevoir une bonne nouvelle médicale — et la laisser être vraie, complètement','Sentir votre corps comme un allié, pas comme une menace'],
    spheres:[{i:'💼',l:'Professionnel',t:'Vous êtes souvent le plus préparé dans la pièce. Ce que personne ne voit : votre vigilance corporelle consomme de l énergie cognitive que vos collègues utilisent autrement. Vous prenez les décisions, mais vous repassez souvent par la vérification, la réassurance, le double-contrôle. L anxiété de santé coexiste avec la performance.'},{i:'❤️',l:'Relationnel',t:'Votre peur du corps vous suit dans les relations. Vous avez besoin de savoir que les autres vont bien — leur bonne santé vous rassure autant que la vôtre vous inquiète. Vous pouvez être très attentionné, mais l intimité est parfois alourdie par une vigilance sous-jacente invisible.'},{i:'🪞',l:'Rapport à soi',t:'Votre corps est devenu un sujet d étude, pas un lieu de vie. Vous y habitez en observateur, jamais tout à fait en résident. Chaque signal corporel est immédiatement interprété. Le plaisir physique simple — bouger, respirer, être là — est souvent court-circuité par la surveillance.'}],
    masque_vs_vous:[{top:'Je suis naturellement prudent et attentif à ma santé.',bot:'Ce n est pas de la prudence — c est votre système nerveux en alerte permanente. La vraie prudence choisit quand s activer. La vôtre ne s éteint jamais.'},{top:'Je prends soin des autres parce que je suis attentionné.',bot:'Vous vérifiez aussi la santé des autres parce que leur bien-être physique régule votre propre anxiété. Ce n est pas égoïste — mais ce n est pas que de l amour non plus.'}],
    transformation:[{w:'Semaines 1-2',t:'Vous traversez une sensation corporelle inhabituelle sans l interpréter immédiatement. Vous remarquez le moment exact où l anxiété s active — avant d y répondre.'},{w:'Semaines 3-5',t:'Vous pouvez nommer l émotion qui se cache sous le symptôme. Vous reportez une vérification — et constatez que le danger anticipé ne s est pas produit.'},{w:'Semaines 7-9',t:'Vous passez des journées entières sans surveiller votre corps. La réassurance médicale tient plus longtemps. Votre corps commence à être un allié, pas un sujet de surveillance.'},{w:'Semaines 10-12',t:'Vous habitez votre corps. Vous ressentez la différence entre une sensation réelle et un signal d anxiété. Le bruit de fond s est considérablement atténué.'}],
    valeur_steps:[{l:'V',n:'VOIR',title:'Nommer le déclencheur',body:'La Conscience Observatrice vous apprend à voir le masque en temps réel, avant qu il prenne le contrôle. Identifier le moment précis où votre vigilance s active.'},{l:'A',n:'ACCUEILLIR',title:'Recevoir la sensation',body:'Le protocole ACCUEILLIR en 4 temps (Nommer, Localiser, Respirer, Laisser passer) transforme votre rapport aux signaux corporels.'},{l:'L',n:'LOCALISER',title:'Body Scan V.A.L.E.U.R©',body:'La Thermographie du Masque Rouge cartographie vos zones de vigilance. Le Body Scan V.A.L.E.U.R© vous réapprend à habiter votre corps comme un lieu de vie, pas de surveillance.'},{l:'E',n:'EXPLORER',title:'La Météo émotionnelle',body:'Explorer le conflit entre la part qui surveille pour être en sécurité et la part qui veut vivre librement. La Météo émotionnelle révèle l émotion exacte sous le symptôme.'},{l:'U',n:'UNIFIER',title:'Le Cycle Invisible',body:'Le Cycle Invisible nomme la boucle que vous répétez et la sortie possible. Trouver une voie qui honore le besoin de sécurité sans faire de votre corps un champ de surveillance.'},{l:'R',n:'RENFORCER',title:'La Lettre au Masque Rouge',body:'Créer des comportements nouveaux depuis la confiance. La Lettre au Masque Rouge clôt le parcours en rendant au corps sa place d allié — définitivement.'}]

  orange:{
    peur:"la souffrance et les émotions douloureuses",
    origine:"À un moment de votre histoire, ressentir était trop intense. Trop douloureux. Trop risqué. Peut-être que personne autour de vous ne savait accueillir les émotions. Peut-être qu\'une souffrance trop grande a un jour débordé vos capacités. Votre système — intelligent, protecteur — a alors fait quelque chose de logique : il a coupé l\'accès. Il a mis un couvercle sur ce qui faisait trop mal.",
    prison:"Ce masque fait deux choses. Il <strong>garde la souffrance sous clé</strong> — protège l\'équilibre quotidien en maintenant les émotions à distance. Et il <strong>surveille les situations</strong> qui risquent de les faire remonter — les conversations intimes, les conflits, les moments de calme où quelque chose pourrait émerger.",
    descriptor:'Coupé·e de ses émotions',
    mirror:'Vous <strong>fonctionnez</strong>. Souvent très bien, même. Vous êtes rationnel·le, efficace, capable de gérer ce que d\'autres ne pourraient pas. Ce que personne ne voit : <em>cette solidité vous coûte un vide intérieur permanent.</em><br><br>Vous ne savez pas toujours ce que vous ressentez. Quand quelqu\'un pose la question directement — « Et toi, tu vas bien, vraiment ? » — quelque chose se ferme. Vous répondez « oui, ça va ». Et vous y croyez. Parce que l\'accès est verrouillé depuis si longtemps que vous avez oublié qu\'il l\'est.<br><br>Ce n\'est pas de la froideur. Ce n\'est pas un manque de profondeur. C\'est votre nature authentique qui a appris à se protéger en se mettant hors d\'atteinte.',
    nature_authentique:"Sous ce masque vit quelqu'un dont la capacité à ressentir est tellement forte qu'elle a dû être contenue. Libérée, l'émotion n'est plus un ennemi à fuir — elle devient une source d'information riche et colorée. La créativité s'exprime librement. La vie redevient une danse, et non une gestion de crise. Une Énergie Créatrice et une Intelligence Émotionnelle.",
    scene1_title:'Scène · Une conversation qui devient intime',
    scene1:'Quelqu\'un pose la question directement : <em>« Et toi, tu vas bien vraiment ? »</em><br><br>Quelque chose en vous se ferme — imperceptiblement. Vous souriez. Vous répondez « oui, ça va ». <strong>Et vous croyez ce que vous dites.</strong> Ce n\'est pas un mensonge. C\'est que l\'accès est verrouillé.',
    voice:'« Je ne sais pas vraiment ce que je ressens.\n        Je sais que quelque chose ne va pas — mais si j\'essaie d\'y aller, c\'est flou.\n        Autant rester occupé·e. »',
    scene2_title:'Scène · Un film qui devrait vous émouvoir',
    scene2:'Tout le monde autour de vous est touché. Vous, vous observez. Vous analysez pourquoi c\'est censé être émouvant. <em>Mais le ressenti n\'arrive pas.</em> <strong>Votre système a simplement appris à couper le son des émotions.</strong>',
    couts:['Vos relations restent souvent à la surface — vous en avez faim sans savoir comment y aller','Un vide diffus lors des moments de silence, que vous remplissez d\'activité','Vous gérez la vie des autres mieux que votre propre intérieur','Des décisions prises depuis la tête — jamais depuis vous-même','La fatigue de devoir toujours tenir, toujours fonctionner, sans jamais déposer'],
    step_key:'A',step_note:'L\'étape ACCUEILLIR est centrale pour vous : apprendre à s\'approcher des émotions sans les fuir ni les intellectualiser — progressivement, dans un espace sécurisé.',
    before:['Changer de sujet quand les conversations deviennent vraiment intimes','Remplir le silence par l\'activité, le travail, l\'écran — n\'importe quoi','Prendre soin de tout le monde sauf de vous-même','Ne pas savoir ce dont vous avez besoin — ou ne pas oser le formuler'],
    after:['Identifier une émotion et la nommer — même vaguement, même maladroitement','Rester dans un moment de calme sans le fuir','Exprimer quelque chose de vrai à quelqu\'un de proche','Savoir ce dont vous avez besoin — et oser le demander'],
    spheres:[{i:'💼',l:'Professionnel',t:'Vous êtes souvent perçu comme fiable, stable, efficace. Ce que personne ne voit : vous fonctionnez sur un carburant intellectuel et ne savez pas toujours si vous aimez vraiment ce que vous faites. La satisfaction, la fierté, l enthousiasme authentique sont filtrés avant d arriver à la surface.'},{i:'❤️',l:'Relationnel',t:'Vos proches vous trouvent présent mais parfois difficile à atteindre vraiment. Vous écoutez, vous conseillez — mais l espace de vulnérabilité partagée vous glisse entre les doigts. Ce n est pas de la froideur. C est que l accès émotionnel est verrouillé non par choix mais par automatisme ancien.'},{i:'🪞',l:'Rapport à soi',t:'Vous avez une relation intellectuelle à vous-même : vous vous analysez, vous vous comprenez parfois mieux que vous ne vous ressentez. Le vide diffus que vous pouvez ressentir n est pas une dépression — c est l absence d accès à vos propres états intérieurs.'}],
    masque_vs_vous:[{top:'Je suis une personne rationnelle et stable émotionnellement.',bot:'Votre stabilité est réelle — et elle est partiellement construite sur un évitement. Les émotions sont là, elles sont simplement inaccessibles avant que vous puissiez les traiter.'},{top:'Je m en sors toujours — je gère.',bot:'Vous gérez, oui. Mais gérer n est pas traverser. Vous avez appris à contourner ce qui est douloureux plutôt qu à le traverser. La gestion parfaite est parfois la forme la plus sophistiquée de la fuite.'}],
    transformation:[{w:'Semaines 1-2',t:'Vous nommez une émotion au moins une fois par jour — même vaguement. Vous remarquez la différence entre ce que vous ressentez et ce que vous montrez.'},{w:'Semaines 3-5',t:'Vous restez dans une conversation intime sans changer de sujet. Vous ressentez une satisfaction après un succès — même brève. Le canal commence à s ouvrir.'},{w:'Semaines 7-9',t:'Vous pouvez exprimer un besoin sans le sur-rationaliser. Les relations ont une profondeur nouvelle. Ressentir ne vous déborde pas — ça traverse.'},{w:'Semaines 10-12',t:'Vous habitez vos émotions. Le vide diffus a diminué. Vous savez ce que vous ressentez et vous pouvez le dire — imparfaitement, mais authentiquement.'}],
    valeur_steps:[{l:'V',n:'VOIR',title:'Reconnaître la distance',body:'Identifier les moments où vous court-circuitez une émotion. La Conscience Observatrice rend visible ce qui était automatique.'},{l:'A',n:'ACCUEILLIR',title:'Ouvrir la porte — protocole en 4 temps',body:'Le protocole ACCUEILLIR est l outil central de votre parcours : apprendre à laisser une émotion exister 30 secondes sans la fuir ni la minimiser.'},{l:'L',n:'LOCALISER',title:'Thermographie du Masque Orange',body:'La Thermographie cartographie les zones où les émotions bloquées s installent. Le Body Scan V.A.L.E.U.R© vous reconnecte à vos états intérieurs.'},{l:'E',n:'EXPLORER',title:'La Météo émotionnelle',body:'Explorer la tension entre la part qui voudrait ressentir pleinement et celle qui a appris que c était trop risqué. La Météo émotionnelle donne un langage à cet espace.'},{l:'U',n:'UNIFIER',title:'Le Cycle Invisible',body:'Le Cycle Invisible nomme la boucle évitement/vide et sa sortie. Trouver une voie qui honore votre intelligence tout en ouvrant l accès émotionnel.'},{l:'R',n:'RENFORCER',title:'La Lettre au Masque Orange',body:'Créer des comportements depuis l ouverture plutôt que la fermeture. La Lettre au Masque Orange marque le moment où vous choisissez de vous habiter — vraiment.'}]

  jaune:{
    peur:"l'inconnu et ce qui ne peut pas être contrôlé",
    origine:"À un moment de votre histoire, quelque chose d'imprévu s'est produit — et ça a fait très mal. Ou peut-être que l'environnement dans lequel vous avez grandi était instable, imprévisible, et que vous avez appris que la vigilance était la seule façon d'éviter les mauvaises surprises. Votre système a alors développé une stratégie simple et efficace : anticiper tout. Tout prévoir. Ne jamais être pris·e au dépourvu.",
    prison:"Ce masque remplit deux fonctions. Il <strong>garde l'anxiété sous contrôle</strong> en donnant l'illusion que si l'on prévoit assez, rien ne peut vraiment mal tourner. Et il <strong>scrute l'avenir en permanence</strong> — tous les scénarios, toutes les issues, toutes les choses qui pourraient se passer.",
    descriptor:'L\'imprévu comme menace',
    mirror:'Votre cerveau <strong>ne s\'arrête jamais vraiment</strong>. Même quand tout va bien — surtout quand tout va bien — il cherche. Qu\'est-ce qui pourrait mal tourner ? Qu\'est-ce que j\'aurais dû prévoir ? Y a-t-il un scénario que j\'ai oublié de considérer ?<br><br>Vous planifiez non par plaisir mais par <em>nécessité intérieure</em>. L\'imprévu n\'est pas une contrariété — c\'est une menace. Un changement de plans de dernière minute peut déclencher en vous une vague de réorganisation mentale immédiate que personne autour de vous ne comprend vraiment.<br><br>Ce n\'est pas de la rigidité. Ce n\'est pas un besoin de tout contrôler les autres. C\'est un cerveau qui a appris que prévoir était le seul moyen d\'être en sécurité dans le présent.',
    nature_authentique:"Sous ce masque vit quelqu'un qui, libéré du besoin de tout anticiper, découvre un moteur de confiance inépuisable. Vous n'avez plus besoin de garanties pour avancer — vous savez que vous ferez face à l'imprévu. C'est le passage de l'anticipation paralysante à l'action confiante et intuitive. Une Confiance Inébranlable et une Action Juste.",
    scene1_title:'Scène · Un changement de plans',
    scene1:'Un dîner prévu depuis deux semaines est annulé — deux heures avant. Pour quelqu\'un d\'autre, c\'est une contrariété. Pour vous, c\'est une vague de réorganisation mentale immédiate. <em>Qu\'est-ce que je fais maintenant ? Est-ce que ça change les autres choses prévues ? Qu\'est-ce que ça signifie ?</em><br><br><strong>Vous êtes déjà en train de construire un plan B — et un plan C — avant même d\'avoir raccroché.</strong>',
    voice:'« Si je ne contrôle pas ça, quelque chose va m\'échapper.\n        Et si quelque chose m\'échappe, ça va mal tourner.\n        Je dois anticiper. Je dois savoir. Je dois prévoir. »',
    scene2_title:'Scène · Avant une décision importante',
    scene2:'Vous avez analysé sous tous les angles. Vous avez pesé le pour et le contre. Vous avez demandé l\'avis de trois personnes. <em>Votre cerveau a fait le travail dix fois — et il repart pour une onzième.</em> Non par manque de confiance — mais parce que <strong>l\'incertitude est physiquement inconfortable</strong>. Et qu\'il n\'existe pas de certitude absolue.',
    couts:['Un épuisement cognitif permanent que personne autour de vous ne voit vraiment','Des proches qui se sentent parfois contraints sans comprendre pourquoi','Du temps à planifier des choses qui ne se passeront jamais exactement comme prévu','Les plaisirs spontanés qui vous sont inaccessibles — l\'imprévu joyeux qui stresse avant de réjouir','Des décisions retardées en attendant une certitude qui ne viendra jamais'],
    step_key:'E',step_note:'L\'étape EXPLORER est centrale pour vous : identifier le conflit entre la part qui a besoin de tout contrôler et celle qui sait, quelque part, que tout ne peut pas l\'être — et que c\'est bien ainsi.',
    before:['Re-planifier ce qui a déjà été planifié, juste pour vous rassurer','Être épuisé·e avant même que l\'événement commence','Avoir du mal à déléguer — parce que ça ne sera pas fait exactement comme vous l\'auriez fait','Vivre l\'imprévu comme une agression, même quand il est bénin'],
    after:['Tolérer un plan ouvert sans le combler immédiatement','Être surpris·e — et trouver ça agréable plutôt qu\'inquiétant','Déléguer et laisser l\'autre faire à sa façon','Commencer quelque chose sans savoir exactement comment ça finira'],
    spheres:[{i:'💼',l:'Professionnel',t:'Vous êtes souvent le plus préparé dans la pièce. Ce que ça coûte : les projets ouverts vous pèsent, l ambiguïté vous mobilise, le changement soudain vous déstabilise de façon disproportionnée. Vous anticipez les problèmes avant qu ils existent et perdez de l énergie sur des scénarios qui ne se produiront jamais.'},{i:'❤️',l:'Relationnel',t:'Vous cherchez à sécuriser vos relations par la prévisibilité : vous posez des questions, vous planifiez, vous vérifiez. L autre peut parfois ressentir que sa liberté est contrainte. Vous aimez — mais votre amour passe souvent par l organisation plutôt que par la spontanéité.'},{i:'🪞',l:'Rapport à soi',t:'Votre esprit ne s arrête jamais vraiment. Même dans le calme, il anticipe, évalue, planifie. Les moments de vraie détente où l on lâche sans surveiller sont rares. Être simplement là, sans projet, sans cadre, est un défi à part entière.'}],
    masque_vs_vous:[{top:'Je suis rigoureux et prévoyant — c est une qualité.',bot:'La prévoyance est une qualité. Mais la vôtre est activée par l anxiété de l inconnu, pas par le choix. Elle tourne en permanence, même quand il n y a rien à anticiper.'},{top:'J ai besoin de comprendre les choses avant d agir.',bot:'Vous n attendez pas de comprendre — vous attendez la certitude que ça ne peut pas mal se passer. Ce n est pas de la rigueur, c est de l évitement de l incertitude déguisé en méthode.'}],
    transformation:[{w:'Semaines 1-2',t:'Vous prenez une décision mineure sans avoir toutes les informations. Vous remarquez la différence entre préparer utilement et ruminer anxieusement.'},{w:'Semaines 3-5',t:'Vous tolérez une situation ouverte sans avoir besoin de la résoudre immédiatement. Vous agissez avec 70% de certitude — et observez que ça fonctionne.'},{w:'Semaines 7-9',t:'L imprévu vous perturbe moins. Vous pouvez changer de plan sans réorganisation mentale complète. Le futur est moins menaçant même sans contrôle total.'},{w:'Semaines 10-12',t:'Vous habitez le présent. Vous agissez depuis ce que vous savez, pas depuis ce que vous contrôlez. L incertitude est devenue une donnée neutre.'}],
    valeur_steps:[{l:'V',n:'VOIR',title:'Nommer la rumination',body:'Identifier le moment où l anticipation bascule dans la rumination anxieuse. La Conscience Observatrice vous apprend à voir ce mouvement — et à choisir de ne pas le suivre.'},{l:'A',n:'ACCUEILLIR',title:'Recevoir l inconfort de l incertitude',body:'Apprendre à tolérer le malaise du je ne sais pas sans chercher immédiatement à le résoudre. Le protocole ACCUEILLIR en 4 temps transforme votre rapport à l inconnu.'},{l:'L',n:'LOCALISER',title:'Thermographie du Masque Jaune',body:'La Thermographie révèle où l anxiété de contrôle se loge dans votre corps. Le Body Scan V.A.L.E.U.R© vous apprend à détecter l activation avant qu elle prenne le contrôle.'},{l:'E',n:'EXPLORER',title:'La Météo émotionnelle',body:'Explorer le conflit entre la part qui a besoin de tout maîtriser et celle qui sait que la vie échappe au contrôle. La Météo émotionnelle nomme l état sous la planification.'},{l:'U',n:'UNIFIER',title:'Le Cycle Invisible',body:'Le Cycle Invisible nomme la boucle anticipation/vérification et sa sortie. Trouver une voie qui honore votre besoin de clarté sans exiger la certitude totale.'},{l:'R',n:'RENFORCER',title:'La Lettre au Masque Jaune',body:'Créer des comportements depuis la confiance dans le processus. La Lettre au Masque Jaune marque le passage de l anticipation à la présence.'}]

  vert:{
    peur:"le rejet et l'abandon",
    origine:"À un moment de votre histoire, vous avez appris que l'amour ne venait pas naturellement — qu'il se méritait. Peut-être que les personnes qui comptaient pour vous n'étaient pas constantes. Peut-être qu'être vous-même avait un coût relationnel. Votre nature authentique a alors créé une stratégie de survie relationnelle : s'adapter, s'effacer, donner plus que l'autre n'en demande — pour ne jamais risquer d'être quitté·e.",
    prison:"Ce masque fait deux choses simultanément. Il <strong>protège la blessure du rejet</strong> — cette douleur ancienne d'avoir été mis·e de côté, ou d'en avoir eu peur. Et il <strong>surveille l'entourage en permanence</strong> — les humeurs, les silences, les tonalités, les mots manquants — pour détecter à l'avance le moindre signe de distanciation.",
    descriptor:'Adaptation permanente aux autres',
    mirror:'Vous faites partie des personnes qui donnent beaucoup — souvent trop. Non par faiblesse, mais parce que quelque chose en vous a appris très tôt que <em>l\'amour se méritait par ce qu\'on fait, pas par ce qu\'on est.</em><br><br>Vous avez développé un radar ultra-sensible aux humeurs des autres. Vous <strong>adaptez votre ton, vos mots, parfois votre personnalité entière</strong> selon la pièce dans laquelle vous entrez. Vous sentez les tensions que personne d\'autre ne voit. Vous captez les changements avant qu\'ils soient visibles.<br><br>Ce don est réel. Mais il vous coûte quelque chose d\'essentiel : <em>vous-même.</em> À force de vous modeler sur les besoins des autres, vous avez perdu le contact avec les vôtres.',
    nature_authentique:"Sous ce masque vit quelqu'un dont l'amour, libéré de la peur, n'est plus une monnaie d'échange ou une stratégie de survie. Il éclot ancré en soi — se donnant librement, sans s'épuiser. L'empathie devient un don, non un fardeau. C'est la fin de la fusion et le début de la relation vraie. Une Capacité d'Aimer Authentique et Détachée.",
    scene1_title:'Scène · Un message trop court',
    scene1:'Un ami vous envoie un message deux mots plus court. Pas d\'emoji. Ton neutre. Rien d\'anormal — objectivement. <em>Mais quelque chose s\'est mis en route en vous.</em><br><br>Vous repassez les dernières conversations. Avez-vous dit quelque chose de maladroit ? Est-ce que vous prenez trop de place ? <strong>Vous calibrez la prochaine réponse pour réparer quelque chose qui n\'est peut-être pas cassé.</strong>',
    voice:'« Si je réponds mal, il va se distancer.\n        Je dois trouver la formulation qui ne va pas l\'éloigner.\n        Je ne peux pas me permettre de le perdre. »',
    scene2_title:'Scène · On vous demande ce que vous voulez',
    scene2:'« Qu\'est-ce que tu veux faire ce soir ? »<br>Vous répondez : <em>« Peu importe, je m\'adapte. »</em><br><br>Ce n\'est pas de la flexibilité. C\'est la conviction profonde — souvent inconsciente — que <strong>vos préférences ont moins de valeur que la paix relationnelle</strong>. Que prendre trop de place, c\'est risquer de décevoir.',
    couts:['Vous portez seul·e des tensions qui auraient dû être partagées — et la rancœur silencieuse qui s\'accumule','Vous vous retrouvez dans des relations asymétriques : vous donnez plus que vous ne recevez','Un sentiment diffus de n\'être jamais pleinement vous-même en présence des autres','Vous ne savez plus très bien ce que vous voulez, ce que vous pensez, ce qui vous plaît vraiment','L\'explosion ou l\'effondrement qui survient un jour, après trop longtemps à tout retenir'],
    step_key:'E',step_note:'L\'étape EXPLORER est centrale pour vous : identifier le conflit entre la part qui a besoin des autres pour se sentir en sécurité, et celle qui a besoin d\'elle-même — sans sacrifier l\'une pour l\'autre.',
    before:['Dire non déclenche une culpabilité intense — alors vous dites oui, et vous vous en voulez après','Vous devinez les besoins des autres avant d\'avoir identifié les vôtres','Une réponse froide ou un silence suffit à vous déstabiliser pour des heures','Vous accumulez des frustrations en silence, jusqu\'au point de rupture'],
    after:['Dire non sans avoir besoin de s\'expliquer pendant dix minutes','Formuler un besoin sans s\'excuser d\'en avoir un','Laisser l\'autre gérer son humeur — sans vous sentir responsable de la réparer','Savoir ce que vous voulez — et oser le dire, même si ce n\'est pas ce que l\'autre attend'],
    spheres:[{i:'💼',l:'Professionnel',t:'Vous êtes l élément de cohésion — celui qui maintient l ambiance, qui s adapte, qui facilite. Ce que ça coûte : vos propres besoins professionnels (reconnaissance, position, rémunération) sont souvent sacrifiés pour maintenir l harmonie. Vous avez du mal à défendre vos intérêts quand ça risque de créer un conflit.'},{i:'❤️',l:'Relationnel',t:'Vous donnez beaucoup — de temps, d attention, de disponibilité. Et vous attendez, souvent en silence, que l autre fasse de même. Quand ce n est pas le cas, la déception monte — mais vous la taisez, de peur que l exprimer ne rompe le lien. Vos relations sont souvent asymétriques.'},{i:'🪞',l:'Rapport à soi',t:'Vous savez ce que veulent les autres. Mais ce que vous voulez, vous ? Là, c est plus flou. Vous avez tellement intégré les besoins des autres que les vôtres sont devenus secondaires. Être seul vous met face à une question inconfortable : qui suis-je quand je n adapte pas ?'}],
    masque_vs_vous:[{top:'Je suis une personne généreuse et attentive aux autres.',bot:'Votre générosité est réelle — et elle est partiellement activée par la peur. Vous donnez aussi pour maintenir le lien, pour éviter le rejet, pour vous rendre indispensable. Ce n est pas de la fausseté — c est votre masque qui protège votre générosité.'},{top:'Je préfère éviter les conflits — je suis quelqu un de pacifique.',bot:'Vous évitez les conflits parce que vous interprétez la contradiction comme un danger pour le lien. Ce n est pas du pacifisme — c est de la survie relationnelle. Le vrai pacifisme peut dire non.'}],
    transformation:[{w:'Semaines 1-2',t:'Vous exprimez une préférence quand quelqu un vous demande ce que vous voulez. Vous remarquez le moment où vous commencez à vous adapter automatiquement.'},{w:'Semaines 3-5',t:'Vous formulez un besoin dans une relation de confiance. Vous dites non à une demande mineure — sans vous expliquer pendant dix minutes.'},{w:'Semaines 7-9',t:'Un silence ou une distance ne déclenche plus automatiquement l alarme. Vous savez ce que vous voulez — et pouvez le dire même si ça crée de l inconfort.'},{w:'Semaines 10-12',t:'Vous vous sentez vous-même dans vos relations, pas seulement adapté. Vous aimez — depuis vous, pas depuis la peur de perdre.'}],
    valeur_steps:[{l:'V',n:'VOIR',title:'Reconnaître l adaptation automatique',body:'Identifier le moment exact où vous commencez à vous effacer pour maintenir le lien. La Conscience Observatrice révèle ce mouvement — avant qu il soit accompli.'},{l:'A',n:'ACCUEILLIR',title:'Recevoir la peur du rejet',body:'Apprendre à accueillir l inconfort du conflit potentiel sans le fuir immédiatement. Le protocole ACCUEILLIR en 4 temps transforme votre rapport à la tension relationnelle.'},{l:'L',n:'LOCALISER',title:'Thermographie du Masque Vert',body:'La Thermographie cartographie les manifestations corporelles de la peur du rejet — gorge, thorax. Le Body Scan V.A.L.E.U.R© vous reconnecte à vos propres états.'},{l:'E',n:'EXPLORER',title:'La Météo émotionnelle',body:'Explorer le conflit entre la part qui a besoin des autres pour se sentir en sécurité et celle qui a besoin d exister pour elle-même. La Météo émotionnelle nomme ce que l adaptation cache.'},{l:'U',n:'UNIFIER',title:'Le Cycle Invisible',body:'Le Cycle Invisible nomme la boucle adaptation/rancœur et sa sortie possible. Trouver une voie qui honore le besoin de connexion sans sacrifier l identité.'},{l:'R',n:'RENFORCER',title:'La Lettre au Masque Vert',body:'Créer des comportements depuis vos propres besoins — pas depuis la peur de décevoir. La Lettre au Masque Vert marque le passage du lien subi au lien choisi.'}]
  },

  bleu:{
    peur:"l'impuissance et la perte de maîtrise",
    origine:"À un moment de votre histoire, quelque chose a échappé à votre contrôle — et ça a été dévastateur. Peut-être une situation chaotique dans laquelle vous avez dû prendre les rênes pour que ça ne s'effondre pas. Peut-être qu'on vous a appris que les autres n'étaient pas fiables, que la faiblesse coûtait cher, que tenir était la seule façon de survivre. Votre nature authentique a alors construit une armure : toujours maîtriser. Ne jamais fléchir. Être celui ou celle sur qui on peut compter — quoi qu'il en coûte.",
    prison:"Ce masque joue deux rôles. Il <strong>maintient le chaos à distance</strong> — organise, structure, prévoit pour que rien ne parte en vrille. Et il <strong>surveille sans relâche</strong> — vérifie que tout est fait correctement, que personne ne commet d'erreur, que la situation reste sous contrôle.",
    descriptor:'Besoin de tout maîtriser',
    mirror:'Vous êtes de ceux qui font les choses <strong>bien</strong> — souvent mieux que les autres, et vous le savez. Déléguer est un effort réel. Regarder quelqu\'un s\'y prendre différemment est inconfortable. Non pas parce que vous êtes arrogant·e — mais parce que <em>perdre le contrôle, c\'est vous exposer à un sentiment que vous ne tolérez pas.</em><br><br>Ce sentiment a un nom : l\'impuissance. Et votre masque a décidé, il y a longtemps, que vous n\'y seriez jamais soumis·e.<br><br>Ce que vous ne voyez pas toujours : <strong>cette maîtrise vous épuise autant qu\'elle vous rassure.</strong> Et sous cette armure, il y a quelqu\'un qui aimerait, parfois, pouvoir s\'appuyer sur quelqu\'un d\'autre.',
    nature_authentique:"Sous ce masque vit quelqu'un qui, libéré du besoin de contrôler les autres pour exister, découvre une parole juste, claire et créatrice. Vous pouvez exprimer vos besoins, vos idées et votre vision avec calme et puissance — non pour dominer, mais pour contribuer. C'est la naissance d'un leadership authentique qui élève les autres au lieu de les diriger. Une Autorité Naturelle et une Communication Inspirée.",
    scene1_title:'Scène · Une tâche déléguée',
    scene1:'Vous avez confié quelque chose. La personne le rend — pas mal, mais <em>pas comme vous l\'auriez fait.</em> La tension monte. Vous trouvez un moment pour « améliorer discrètement ».<br><br><strong>Vous avez délégué la tâche. Mais vous n\'avez pas délégué le contrôle. Vous ne l\'avez jamais vraiment lâché.</strong>',
    voice:'« Si je ne le surveille pas, ça va partir dans le mauvais sens.\n        Les autres ne voient pas les détails comme moi.\n        Je ne peux pas me permettre que ça rate. »',
    scene2_title:'Scène · Une réunion où vous n\'avez pas la main',
    scene2:'Quelqu\'un propose une approche raisonnable — mais ce n\'est pas la vôtre. <em>Vous intervenez. Vous reformulez. Vous améliorez.</em> <strong>Le besoin de maîtrise parle à votre place, avant même que vous ayez décidé de parler.</strong>',
    couts:['Vous portez une fatigue de tout devoir tenir — sans pouvoir vraiment vous reposer','Vos proches et collègues se sentent parfois sous tutelle, sans comprendre pourquoi','Vous êtes souvent seul·e dans votre exigence — et cette solitude est réelle','Vous avez du mal à recevoir de l\'aide — l\'accepter, c\'est admettre que vous ne suffisez pas'],
    step_key:'U',step_note:'L\'étape UNIFIER est centrale pour vous : réconcilier la part qui a besoin de contrôle pour se sentir en sécurité, avec celle qui aspire à se reposer, à recevoir, à faire confiance.',
    before:['Vérifier le travail des autres — même quand vous avez délégué','Ne jamais vraiment vous reposer — il y a toujours quelque chose à gérer, à vérifier','Avoir du mal à recevoir de l\'aide sans corriger intérieurement la façon dont elle est donnée','Sentir une tension physique quand quelque chose échappe à votre regard'],
    after:['Confier quelque chose et le laisser se faire sans intervenir','Vous reposer sans culpabilité — vraiment, complètement','Recevoir de l\'aide et dire merci sans retravailler derrière','Tolérer qu\'une chose soit faite différemment — et que ce soit suffisant'],
    spheres:[{i:'💼',l:'Professionnel',t:'Vous êtes souvent celui qui porte — la décision, la vision, la responsabilité. Vous êtes efficace, vous inspirez confiance. Ce que ça coûte : déléguer vous est difficile parce que votre système nerveux assimile le contrôle à la sécurité. Vous portez plus que votre part — et ne savez pas toujours demander de l aide.'},{i:'❤️',l:'Relationnel',t:'Vos proches peuvent se sentir bien soignés — et parfois légèrement contrôlés. Vous organisez, vous anticipez, vous décidez — souvent pour protéger. La vulnérabilité — la vôtre — est difficile à montrer. Vous aidez plus facilement que vous ne recevez de l aide.'},{i:'🪞',l:'Rapport à soi',t:'Votre identité est très liée à votre capacité à maîtriser. Vous ne savez pas toujours qui vous êtes quand vous ne gérez pas. Le repos sans liste, la détente sans projet — ces états sont inconfortables. Lâcher prise, même temporairement, produit une anxiété sourde.'}],
    masque_vs_vous:[{top:'Je suis quelqu un de fiable sur qui les autres peuvent compter.',bot:'Vous êtes fiable — et vous avez construit cette fiabilité partiellement pour vous sentir en sécurité. Être indispensable est une façon de ne jamais perdre le contrôle. Ce n est pas que de la générosité.'},{top:'Je prends les décisions parce que les autres ne le font pas assez.',bot:'Les autres ne décident pas assez vite parce que vous anticipez trop vite. Votre besoin de maîtrise crée parfois le vide de leadership que vous comblez ensuite. C est un cycle invisible.'}],
    transformation:[{w:'Semaines 1-2',t:'Vous confiez une tâche mineure à quelqu un — sans vérifier le résultat. Vous remarquez la différence entre contrôle utile et contrôle défensif.'},{w:'Semaines 3-5',t:'Vous demandez de l aide dans un domaine où vous vous débrouillez seul. Vous acceptez un résultat imparfait sans le corriger.'},{w:'Semaines 7-9',t:'Vous pouvez vous reposer sans liste de choses à faire. Vous déléguez des responsabilités importantes — et laissez faire.'},{w:'Semaines 10-12',t:'La force que vous ressentez ne dépend plus de tout tenir. Vous savez faire confiance — à vous, aux autres, au processus.'}],
    valeur_steps:[{l:'V',n:'VOIR',title:'Nommer le besoin de contrôle',body:'Identifier le moment précis où votre besoin de maîtrise s active — avant qu il oriente votre comportement. La Conscience Observatrice révèle ce déclencheur.'},{l:'A',n:'ACCUEILLIR',title:'Recevoir l inconfort du lâcher-prise',body:'Apprendre à tolérer le malaise de ne pas contrôler sans y répondre immédiatement. Le protocole ACCUEILLIR en 4 temps transforme votre rapport à l imprévisible.'},{l:'L',n:'LOCALISER',title:'Body Scan V.A.L.E.U.R©',body:'La Thermographie du Masque Bleu révèle où la tension de contrôle se loge dans votre corps. Le Body Scan V.A.L.E.U.R© vous reconnecte à vos signaux d alerte.'},{l:'E',n:'EXPLORER',title:'La Météo émotionnelle',body:'Explorer le conflit entre la part qui a besoin de tout tenir et celle qui sait que la vraie force ne dépend pas du contrôle. La Météo émotionnelle nomme ce qui se passe sous le besoin de maîtrise.'},{l:'U',n:'UNIFIER',title:'Le Cycle Invisible',body:'Le Cycle Invisible nomme la boucle contrôle/épuisement et sa sortie. Trouver une voie qui honore votre besoin de sécurité sans exiger la maîtrise totale.'},{l:'R',n:'RENFORCER',title:'La Lettre au Masque Bleu',body:'Créer des comportements depuis la confiance dans les autres et dans le processus. La Lettre au Masque Bleu marque le passage de la maîtrise à la présence.'}]
  },

  indigo:{
    peur:"l'échec et le sentiment de ne pas être à la hauteur",
    origine:"À un moment de votre histoire, vous avez appris que votre valeur n'était pas acquise — qu'elle se prouvait. Peut-être que les efforts étaient récompensés mais les personnes rarement. Peut-être qu'une erreur a coûté cher — en affection, en reconnaissance, en place dans le groupe. Votre nature authentique a alors développé une réponse : être irréprochable. Travailler plus. En faire plus. Pour ne jamais être exposé·e à ce regard qui juge.",
    prison:"Ce masque fait deux choses. Il <strong>protège de la honte</strong> — anticipe le regard des autres, perfectionne avant qu'ils puissent critiquer, se cache derrière des résultats impeccables. Et il <strong>évalue en permanence</strong> — compare, relativise, cherche la faille dans chaque réussite pour justifier que la prochaine fois, il faudra faire encore mieux.",
    descriptor:'Valeur conditionnelle aux résultats',
    mirror:'Il y a une voix dans votre tête qui <strong>évalue en permanence</strong>. Qui compare, qui relativise, qui anticipe le regard des autres. Elle ne vous lâche pas — ni au travail, ni dans vos relations, ni dans les petits moments du quotidien.<br><br>Cette voix est <em>extrêmement sévère avec vous</em>. Un niveau d\'exigence que vous n\'appliqueriez jamais aux autres. Ce qu\'elle ne voit pas : cette exigence n\'est pas un gage de qualité. C\'est de la peur déguisée en perfectionnisme.<br><br>Vous avez peut-être atteint beaucoup. Et pourtant, quelque chose dans votre rapport à vous-même reste fragile — comme si votre valeur dépendait encore et toujours du prochain résultat.',
    nature_authentique:"Sous ce masque vit quelqu'un dont le mental, libéré du perfectionnisme et de la peur du regard extérieur, devient un outil de discernement — non de rumination. Vous avez confiance en votre vision intérieure et osez la suivre, même à contre-courant. La peur de l'erreur se transforme en capacité à apprendre de chaque expérience avec sagesse. Une Vision Claire et une Intuition Affûtée.",
    scene1_title:'Scène · Après une réussite',
    scene1:'Vous avez bien fait. Tout le monde l\'a dit. <em>Quelqu\'un vous félicite chaleureusement.</em><br><br>Vous remerciez. Et dans votre tête : <strong>« Ils ne voient pas ce que j\'ai raté. La prochaine fois, ils vont s\'en rendre compte. »</strong> La réussite atterrit — et repart aussitôt.',
    voice:'« Je ne mérite pas vraiment cette place.\n        Un jour, on va voir que je ne suis pas à la hauteur.\n        Je dois continuer à prouver, encore et encore, que j\'ai ma place ici. »',
    scene2_title:'Scène · Un projet qui attend',
    scene2:'Vous avez l\'idée. Vous avez les compétences. <em>Mais vous ne commencez pas.</em> Parce que commencer, c\'est s\'exposer. Et s\'exposer, c\'est risquer que quelqu\'un voit que ce n\'était <strong>pas aussi bien que ce que vous projetez.</strong>',
    couts:['Un épuisement permanent à devoir prouver quelque chose que personne ne vous demande','Des projets abandonnés avant d\'être visibles — par peur de l\'évaluation','Des réussites qui ne nourrissent pas — « j\'ai eu de la chance », « ça ne compte pas »','Une sévérité envers vous-même que vous n\'infligeriez jamais à quelqu\'un que vous aimez','Votre plaisir du présent gâché par l\'anxiété du résultat à venir'],
    step_key:'V',step_note:'L\'étape VOIR est centrale pour vous : reconnaître la voix du masque au moment précis où elle s\'active — « Ah, c\'est mon masque qui me dit que je ne suis pas à la hauteur » — pour cesser de la confondre avec une vérité sur vous.',
    before:['Minimiser vos réussites — « j\'ai eu de la chance », « ça ne comptait pas vraiment »','Travailler plus que nécessaire pour être « sûr·e » du résultat — et ne jamais l\'être vraiment','Retarder les projets importants par peur de l\'évaluation','Comparer systématiquement — et toujours vous en sortir perdant·e'],
    after:['Recevoir un compliment et le laisser atterrir — sans le démonter aussitôt','Commencer quelque chose sans attendre les conditions parfaites','Faire quelque chose « assez bien » et s\'arrêter là — sans retravailler','Reconnaître une vraie compétence — sans l\'attribuer à la chance ou aux circonstances'],
    spheres:[{i:'💼',l:'Professionnel',t:'Vous êtes souvent l un des plus compétents dans votre domaine — et vous êtes le dernier à le reconnaître. La barre se déplace dès que vous l atteignez. Vous reportez les projets visibles par peur que le résultat révèle une insuffisance. Vous livrez dans l urgence avec une auto-critique sévère — et passez au suivant sans vous accorder la satisfaction méritée.'},{i:'❤️',l:'Relationnel',t:'Vos proches peuvent vous aimer mais avoir du mal à vous atteindre vraiment, parce que vous portez seul la conviction secrète de ne pas être à la hauteur. La vulnérabilité — montrer que vous ne savez pas, que vous avez besoin — est très difficile. Vous choisissez souvent des relations où vous pouvez vous montrer compétent.'},{i:'🪞',l:'Rapport à soi',t:'Il y a une voix en vous qui évalue en permanence — et qui ne conclut jamais c est bien. Ce n est pas de l humilité, c est un juge interne qui a remplacé votre regard sur vous-même. Vous avez construit votre valeur sur vos performances et oublié que vous aviez une valeur inconditionnelle avant la première réussite.'}],
    masque_vs_vous:[{top:'Je suis exigeant parce que j ai des standards élevés.',bot:'Vos standards sont réels — et ils sont alimentés par la peur. Vous n êtes pas exigeant parce que vous aimez l excellence. Vous l êtes parce que vous avez appris que seule la performance vous garantissait une place.'},{top:'Mon succès est réel, j ai juste du mal à le ressentir.',bot:'Vous minimisez vos succès non par modestie mais parce que votre système interne ne les reconnaît pas comme des preuves de valeur. Le syndrome de l imposteur n est pas une erreur d évaluation — c est votre masque qui protège la peur d être découvert.'}],
    transformation:[{w:'Semaines 1-2',t:'Vous recevez un compliment sans le minimiser. Vous remarquez la voix critique — et vous lui donnez un nom. Vous identifiez la différence entre exigence utile et punition automatique.'},{w:'Semaines 3-5',t:'Vous montrez un travail en cours sans attendre qu il soit parfait. Vous livrez quelque chose d imparfait intentionnellement — et observez que le monde ne s effondre pas.'},{w:'Semaines 7-9',t:'La voix critique est moins automatique. Vous commencez à vous reconnaître de la valeur en dehors de vos productions. Vos succès tiennent quelques instants avant que la barre ne remonte.'},{w:'Semaines 10-12',t:'Vous existez en dehors de vos performances. Vous pouvez vous reposer, ne rien produire, être simplement là — sans culpabilité. La valeur inconditionnelle commence à être ressentie.'}],
    valeur_steps:[{l:'V',n:'VOIR',title:'Voir la voix critique en temps réel',body:'La Conscience Observatrice est l outil central de votre parcours : identifier le moment où la voix du masque s active — au succès, à l évaluation, à l erreur — et voir sans obéir.'},{l:'A',n:'ACCUEILLIR',title:'Recevoir la peur du jugement',body:'Apprendre à accueillir la peur d être vu sans s y soumettre ni la nier. Le protocole ACCUEILLIR en 4 temps transforme votre rapport à l évaluation externe et interne.'},{l:'L',n:'LOCALISER',title:'Thermographie du Masque Indigo',body:'La Thermographie révèle les manifestations physiques de la peur du jugement. Le Body Scan V.A.L.E.U.R© vous reconnecte à vos signaux corporels d alerte avant qu ils déclenchent la réaction automatique.'},{l:'E',n:'EXPLORER',title:'La Météo émotionnelle',body:'Explorer le conflit entre la part qui a besoin de performer pour exister et celle qui sait que la valeur est inconditionnelle. La Météo émotionnelle nomme ce qui se passe sous la voix critique.'},{l:'U',n:'UNIFIER',title:'Le Cycle Invisible',body:'Le Cycle Invisible nomme la boucle performance/insuffisance et sa sortie. Trouver une voie qui honore votre exigence sans en faire une punition.'},{l:'R',n:'RENFORCER',title:'La Lettre au Masque Indigo',body:'Créer des comportements depuis votre valeur propre, pas depuis la peur du jugement. La Lettre au Masque Indigo marque le moment où vous choisissez de vous reconnaître — sans condition.'}]
  },

  violet:{
    peur:"perdre son identité, ne plus savoir qui l'on est",
    origine:"À un moment de votre histoire, quelque chose dans votre identité a été menacé. Peut-être que changer signifiait trahir — des personnes, des valeurs, un groupe. Peut-être que vous avez dû jouer tant de rôles différents que vous ne saviez plus lequel était le vrai. Peut-être que rester le même était la seule façon de garder le fil de vous-même dans un monde qui changeait trop vite. Votre nature authentique a alors construit une stratégie : maintenir. Préserver. Ne pas bouger pour ne pas se perdre.",
    prison:"Ce masque fait deux choses. Il <strong>préserve le sentiment d'identité</strong> — s'accroche aux rôles, aux routines, aux certitudes qui donnent le sentiment de savoir qui l'on est. Et il <strong>résiste à tout ce qui pourrait le remettre en question</strong> — le changement, l'inconnu, les expériences nouvelles, les personnes qui vous voient différemment de l'image que vous avez construite.",
    descriptor:'Qui suis-je, vraiment ?',

// ── Utilitaires ────────────────────────────────────────────────────────────
function getLevel(pct){
  if(pct<30)return{label:'Non significatif',key:'ns'};
  if(pct<50)return{label:'Modéré',key:'modere'};
  if(pct<70)return{label:'Significatif',key:'significatif'};
  if(pct<85)return{label:'Élevé',key:'eleve'};
  return{label:'Dominant',key:'dominant'};
}

function hexToRgb(hex){
  var r=parseInt(hex.slice(1,3),16);
  var g=parseInt(hex.slice(3,5),16);
  var b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

// ── computeSPA ─────────────────────────────────────────────────────────────
function computeSPA(sc) {
  if (sc.spa !== undefined && sc.spa !== null) return sc.spa;
  // Fallback V1/V2
  const masks = ['rouge','orange','jaune','vert','bleu','indigo','violet'];
  const t = masks.reduce((s,m)=>s+(sc[m]||0),0);
  return Math.max(0,Math.min(100,Math.round(100-t/7)));
}

// ── detectProfile ──────────────────────────────────────────────────────────
function detectProfile(sc){
  const VALID=['rouge','orange','jaune','vert','bleu','indigo','violet'];
  var sorted=VALID.map(function(k){return{key:k,pct:sc[k]||0};}).sort(function(a,b){return b.pct-a.pct;});
  var _globalMean=Math.round(VALID.reduce(function(s,k){return s+(sc[k]||0);},0)/7);
  if(sorted[0].pct<50){
    var _subtype=sorted[0].pct<30?'equilibre':'vigilant';
    return{type:'adaptatif',subtype:_subtype,masks:[sorted[0].key],globalMean:_globalMean,all_sorted:sorted};
  }
  var TIEBREAK_ORDER=['jaune','rouge','indigo','vert','bleu','orange','violet'];
  var top=sorted[0].pct;
  var tied=sorted.filter(function(m){return m.pct===top;});
  if(tied.length>=2){
    var tiedKeys=tied.map(function(m){return m.key;});
    var winner=TIEBREAK_ORDER.find(function(k){return tiedKeys.indexOf(k)>=0;})||tiedKeys[0];
    sorted=[sorted.find(function(m){return m.key===winner;})].concat(sorted.filter(function(m){return m.key!==winner;}));
  }
  var m0=sorted[0],m1=sorted[1],m2=sorted[2],m3=sorted[3];
  var above60=sorted.filter(function(m){return m.pct>=60;});
  if(above60.length>=5&&(above60[0].pct-above60[above60.length-1].pct)<=20){
    return{type:'pan',masks:above60.map(function(m){return m.key;}),all_sorted:sorted};
  }
  if(m0.pct>=60&&m1&&m1.pct>=55&&m2&&m2.pct>=55&&(m0.pct-m2.pct)<=15&&(!m3||m1.pct-m3.pct>10)){
    return{type:'triade',masks:[m0.key,m1.key,m2.key],all_sorted:sorted};
  }
  if(m0.pct>=65&&m1&&m1.pct>=65&&(m0.pct-m1.pct)<=10){
    var dSub=m2&&m2.pct>=55&&m2.pct<65?'dyade_tertiaire':'dyade';
    return{type:'dyade',subtype:dSub,masks:[m0.key,m1.key],secondary:dSub==='dyade_tertiaire'?m2.key:undefined,all_sorted:sorted};
  }
  if(m0.pct>=55&&m1&&m1.pct>=55&&(m0.pct-m1.pct)<=10){
    return{type:'dyade',subtype:'dyade_moderee',masks:[m0.key,m1.key],all_sorted:sorted};
  }
  if(m0.pct>=75){
    var sec=m1&&m1.pct>=60&&(m0.pct-m1.pct)>10?m1.key:undefined;
    return{type:'mono',subtype:sec?'dominant_secondaire':'dominant',masks:[m0.key],secondary:sec,all_sorted:sorted};
  }
  if(m0.pct>=60){
    var sec2=m1&&m1.pct>=50&&(m0.pct-m1.pct)>10?m1.key:undefined;
    return{type:'mono',subtype:'fort',masks:[m0.key],secondary:sec2,all_sorted:sorted};
  }
  return{type:'residuel',masks:[m0.key],all_sorted:sorted};
}

// ── SPA texte adaptatif ────────────────────────────────────────────────────
function buildSpaText(pct) {
  if(pct>=70) return "Un espace de liberté réel — vous avez déjà accès à des moments où vous êtes pleinement vous-même, sans effort ni rôle à tenir. Cet espace existe. Il s'agit de l'élargir.";
  if(pct>=50) return "Des espaces de liberté existent — par moments, vous vous sentez vous-même, sans filtre. Ils sont encore intermittents, mais ils sont là. Ce sont eux qui indiquent la direction.";
  if(pct>=30) return "La présence authentique s'invite parfois — brièvement, dans certains contextes seulement. Ce n'est pas une absence, c'est un début. La méthode V.A.L.E.U.R© travaille à partir de ces ouvertures.";
  return "Les masques occupent beaucoup d'espace en ce moment — peu de place pour la légèreté d'être soi. Ce n'est pas un état permanent. C'est le signe que quelque chose cherche à se transformer.";
}

// ── Construction du portrait — 8 blocs ────────────────────────────────────
function buildPortrait(sc, prenom) {
  const MASKS = ['rouge','orange','jaune','vert','bleu','indigo','violet'];

  // 1. Scores en %
  const pct = {};
  MASKS.forEach(m => { pct[m] = parseInt(sc[m]) || 0; });
  const spaScore = parseInt(sc.spa) || 0;
  const spa = computeSPA(pct);

  // 2. Profil
  const prof = detectProfile(pct);
  const dominant = prof.dominant;
  const meta = MASK_META[dominant];
  if(!meta) return;

  // 3. Couleur masque dominant
  const col = meta.col || '#1A1814';
  const rgb = hexToRgb(col);
  document.documentElement.style.setProperty('--mask-col', col);
  document.documentElement.style.setProperty('--mask-rgb', rgb);

  const level = getLevel(pct[dominant]);
  const pl = PLAYLIST[dominant] || {};
  const co = CONTENT[dominant] || {};
  const ve = VALEURS_EMPECHEES[dominant] || {titre:'Ce que ce masque retient', values:[]};
  const fl = FORCES_LIBEREES[dominant] || {titre:'', desc:''};

  // Tiebreak note
  const tiebreakHTML = prof.tiebroken
    ? '<div class="tiebreak-note">Deux masques sont à égalité dans votre profil — la combinaison qui en résulte est décrite dans votre configuration ci-dessous.</div>'
    : '';

  // ── BLOC 1 — HERO ──────────────────────────────────────────────────────
  const heroHtml = `
  <div class="hero">
    <div class="hero-eyebrow">Votre portrait V.A.L.E.U.R©</div>
    <div class="hero-mask-badge">
      <span class="hero-mask-emoji">${meta.emoji||''}</span>
      <span class="hero-mask-name">${meta.name||dominant}</span>
    </div>
    <h1 class="hero-h1">${prenom ? prenom+',' : ''} voici<br>ce qui <em>empêche</em> d'être vous.</h1>
    <div class="hero-level">${level.label} — ${pct[dominant]} %</div>
    ${pct[dominant]>=90?'<div class="tiebreak-note">Ce niveau d&#39;emprise est exceptionnel — ce masque organise une très large part de votre espace psychique.</div>':''}
    ${tiebreakHTML}
    <div class="spa-section">
      <div class="spa-top">
        <div class="spa-num">${spa} %</div>
        <div class="spa-label-main">Présence Authentique</div>
      </div>
      <div class="spa-gauge"><div class="spa-fill" id="spa-fill" style="width:0"></div></div>
      <div class="spa-sub">${buildSpaText(spa)}</div>
    </div>
  </div>`;

  // ── Scores barres ──────────────────────────────────────────────────────
  const sortedMasks = MASKS.slice().sort((a,b)=>pct[b]-pct[a]);
  const MASK_COLORS = {rouge:'#B5312A',orange:'#C4581F',jaune:'#B8930A',vert:'#2D7A4F',bleu:'#1D5F8A',indigo:'#5C3280',violet:'#7A3594'};
  const MASK_LABELS_SHORT = {rouge:'Rouge',orange:'Orange',jaune:'Jaune',vert:'Vert',bleu:'Bleu',indigo:'Indigo',violet:'Violet'};
  let barsHtml = '<div class="scores-section"><div class="scores-title">Vos 7 masques</div>';
  sortedMasks.forEach(m => {
    const lv = getLevel(pct[m]);
    barsHtml += `<div class="score-row">
      <div class="score-mask-name">${MASK_LABELS_SHORT[m]}</div>
      <div class="score-bar-wrap"><div class="score-bar" style="background:${MASK_COLORS[m]};width:0" data-w="${pct[m]}%" id="bar-${m}"></div></div>
      <div class="score-pct">${pct[m]}%</div>
      <div class="score-lv">${lv.label}</div>
    </div>`;
  });
  barsHtml += '</div>';

  // ── BLOC 2 — MIROIR (rendu en position zéro, hors wrap) ─────────────────
  const thoughts = pl.thoughts || [];
  const thought = thoughts[0] || '';
  const mirrorHtml = ''; // miroir injecté dans #miroir-zero-container

  // ── BLOC 3 — CONSTRUCTION ──────────────────────────────────────────────
  const origineText = co.origine || '';
  const prisonText = co.prison ? co.prison.replace(/<[^>]+>/g,'') : '';
  const construction3 = origineText ? `
  <div class="section">
    <div class="section-eyebrow">Pourquoi ce masque ?</div>
    <div class="section-title">Comment il s'est construit</div>
    <div class="sep"></div>
    <div class="construction-box">${origineText}</div>
  </div>` : '';

  // ── BLOC 4 — VALEURS EMPÊCHÉES ────────────────────────────────────────
  // Calcul secondaire pour enrichissement dyade
  const secondary = prof.masks && prof.masks.length>1
    ? prof.masks.find(m=>m!==dominant) || null
    : prof.secondary || null;

  // Valeurs de base (dominant)
  let valeursHtml = '';
  ve.values.forEach(v => {
    valeursHtml += `<div class="valeur-card">

  let dyadeAmplif = '';

      dyadeAmplif = `<div class="dyade-amplif">

      </div>`;
    }
  }

  const bloc4Html = `
  <div class="section">

    <div class="section-title">${ve.titre}</div>

    <div class="valeurs-grid">${valeursHtml}</div>
    ${dyadeAmplif}

  // ── BLOC 5 — CONFIGURATION ─────────────────────────────────────────────
  let configHtml = '';
  if(prof.type==='pan') {
    configHtml = `<div class="config-section"><div class="section-eyebrow">Configuration</div><div class="section-title">Profil pan-masques</div><div class="sep"></div><div class="construction-box">${buildPanMasqueReport(pct, prof)}</div></div>`;
  } else if(prof.type==='adaptatif') {
    configHtml = ''; // adaptatif handled differently
  } else if(prof.type==='dyade' || prof.type==='dyade_forte' || prof.type==='dyade_moderee') {
    const dd = gd(dominant, secondary) || (DYADES_DATA && DYADES_DATA[[dominant,secondary].sort().join('_')]);
    if(dd) {
      let cycleHtml = '';
      if(dd.cycle && dd.cycle.length) {
        cycleHtml = '<div class="config-cycle-title">Le cycle qui se répète</div><div class="cycle-steps">';
        dd.cycle.forEach((step,i) => {
          const stepText = typeof step==='object' ? step.step : step;

          cycleHtml += `<div class="cycle-step"><div class="cycle-num">${i+1}</div><div class="cycle-text"><span class="cycle-step-label">${stepText}</span>${effText?' — '+effText:''}</div></div>`;

        cycleHtml += '</div>';
      }
      let behaviorsHtml = '';

          <div class="config-body">
            <div class="config-desc">${dd.desc||''}</div>
            ${cycleHtml}${behaviorsHtml}
          </div>
        </div>
      </div>`;
    }
  } else if(prof.type==='triade') {
    const m0=prof.masks[0], m1=prof.masks[1], m2=prof.masks[2];
    const td = (typeof TRIADES_DATA!=='undefined'&&TRIADES_DATA[[m0,m1,m2].sort().join('_')])||gt([m0,m1,m2]);
    if(td) {
      let manifHtml = '';
      if(td.manifestations && td.manifestations.length) {
        manifHtml = '<div class="behaviors-title">Ce qui se manifeste</div>';

          manifHtml += `<div class="behavior-item"><span class="beh-dot">·</span><span>${b}</span></div>`;
        });
      }
      configHtml = `<div class="config-section">
        <div class="section-eyebrow">Votre configuration</div>
        <div class="config-box">
          <div class="config-header">
            <div class="config-type-label">Triade</div>
            <div class="config-name">${td.name||''}</div>
            <div class="config-tagline">${td.tagline||''}</div>
          </div>
          <div class="config-body">
            <div class="config-desc">${td.desc||''}</div>
            ${manifHtml}
          </div>
        </div>
      </div>`;
    }
  } else if(secondary && pct[secondary]>=50) {
    // Mono fort avec secondaire visible
    const secMeta = MASK_META[secondary];
    const secVE = VALEURS_EMPECHEES[secondary];
    const dd = gd(dominant, secondary);
    if(dd) {
      configHtml = `<div class="config-section">
        <div class="section-eyebrow">Votre configuration</div>
        <div class="config-box">
          <div class="config-header">
            <div class="config-type-label">Masque secondaire actif</div>
            <div class="config-name">${secMeta?secMeta.name:secondary}</div>
            <div class="config-tagline">${dd.tagline||''}</div>
          </div>
          <div class="config-body">
            <div class="config-desc">${dd.desc||''}</div>
          </div>
        </div>
      </div>`;
    }
  }

  // ── BLOC 6 — FORCE CACHÉE ─────────────────────────────────────────────
  const force6 = FORCES_LIBEREES[dominant] || {};
  const forceHtml = force6.titre ? `
  <div class="force-box">
    <div class="force-label">Ce que ce masque cache</div>
    <div class="force-title">${force6.titre}</div>
    <div class="force-desc">${force6.desc||''}</div>
  </div>` : '';

  // ── BLOC 7 — CARTE PARTAGEABLE ────────────────────────────────────────
  const shareHtml = `
  <div class="share-section">
    <div class="section-eyebrow" style="text-align:center;margin-bottom:14px">Votre carte V.A.L.E.U.R©</div>
    <div class="share-canvas-wrap">
      <canvas id="share-canvas" width="540" height="560"></canvas>
    </div>
    <div class="share-btns">
      <button class="share-btn share-btn-p" onclick="downloadCard()">↓ Télécharger</button>
      <button class="share-btn share-btn-s" onclick="shareCard()">↗ Partager</button>
    </div>
    <div class="share-sub">questionnaire.psyh.fr · © Céline Bourbon</div>
  </div>`;

  // ── BLOC 8 — DOCTOLIB ─────────────────────────────────────────────────
  const docHtml = `
  <div class="doctolib-box">
    <div class="doc-label">Pour aller plus loin</div>
    <div class="doc-title">Ce portrait est un début.<br>L'accompagnement, c'est le chemin.</div>
    <div class="doc-sub">Céline Bourbon · Psychologue · Bordeaux</div>
    <a href="https://www.doctolib.fr/psychologue/bordeaux/celine-bourbon/booking/motives?source=profile"
       target="_blank" class="doc-btn">Prendre rendez-vous →</a>
  </div>`;

  // ── Bloc "pas pour tout le monde" — affiché une fois ──────────────────
  const nfaContainer = document.getElementById('not-for-all-container');
  if(nfaContainer && !nfaContainer.dataset.filled) {
    nfaContainer.dataset.filled = '1';
    nfaContainer.innerHTML = `<div class="not-for-all">
      <div class="nfa-label">Ce portrait n'est pas pour tout le monde</div>
      <div class="nfa-text">Si vous cherchez les causes de votre souffrance dans votre passé, vous ne les trouverez pas ici. VALEUR ne regarde pas en arrière. Il regarde ce qui tourne <em style="color:rgba(247,244,238,.85)">maintenant</em>, à votre insu, et décide à votre place. Si vous êtes prêt·e à voir le présent tel qu'il est — continuez.</div>
    </div>`;
  }

  // ── MIROIR POSITION ZÉRO — avant tout ──────────────────────────────────
  const mzContainer = document.getElementById('miroir-zero-container');
  if(mzContainer && thought) {
    mzContainer.innerHTML = `<div class="miroir-zero">
      <div class="mz-inner">
        <div class="mz-pre">Ce qui traverse votre esprit — en ce moment</div>
        <div class="mz-quote">&laquo;&nbsp;${thought}&nbsp;&raquo;</div>
        <div class="mz-reveal">
          <div class="mz-reveal-line"></div>
          <div class="mz-reveal-txt">Cette pensée revient. Elle a un nom. Elle a une mécanique. Et elle n'est pas vous.</div>
        </div>
      </div>
    </div>`;
  }

  // ── BLOC RUPTURE — ce n'est pas vous ────────────────────────────────────
  const ruptureHtml = `<div class="rupture-bloc">
    <div class="rupture-label">Ce que vous venez de lire</div>
    <div class="rupture-text">Ce réflexe n'est pas votre caractère. Ce n'est pas qui vous êtes. C'est un masque — construit à une époque où il était la seule réponse disponible. Il a fait son travail. Il ne sait pas que vous n'en avez plus besoin. <strong style="font-weight:500;color:var(--mask-col)">Aujourd'hui</strong>, il tourne encore — automatiquement, sans vous demander votre avis. C'est précisément là que le changement devient possible.</div>
  </div>`;

  // ── Assemblage final ───────────────────────────────────────────────────
  const portraitEl = document.getElementById('portrait');
  // Ordre : hero + scores + rupture + valeurs + config + force + share + doctolib
  // Miroir est en position zéro (hors wrap), "pas pour tout le monde" est au-dessus
  portraitEl.innerHTML = heroHtml + barsHtml + ruptureHtml + construction3 + bloc4Html + configHtml + forceHtml + shareHtml + docHtml;

  // Animate bars after render
  requestAnimationFrame(() => {
    const spafill = document.getElementById('spa-fill');
    if(spafill) spafill.style.width = spa + '%';
    sortedMasks.forEach(m => {
      const bar = document.getElementById('bar-'+m);
      if(bar) setTimeout(()=>{ bar.style.width = pct[m]+'%'; }, 200);
    });
    // Build canvas card
    setTimeout(() => buildShareCard(pct, dominant, meta, level, thoughts[0]||'', spa, col), 500);
  });
}

// ── Carte canvas ──────────────────────────────────────────────────────────
function buildShareCard(pct, dominant, meta, level, thought, spa, col) {
  const canvas = document.getElementById('share-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = 540, H = 560;
  ctx.clearRect(0,0,W,H);

  // Background
  ctx.fillStyle = '#F7F4EE';
  ctx.fillRect(0,0,W,H);

  // Bande chromatique gauche proportionnelle
  const MASKS = ['rouge','orange','jaune','vert','bleu','indigo','violet'];
  const MCOLS = {rouge:'#B5312A',orange:'#C4581F',jaune:'#B8930A',vert:'#2D7A4F',bleu:'#1D5F8A',indigo:'#5C3280',violet:'#7A3594'};
  const total = MASKS.reduce((s,m)=>s+(pct[m]||0),0)||1;
  let y=0;
  MASKS.forEach(m => {
    const h2 = Math.round((pct[m]||0)/total*H);
    ctx.fillStyle = MCOLS[m];
    ctx.fillRect(0,y,9,h2);
    y+=h2;
  });
  ctx.fillRect(0,y,9,H-y); // fill remainder

  // Content area starts at x=24
  const X=24;

  // Top line
  ctx.fillStyle='rgba(26,24,20,.08)';
  ctx.fillRect(X,28,W-X-28,1);

  // Eyebrow
  ctx.fillStyle='#A8873A';
  ctx.font='500 10px DM Sans, sans-serif';
  ctx.fillText('V.A.L.E.U.R© · MÉTHODE CÉLINE BOURBON', X, 52);

  // Mask name
  ctx.fillStyle = col;
  ctx.font = '300 36px Cormorant Garamond, serif';
  ctx.fillText((meta.emoji||'')+'  '+(meta.name||dominant), X, 110);

  // Level badge
  ctx.fillStyle = 'rgba(26,24,20,.07)';
  roundRect(ctx, X, 122, 140, 22, 3);
  ctx.fill();
  ctx.fillStyle = col;
  ctx.font = '600 9px DM Sans, sans-serif';
  ctx.fillText(level.label+'  '+pct[dominant]+'%', X+10, 136);

  // Thought (miroir)
  if(thought) {
    ctx.fillStyle='#1A1814';
    ctx.font = 'italic 300 18px Cormorant Garamond, serif';
    const truncated = thought.length>90 ? thought.slice(0,87)+'…' : thought;
    wrapText(ctx, '"'+truncated+'"', X, 188, W-X-28, 26);
  }

  // Separator
  ctx.fillStyle='rgba(26,24,20,.1)';
  ctx.fillRect(X,260,W-X-28,1);

  // Score bars (5 top masques)
  const sorted5 = Object.keys(pct).sort((a,b)=>(pct[b]||0)-(pct[a]||0)).slice(0,5);
  const MLAB = {rouge:'Rouge',orange:'Orange',jaune:'Jaune',vert:'Vert',bleu:'Bleu',indigo:'Indigo',violet:'Violet'};
  let by=284;
  sorted5.forEach(m => {
    ctx.fillStyle='rgba(26,24,20,.5)';
    ctx.font='400 10px DM Sans, sans-serif';
    ctx.fillText(MLAB[m], X, by+10);
    const bw=W-X-28-80;
    ctx.fillStyle='#E8E1D4';
    roundRect(ctx, X+56, by, bw, 7, 3.5); ctx.fill();
    ctx.fillStyle=MCOLS[m];
    roundRect(ctx, X+56, by, Math.max(3,bw*(pct[m]||0)/100), 7, 3.5); ctx.fill();
    ctx.fillStyle='rgba(26,24,20,.5)';
    ctx.font='500 10px DM Sans, sans-serif';
    ctx.fillText((pct[m]||0)+'%', X+56+bw+8, by+10);
    by+=22;
  });

  // SPA
  ctx.fillStyle='rgba(26,24,20,.1)';
  ctx.fillRect(X,400,W-X-28,1);
  ctx.fillStyle='#A8873A';
  ctx.font='600 10px DM Sans, sans-serif';
  ctx.fillText(spa+'% de présence authentique', X, 424);

  // Footer
  ctx.fillStyle='rgba(26,24,20,.3)';
  ctx.font='400 10px DM Sans, sans-serif';
  ctx.fillText('questionnaire.psyh.fr  ·  © Céline Bourbon', X, 520);

  // Bottom chroma bar
  let bx=0;
  MASKS.forEach(m=>{
    ctx.fillStyle=MCOLS[m];
    ctx.fillRect(bx,H-5,Math.ceil(W/7),5);
    bx+=Math.ceil(W/7);
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  words.forEach((word,i) => {
    const test = line + word + ' ';
    if(ctx.measureText(test).width > maxW && i>0) {
      ctx.fillText(line, x, y);
      line = word + ' ';
      y += lineH;
    } else { line = test; }
  });
  ctx.fillText(line, x, y);
}

function downloadCard() {
  const canvas = document.getElementById('share-canvas');
  if(!canvas) return;
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'mon-profil-valeur.png';
  a.click();
}

async function shareCard() {
  const canvas = document.getElementById('share-canvas');
  if(!canvas) return;
  const text = "J'ai découvert le masque qui m'empêche d'être moi. Fascinant de précision. Et toi ? questionnaire.psyh.fr";
  try {
    if(navigator.share && navigator.canShare) {
      canvas.toBlob(async blob => {
        const file = new File([blob],'profil-valeur.png',{type:'image/png'});
        if(navigator.canShare({files:[file]})) {
          await navigator.share({text, files:[file]});
          return;
        }
        await navigator.share({text, url:'https://questionnaire.psyh.fr'});
      });
    } else {
      downloadCard();
    }
  } catch(e) { downloadCard(); }
}

// ── INIT ──────────────────────────────────────────────────────────────────
(function init(){
  const p = new URLSearchParams(window.location.search);
  const MASKS = ['rouge','orange','jaune','vert','bleu','indigo','violet'];
  const sc = {};
  let hasUrl = false;
  MASKS.forEach(m => {
    if(p.has(m)) { sc[m]=parseInt(p.get(m)||'0'); hasUrl=true; }
  });
  if(p.has('spa')) sc.spa=parseInt(p.get('spa')||'0');
  const prenom = p.get('prenom') || '';

  if(!hasUrl) {
    // Fallback localStorage
    try {
      const stored = JSON.parse(localStorage.getItem('valeur_scores')||'{}');
      MASKS.forEach(m => { sc[m] = parseInt(stored[m]||'0'); });
      if(stored.spa!==undefined) sc.spa=parseInt(stored.spa||'0');
    } catch(e){}
  }

  const hasScores = MASKS.some(m=>(sc[m]||0)>0);
  if(!hasScores) {
    document.getElementById('portrait').innerHTML = '<div style="text-align:center;padding:80px 24px;font-family:Cormorant Garamond,serif;font-size:1.2rem;color:#8C8278">Aucun score trouvé. <a href="questionnaire_index.html" style="color:#A8873A">Passez le questionnaire →</a></div>';
    return;
  }

  buildPortrait(sc, decodeURIComponent(prenom));
})();
